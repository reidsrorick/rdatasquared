              Permanently delete all transactions before a chosen date.
            </p>
            <div style={{display:'flex', gap:'8px', alignItems:'center'}}>
              <input type="date" value={truncateDate}
                onChange={e => { setTruncateDate(e.target.value); setConfirming(false); }}
                style={{flex:1}} />
              <button className="btn-secondary"
                disabled={!truncateDate || truncateCount === 0}
                onClick={() => setConfirming(true)}>
                Truncate
              </button>
            </div>
            {truncateDate && truncateCount === 0 && (
              <p className="muted-note" style={{marginTop:'8px'}}>No transactions before this date.</p>
            )}
            {confirming && truncateCount > 0 && (
              <div className="truncate-confirm">
                <p>Delete <strong>{truncateCount} transaction{truncateCount !== 1 ? 's' : ''}</strong> before {truncateDate}? This cannot be undone.</p>
                <div style={{display:'flex', gap:'8px', marginTop:'10px'}}>
                  <button className="btn-secondary" onClick={() => setConfirming(false)}>Cancel</button>
                  <button className="btn-danger" onClick={handleTruncate}>Yes, Delete</button>
                </div>
              </div>
            )}
          </div>

          <div className="setting-section">
            <p className="block-title">Backup</p>
            <div className="setting-actions">
              <button className="btn-secondary" onClick={() => fileRef.current.click()}>↑ Import Settings</button>
              <input ref={fileRef} type="file" accept=".json" style={{display:'none'}}
                onChange={e => { onImportSettings(e.target.files[0]); e.target.value = ''; }} />
            </div>
            <p className="muted-note" style={{marginTop:'8px'}}>
              Saves theme, categories, and import preferences. Does not include transactions.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Planning ──────────────────────────────────────────────────────────────────
function PlanBudgetCell({ budget, privacy, onSet }) {
  const [editing, setEditing] = useState(false);
  const [raw, setRaw]         = useState('');
  const inputRef              = useRef(null);

  const open = () => {
    setRaw(budget ? String(budget) : '');
    setEditing(true);
    setTimeout(() => inputRef.current?.select(), 0);
  };

  const commit = () => {
    const v = parseFloat(raw);
    onSet(isNaN(v) || v <= 0 ? null : v);
    setEditing(false);
  };

  if (editing) {
    return (
      <input
        ref={inputRef}
        type="number" className="plan-budget-input plan-budget-input--editing"
        min="0" step="1" placeholder="0"
        value={raw}
        onChange={e => setRaw(e.target.value)}
        onBlur={commit}
        onKeyDown={e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') setEditing(false); }}
      />
    );
  }

  return (
    <button className={`plan-budget-display ${!budget ? 'plan-budget-empty' : ''}`} onClick={open} title="Click to edit">
      {privacy ? '••••••' : budget ? fmt(budget) : 'Set budget'}
    </button>
  );
}

function Planning({ transactions, budgets, onSetBudget, categories, structure, onReorderStructure, privacy, year, month, onYearChange, onMonthChange, onNavigate, budgetMonthKeys, onCopyBudget }) {
  const now      = new Date();
  const setYear  = onYearChange;
  const setMonth = onMonthChange;

  const planDragIdxRef  = useRef(null);
  const [planDragging, setPlanDragging] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [importSource, setImportSource] = useState('');

  const planClearDrag = () => { planDragIdxRef.current = null; setPlanDragging(null); };

  const planGetDropIdx = (e) => {
    const rows = e.currentTarget.querySelectorAll('[data-drag-idx]');
    for (const row of rows) {
      const rect = row.getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) return parseInt(row.dataset.dragIdx);
    }
    return structure.length;
  };

  const planDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };

  const planDrop = (e) => {
    e.preventDefault();
    const from = planDragIdxRef.current;
    const to   = planGetDropIdx(e);
    if (from === null) { planClearDrag(); return; }
    const src  = structure[from];
    let next   = [...structure];
    if (src.kind === 'group') {
      let end = from + 1;
      while (end < next.length && next[end].kind === 'cat') end++;
      const block = next.splice(from, end - from);
      const adj = to > from ? Math.max(0, to - block.length) : to;
      next.splice(adj, 0, ...block);
    } else {
      const [item] = next.splice(from, 1);
      const adj = to > from ? to - 1 : to;
      next.splice(Math.max(0, adj), 0, item);
    }
    onReorderStructure(next);
    planClearDrag();
  };

  const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
  const monthLabel = new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();

  const prevMonth = () => { if (month === 0) { setMonth(11); setYear(y => y - 1); } else setMonth(m => m - 1); };
  const nextMonth = () => { if (month === 11) { setMonth(0); setYear(y => y + 1); } else setMonth(m => m + 1); };

  const monthTx = useMemo(() =>
    transactions.filter(t => !isExcluded(t) && t.date.startsWith(monthKey)),
    [transactions, monthKey]
  );

  const spending = useMemo(() => {
    const map = {};
    for (const t of monthTx.filter(t => t.amount < 0))
      map[t.category] = (map[t.category] || 0) + Math.abs(t.amount);
    return map;
  }, [monthTx]);

  const income = useMemo(() => monthTx.filter(t => t.amount > 0).reduce((s, t) => s + t.amount, 0), [monthTx]);

  const planCats = categories.filter(c => !PROTECTED_CATS.has(c));
  const budgetedCats = planCats.filter(c => budgets[c]);
  const unbudgetedCats = planCats.filter(c => !budgets[c] && spending[c]);

  const totalBudgeted = budgetedCats.reduce((s, c) => s + (budgets[c] || 0), 0);
  const totalSpent    = budgetedCats.reduce((s, c) => s + (spending[c] || 0), 0);
  const totalDelta    = totalBudgeted - totalSpent;

  const mask = (n) => privacy ? '••••••' : fmt(n);

  const renderRow = (cat, structureIdx) => {
    const budget  = budgets[cat] || 0;
    const spent   = spending[cat] || 0;
    const hasBudget = budget > 0;
    const rawPct  = hasBudget ? (spent / budget) * 100 : 0;
    const pct     = hasBudget ? Math.min(rawPct, 100) : 0;
    const isOver     = hasBudget && spent > budget;
    const isOnTarget = hasBudget && spent === budget;
    const isWarn     = hasBudget && !isOver && !isOnTarget && rawPct >= 80;
    const barColor = isOver ? 'var(--neg)' : isOnTarget ? '#15803d' : isWarn ? '#22c55e' : 'var(--pos)';
    const delta   = hasBudget ? budget - spent : null;
    const isDragging = planDragging === structureIdx;

    return (
      <div key={cat}
        className={`plan-row plan-cols${!hasBudget ? ' plan-unbudgeted' : ''}${isDragging ? ' dragging' : ''}`}
        data-drag-idx={structureIdx}
        draggable
        onDragStart={e => { planDragIdxRef.current = structureIdx; setPlanDragging(structureIdx); e.dataTransfer.effectAllowed = 'move'; }}
        onDragEnd={planClearDrag}
      >
        <span className="drag-handle">⠿</span>
        <span className="plan-cat-name nav-link" onClick={() => onNavigate({ catFilter: cat, dateMode: 'month', navYear: year, navMonth: month })}>{cat}</span>
        <PlanBudgetCell budget={budget} privacy={privacy} onSet={v => onSetBudget(cat, v)} />
        <span className={`plan-spent ${spent > 0 ? 'neg nav-link' : ''}`}
          onClick={spent > 0 ? () => onNavigate({ catFilter: cat, dateMode: 'month', navYear: year, navMonth: month }) : undefined}>
          {spent > 0 ? (privacy ? '••••••' : fmt(spent)) : '—'}
        </span>
        <span className={`plan-delta ${delta === null ? '' : delta < 0 ? 'budget-over' : delta === 0 ? 'budget-on-target' : 'budget-under'}`}>
          {delta === null ? '—'
            : privacy ? '••••••'
            : delta < 0 ? `−${fmt(Math.abs(delta))}`
            : delta === 0 ? 'On target'
            : `+${fmt(delta)}`}
        </span>
        <div className="plan-bar-wrap">
          <div className="plan-bar-track">
            {hasBudget && spent > 0 && (
              <div className="plan-bar-fill" style={{ width: `${pct}%`, background: barColor }} />
            )}
          </div>
          {hasBudget && spent > 0 && !privacy && (
            <span className="plan-bar-pct">{Math.round((spent/budget)*100)}%</span>
          )}
        </div>
      </div>
    );
  };

  // Build ordered list of budgeted cats respecting structure groups
  const structureGroups = useMemo(() => {
    const groups = [];
    let current = { name: null, cats: [] };
    for (const item of structure) {
      if (item.kind === 'group') {
        if (current.cats.length > 0 || current.name) groups.push(current);
        current = { name: item.name, cats: [] };
      } else if (item.kind === 'cat' && !PROTECTED_CATS.has(item.name)) {
        current.cats.push(item.name);
      }
    }
    groups.push(current);
    return groups;
  }, [structure]);

  const budgetUsedPct = totalBudgeted > 0 ? Math.round((totalSpent / totalBudgeted) * 100) : 0;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>

      {/* Month nav */}
      <div className="dash-card" style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px'}}>
        <div className="plan-month-nav">
          <button onClick={prevMonth}>‹</button>
          <span className="plan-month-label nav-link" onClick={() => onNavigate({ dateMode: 'month', navYear: year, navMonth: month })}>{monthLabel}</span>
          <button onClick={nextMonth} disabled={isCurrentMonth}>›</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
          {!isCurrentMonth && (
            <button className="btn-secondary" style={{fontSize:'12px',padding:'4px 12px'}}
              onClick={() => { setYear(now.getFullYear()); setMonth(now.getMonth()); }}>
              Back to current month
            </button>
          )}
          {showImport ? (
            <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
              <select value={importSource} onChange={e => setImportSource(e.target.value)}
                style={{fontSize:'12px',padding:'4px 8px',borderRadius:'6px',border:'1px solid var(--border)',background:'var(--surface)',color:'var(--text)'}}>
                <option value="">Pick a month…</option>
                {(budgetMonthKeys || []).filter(k => k !== monthKey).map(k => {
                  const [y, m] = k.split('-').map(Number);
                  const label = new Date(y, m-1).toLocaleDateString('en-US', {month:'long', year:'numeric'});
                  return <option key={k} value={k}>{label}</option>;
                })}
              </select>
              <button className="btn-primary" style={{fontSize:'12px',padding:'4px 12px'}}
                disabled={!importSource}
                onClick={() => { onCopyBudget(importSource); setShowImport(false); setImportSource(''); }}>
                Copy
              </button>
              <button className="btn-secondary" style={{fontSize:'12px',padding:'4px 12px'}}
                onClick={() => { setShowImport(false); setImportSource(''); }}>
                Cancel
              </button>
            </div>
          ) : (
            <button className="btn-secondary" style={{fontSize:'12px',padding:'4px 12px'}}
              onClick={() => setShowImport(true)}>
              ↓ Import from month
            </button>
          )}
        </div>
      </div>

      {/* KPI cards */}
      <div className="plan-kpi-grid">
        <div className="plan-kpi nav-link" onClick={() => onNavigate({ typeFilter: 'Income', dateMode: 'month', navYear: year, navMonth: month })}>
          <span className="plan-kpi-label">Income</span>
          <span className="plan-kpi-value pos">{mask(income)}</span>
        </div>
        <div className="plan-kpi">
          <span className="plan-kpi-label">Budgeted</span>
          <span className="plan-kpi-value">{mask(totalBudgeted)}</span>
          {income > 0 && !privacy && <span className="plan-kpi-sub">{Math.round((totalBudgeted/income)*100)}% of income</span>}
        </div>
        <div className="plan-kpi nav-link" onClick={() => onNavigate({ typeFilter: 'Expense', dateMode: 'month', navYear: year, navMonth: month })}>
          <span className="plan-kpi-label">Spent</span>
          <span className={`plan-kpi-value ${totalSpent > totalBudgeted ? 'neg' : ''}`}>{mask(totalSpent)}</span>
          {totalBudgeted > 0 && !privacy && <span className="plan-kpi-sub">{budgetUsedPct}% of budget used</span>}
        </div>
        <div className="plan-kpi">
          <span className="plan-kpi-label">Remaining</span>
          <span className={`plan-kpi-value ${totalDelta < 0 ? 'neg' : 'pos'}`}>
            {privacy ? '••••••' : totalDelta < 0 ? `−${fmt(Math.abs(totalDelta))}` : fmt(totalDelta)}
          </span>
          {!privacy && totalBudgeted > 0 && <span className="plan-kpi-sub">{totalDelta < 0 ? 'over budget' : 'left to spend'}</span>}
        </div>
      </div>

      {/* Category table */}
      <div className="plan-table">
        <div className="plan-row-header plan-cols">
          <span />
          <span>Category</span>
          <span style={{textAlign:'right'}}>Budget</span>
          <span style={{textAlign:'right'}}>Spent</span>
          <span style={{textAlign:'right'}}>Status</span>
          <span style={{paddingLeft:'4px'}}>Progress</span>
        </div>

        <div onDragOver={planDragOver} onDrop={planDrop}>
        {structureGroups.map((group, gi) => {
          const groupCats = group.cats.filter(c => categories.includes(c) && !PROTECTED_CATS.has(c));
          if (groupCats.length === 0 && !group.name) return null;
          const groupStructureIdx = group.name
            ? structure.findIndex(s => s.kind === 'group' && s.name === group.name)
            : null;
          const isGroupDragging = groupStructureIdx !== null && planDragging === groupStructureIdx;
          return (
            <div key={gi} className={`plan-section${isGroupDragging ? ' dragging' : ''}`}>
              {group.name && (
                <div className="plan-section-title-row"
                  data-drag-idx={groupStructureIdx}
                  draggable
                  onDragStart={e => { planDragIdxRef.current = groupStructureIdx; setPlanDragging(groupStructureIdx); e.dataTransfer.effectAllowed = 'move'; }}
                  onDragEnd={planClearDrag}
                >
                  <span className="drag-handle" style={{color:'var(--muted)'}}>⠿</span>
                  <span className="plan-section-title">{group.name}</span>
                </div>
              )}
              {groupCats.map(cat => {
                const sidx = structure.findIndex(s => s.kind === 'cat' && s.name === cat);
                return renderRow(cat, sidx);
              })}
            </div>
          );
        })}
        </div>

        {/* Total row */}
        {budgetedCats.length > 0 && (
          <div className="plan-total-row plan-cols">
            <span />
            <span>Total</span>
            <span style={{textAlign:'right'}}>{mask(totalBudgeted)}</span>
            <span style={{textAlign:'right',color:'var(--neg)'}}>{totalSpent > 0 ? mask(totalSpent) : '—'}</span>
            <span style={{textAlign:'right'}} className={totalDelta < 0 ? 'budget-over' : 'budget-under'}>
              {privacy ? '••••••' : totalDelta < 0 ? `−${fmt(Math.abs(totalDelta))}` : `+${fmt(totalDelta)}`}
            </span>
            <span />
          </div>
        )}

        {/* Unbudgeted spending */}
        {unbudgetedCats.length > 0 && (
          <div className="plan-section" style={{borderTop:'2px solid var(--border)'}}>
            <div className="plan-section-title-row" style={{cursor:'default'}}>
              <span className="plan-section-title" style={{color:'var(--neg)'}}>Unbudgeted Spending</span>
              <span style={{fontSize:'11px',color:'var(--muted)'}}>set a budget to track these</span>
            </div>
            {unbudgetedCats.map(cat => {
              const sidx = structure.findIndex(s => s.kind === 'cat' && s.name === cat);
              return renderRow(cat, sidx);
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [transactions, setTx]         = useLocalStorage('budget_v1', []);
  const [catStructure, setCatStructure] = useLocalStorage('budget_category_structure', null);
  const [legacyCats]                    = useLocalStorage('budget_categories', DEFAULT_CATEGORIES);
  const [nextTxNum, setNextTxNum]     = useLocalStorage('budget_next_tx_num', 1);

  // Resolve: if budget_category_structure not yet saved, migrate from legacyCats
  const structure = catStructure ?? legacyCats.map(name => ({ kind: 'cat', name }));
  const setStructure = (val) => setCatStructure(typeof val === 'function' ? val(structure) : val);

  // Derived flat list used everywhere categories: string[] is needed
  const categories = useMemo(() =>
    structure.filter(i => i.kind === 'cat').map(i => i.name),
    [structure]
  );
  const [activeTab, setActiveTab]       = useLocalStorage('budget_active_tab', 'dashboard');
  const [planYear, setPlanYear]         = useState(() => new Date().getFullYear());
  const [planMonth, setPlanMonth]       = useState(() => new Date().getMonth());
  const [toast, setToast]               = useState(null);
  const toastTimer = useRef(null);
  const showToast = (msg) => {
    clearTimeout(toastTimer.current);
    setToast(msg);
    toastTimer.current = setTimeout(() => setToast(null), 3000);
  };
  const [showCatMgr, setShowCatMgr]     = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [reconcilingAcct, setReconciling] = useState(null);
  const [txJump, setTxJump] = useState(null);
  const navigateToTx = (filters) => {
    setActiveTab('transactions');
    setTxJump({ version: Date.now(), ...filters });
  };
  const [linkingTxId, setLinkingTxId] = useState(null);
  const [privacy, setPrivacy]         = useLocalStorage('budget_privacy', false);
  const [theme, setTheme]             = useLocalStorage('budget_theme', 'light');
  const [budgets, setBudgets]         = useLocalStorage('budget_budgets', {});

  // Migrate flat { cat: amt } → { 'YYYY-MM': { cat: amt } }
  useEffect(() => {
    if (!budgets || typeof budgets !== 'object') return;
    const vals = Object.values(budgets);
    if (vals.length === 0 || typeof vals[0] !== 'number') return;
    const now = new Date();
    const key = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    setBudgets({ [key]: budgets });
  }, []); // eslint-disable-line

  useEffect(() => {
    const handler = (e) => {
      if (e.ctrlKey && e.key === 'h') { e.preventDefault(); setPrivacy(p => !p); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  const monthKeys = useMemo(() =>
    Object.keys(budgets).filter(k => /^\d{4}-\d{2}$/.test(k)).sort(),
    [budgets]
  );

  const getBudgetsForMonth = useCallback((key) => {
    return budgets[key] || {};
  }, [budgets]);

  const planMonthKey = `${planYear}-${String(planMonth + 1).padStart(2, '0')}`;
  const planBudgets  = useMemo(() => getBudgetsForMonth(planMonthKey), [getBudgetsForMonth, planMonthKey]);

  const setBudget = (cat, amt) => setBudgets(prev => {
    const base = prev[planMonthKey] || {};
    const updated = amt != null && !isNaN(amt) && amt > 0
      ? { ...base, [cat]: amt }
      : Object.fromEntries(Object.entries(base).filter(([k]) => k !== cat));
    return { ...prev, [planMonthKey]: updated };
  });

  const copyBudgetFromMonth = (sourceKey) => {
    setBudgets(prev => ({ ...prev, [planMonthKey]: { ...(prev[sourceKey] || {}) } }));
  };

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  const importAllRef = useRef(null);
  const [pendingCsvFile, setPendingCsvFile] = useState(null);

  const handleImportAll = async (files) => {
    for (const file of files) {
      if (file.name.endsWith('.json')) {
        await importSettings(file);
      } else if (file.name.endsWith('.csv')) {
        setPendingCsvFile(file);
      }
    }
  };

  const exportAll = async () => {
    const settingsBlob = new Blob([JSON.stringify({
      version: 2, theme,
      categoryStructure: structure,
      budgets,
      importSettings: JSON.parse(localStorage.getItem('budget_import_settings') || '{}'),
    }, null, 2)], { type: 'application/json' });
    const exportTx = transactions.filter(t => !t.shadow);
    const linkedCount = exportTx.filter(t => t.duplicateOf).length;
    const exportNote = linkedCount > 0 ? ` (incl. ${linkedCount} linked hidden)` : '';
    const csvBlob = exportTx.length > 0
      ? new Blob([exportCSV(exportTx)], { type: 'text/csv' })
      : null;

    if (!window.showDirectoryPicker) {
      const dl = (blob, name) => {
        const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: name });
        a.click(); URL.revokeObjectURL(a.href);
      };
      dl(settingsBlob, 'budget_settings.json');
      if (csvBlob) dl(csvBlob, 'budget_transactions.csv');
      showToast(`Exported ${exportTx.length} rows${exportNote} to Downloads`);
      return;
    }

    let dirHandle = await getExportDirHandle();
    if (dirHandle) {
      const perm = await dirHandle.requestPermission({ mode: 'readwrite' });
      if (perm !== 'granted') dirHandle = null;
    }
    if (!dirHandle) {
      try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        await setExportDirHandle(dirHandle);
      } catch { return; }
    }

    const writeFile = async (filename, blob) => {
      const fh = await dirHandle.getFileHandle(filename, { create: true });
      const w  = await fh.createWritable();
      await w.write(blob); await w.close();
    };
    await writeFile('budget_settings.json', settingsBlob);
    if (csvBlob) await writeFile('budget_transactions.csv', csvBlob);
    showToast(`Exported ${exportTx.length} rows${exportNote} to ${dirHandle.name}`);
  };

  const importSettings = async (file) => {
    if (!file) return;
    try {
      const s = JSON.parse(await file.text());
      if (s.theme) setTheme(s.theme);
      if (s.categoryStructure) {
        setCatStructure(s.categoryStructure);
      } else if (Array.isArray(s.categories)) {
        setCatStructure(s.categories.map(name => ({ kind: 'cat', name })));
      }
      if (s.budgets) {
        const vals = Object.values(s.budgets);
        if (vals.length > 0 && typeof vals[0] === 'number') {
          // Old flat format — import as current month
          const now = new Date();
          const key = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
          setBudgets({ [key]: s.budgets });
        } else {
          setBudgets(s.budgets);
        }
      }
      if (s.importSettings) localStorage.setItem('budget_import_settings', JSON.stringify(s.importSettings));
      setShowSettings(false);
    } catch {
      alert('Could not read settings file.');
    }
  };

  // Backfill txNum for any existing transactions that predate this field
  useEffect(() => {
    if (transactions.length === 0 || transactions.every(t => t.txNum)) return;
    const sorted = [...transactions].sort((a, b) =>
      a.date.localeCompare(b.date) || a.id.localeCompare(b.id)
    );
    let counter = 1;
    const updated = sorted.map(t => t.txNum ? t : { ...t, txNum: counter++ });
    const maxNum = Math.max(...updated.map(t => t.txNum));
    setTx(updated);
    setNextTxNum(prev => Math.max(prev, maxNum + 1));
  }, []); // eslint-disable-line

  // Remove legacy shadow transactions (old import-review flow artifacts)
  useEffect(() => {
    if (transactions.some(t => t.shadow)) {
      setTx(prev => prev.filter(t => !t.shadow));
    }
  }, []); // eslint-disable-line

  // Migrate duplicateOf and fuzzyMatchId from UUID to txNum
  useEffect(() => {
    const uuidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
    const needsMigration = transactions.some(t =>
      (t.duplicateOf && uuidRe.test(t.duplicateOf)) ||
      (t.fuzzyMatchId && uuidRe.test(String(t.fuzzyMatchId)))
    );
    if (!needsMigration) return;
    setTx(prev => prev.map(t => {
      let updated = { ...t };
      if (t.duplicateOf && uuidRe.test(t.duplicateOf)) {
        const master = prev.find(m => m.id === t.duplicateOf);
        if (master?.txNum) updated.duplicateOf = master.txNum;
      }
      if (t.fuzzyMatchId && uuidRe.test(String(t.fuzzyMatchId))) {
        const matched = prev.find(m => m.id === t.fuzzyMatchId);
        updated.fuzzyMatchId = matched?.txNum ?? undefined;
      }
      return updated;
    }));
  }, []); // eslint-disable-line

  const addTx = (t) => {
    const num = nextTxNum;
    setNextTxNum(n => n + 1);
    const fuzzyMatch = transactions.find(m => {
      if (m.duplicateOf || m.fuzzyMatchId) return false;
      const dayDiff = Math.abs(new Date(m.date) - new Date(t.date)) / 86400000;
      return dayDiff <= 3 && Math.abs(m.amount - t.amount) < 0.005;
    });
    setTx(prev => [{ ...t, txNum: num, ...(fuzzyMatch ? { fuzzyMatchId: fuzzyMatch.txNum } : {}) }, ...prev]);
  };

  const addMany = (txs) => {
    const needNum = txs.filter(t => !t.txNum).length;
    const start   = nextTxNum;
    if (needNum > 0) setNextTxNum(n => n + needNum);
    let counter = start;
    setTx(prev => [...txs.map(t => t.txNum ? t : { ...t, txNum: counter++ }), ...prev]);
  };
  const deleteTx = (id) => setTx(prev => {
    const target = prev.find(t => t.id === id);
    return prev
      .filter(t => t.id !== id)
      .map(t => {
        // If deleting a transaction, clear fuzzyMatchId from any transaction that was pointing to it
        if (target?.txNum !== undefined && t.fuzzyMatchId === target.txNum) return { ...t, fuzzyMatchId: undefined };
        return t;
      });
  });
  const truncateTx   = (beforeDate)  => setTx(prev => prev.filter(t => t.date >= beforeDate));
  const replaceAllTx = (txs) => {
    setTx(txs);
    const maxNum = txs.reduce((m, t) => Math.max(m, t.txNum || 0), 0);
    if (maxNum > 0) setNextTxNum(maxNum + 1);
  };

  const reconcile = (accountName, diff) => {
    addTx({
      id: crypto.randomUUID(),
      description: `Reconciliation — ${accountName}`,
      amount: diff,
      category: RECONCILE_CAT,
      date: today(),
      accountName,
    });
  };
  const editTx     = (id, patch) => setTx(prev => prev.map(t => t.id === id ? { ...t, ...patch } : t));
  const updateMany = (patches)   => setTx(prev => prev.map(t => {
    const p = patches.find(p => p.id === t.id);
    return p ? { ...t, ...p.data } : t;
  }));

  const addCategory    = (name)           => setStructure(s => [...s, { kind: 'cat', name }]);
  const renameCategory = (oldName, newName) => {
    setStructure(s => s.map(i => i.kind === 'cat' && i.name === oldName ? { ...i, name: newName } : i));
    setTx(prev => prev.map(t => t.category === oldName ? { ...t, category: newName } : t));
  };
  const deleteCategory = (name) => {
    setStructure(s => s.filter(i => !(i.kind === 'cat' && i.name === name)));
    setTx(prev => prev.map(t => t.category === name ? { ...t, category: 'Other' } : t));
  };
  const addGroup    = (name)        => setStructure(s => [...s, { kind: 'group', id: crypto.randomUUID(), name }]);
  const renameGroup = (id, newName) => setStructure(s => s.map(i => i.kind === 'group' && i.id === id ? { ...i, name: newName } : i));
  const deleteGroup = (id)          => setStructure(s => s.filter(i => !(i.kind === 'group' && i.id === id)));
  const reorderStructure = (newStructure) => setStructure(newStructure);

  const requestLink = (id) => setLinkingTxId(id);

  const linkTransfers = (sourceId, targetId) => {
    const sharedId = crypto.randomUUID();
    setTx(prev => prev.map(t =>
      t.id === sourceId || t.id === targetId
        ? { ...t, transferId: sharedId, category: TRANSFER_CAT }
        : t
    ));
    setLinkingTxId(null);
  };

  const unlinkTransfer = (id) => {
    setTx(prev => {
      const tx = prev.find(t => t.id === id);
      if (!tx?.transferId) return prev;
      const tid = tx.transferId;
      return prev.map(t => t.transferId === tid ? { ...t, transferId: null } : t);
    });
  };

  const activeTx = useMemo(() => transactions.filter(t => !t.shadow && !t.duplicateOf), [transactions]);

  const [linkingDuplicate, setLinkingDuplicate] = useState(null);

  const linkDuplicate = (masterId, secondaryId) => {
    if (!masterId) {
      setTx(prev => prev.map(t => t.id === secondaryId ? { ...t, fuzzyMatchId: undefined } : t));
      return;
    }
    const masterTxNum = transactions.find(t => t.id === masterId)?.txNum ?? masterId;
    setTx(prev => prev.map(t => {
      if (t.id === secondaryId) return { ...t, duplicateOf: masterTxNum, fuzzyMatchId: undefined };
      if (t.id === masterId)    return { ...t, fuzzyMatchId: undefined };
      return t;
    }));
  };

  const dismissFuzzy = (id) => setTx(prev => prev.map(t => t.id === id ? { ...t, fuzzyMatchId: undefined } : t));

  const linkingTx = linkingTxId ? transactions.find(t => t.id === linkingTxId) : null;

  return (
    <div className="app">
      {toast && <div className="toast">{toast}</div>}
      <div className="sticky-top">
      <header className="app-header">
        <img src="https://rdatasquared.com/02/images/rbs_icon.png" alt="" className="app-icon" />
        <h1 className="app-title">Budget</h1>
        <span className="app-sub">
          {new Date().toLocaleDateString('en-US', { month:'long', year:'numeric' })}
        </span>
        <div className="header-actions">
          <button className={`privacy-btn${privacy ? ' active' : ''}`}
            onClick={() => setPrivacy(p => !p)}>
            {privacy ? '👁 Show Amounts' : '🙈 Hide Amounts'}
          </button>
          <button className="export-btn" onClick={() => importAllRef.current.click()}>
            ↑ Import
          </button>
          <input ref={importAllRef} type="file" accept=".csv,.json" multiple style={{display:'none'}}
            onChange={e => { handleImportAll([...e.target.files]); e.target.value = ''; }} />
          <button className="export-btn" onClick={exportAll}>
            ↓ Export
          </button>
          <button className="export-btn" onClick={() => setShowSettings(true)} title="Settings">
            ⚙
          </button>
          <CSVImporter transactions={transactions} onImport={addMany} onUpdate={updateMany} onReplaceAll={replaceAllTx} categories={categories}
            externalFile={pendingCsvFile} onExternalFileConsumed={() => setPendingCsvFile(null)} />
        </div>
      </header>
      <nav className="tab-nav" style={{position:'static'}}>
        {[['dashboard','Dashboard'],['planning','Planning'],['transactions','Transactions']].map(([key,label]) => (
          <button key={key} className={`tab-btn ${activeTab === key ? 'active' : ''}`}
            onClick={() => setActiveTab(key)}>{label}</button>
        ))}
      </nav>
      </div>
      <main className="app-main">
        {activeTab === 'dashboard' && (
          <Dashboard transactions={activeTx} privacy={privacy}
            getBudgetsForMonth={getBudgetsForMonth} onReconcile={setReconciling} onNavigate={navigateToTx} />
        )}
        {activeTab === 'planning' && (
          <Planning
            transactions={activeTx}
            budgets={planBudgets}
            onSetBudget={setBudget}
            categories={categories}
            structure={structure}
            onReorderStructure={reorderStructure}
            privacy={privacy}
            year={planYear} month={planMonth}
            onYearChange={setPlanYear} onMonthChange={setPlanMonth}
            onNavigate={navigateToTx}
            budgetMonthKeys={monthKeys}
            onCopyBudget={copyBudgetFromMonth}
          />
        )}
        {activeTab === 'transactions' && (<>
          <Summary transactions={activeTx} privacy={privacy} />
          <AddTransaction onAdd={addTx} categories={categories} structure={structure} transactions={activeTx}
            accounts={[...new Set(activeTx.map(t => t.accountName).filter(Boolean))].sort()}
            allTags={[...new Set(activeTx.flatMap(t => t.tags || []))].sort()} />
          <TransactionList
            transactions={transactions.filter(t => !t.shadow)} onDelete={deleteTx} onEdit={editTx}
            onRequestLink={requestLink} onUnlink={unlinkTransfer}
            onLinkDuplicate={setLinkingDuplicate} onDismissFuzzy={dismissFuzzy}
            categories={categories} structure={structure} privacy={privacy}
            jumpTo={txJump}
          />
        </>)}
      </main>
      {showCatMgr && (
        <CategoryManager
          structure={structure}
          budgets={planBudgets}
          onSetBudget={setBudget}
          onAddCat={addCategory}
          onRenameCat={renameCategory}
          onDeleteCat={deleteCategory}
          onAddGroup={addGroup}
          onRenameGroup={renameGroup}
          onDeleteGroup={deleteGroup}
          onReorderStructure={reorderStructure}
          onClose={() => setShowCatMgr(false)}
        />
      )}
      {reconcilingAcct && (
        <ReconcileModal
          account={reconcilingAcct}
          onConfirm={reconcile}
          onClose={() => setReconciling(null)}
        />
      )}
      {showSettings && (
        <SettingsModal
          theme={theme} onThemeChange={setTheme}
          onManageCategories={() => { setShowSettings(false); setShowCatMgr(true); }}
          onImportSettings={importSettings}
          onTruncate={truncateTx}
          transactions={activeTx}
          onClose={() => setShowSettings(false)}
        />
      )}
      {linkingTx && (
        <TransferLinker
          sourceTx={linkingTx}
          transactions={transactions}
          onLink={linkTransfers}
          onClose={() => setLinkingTxId(null)}
        />
      )}
      {linkingDuplicate && (
        <DuplicateLinker
          tx={linkingDuplicate}
          transactions={transactions.filter(t => !t.shadow)}
          onLink={linkDuplicate}
          onClose={() => setLinkingDuplicate(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
