<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget</title>
  <link rel="icon" type="image/png" href="https://rdatasquared.com/02/images/rbs_icon.png" />
  <style>
/* ── reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #f4f6f9;
  --surface:     #ffffff;
  --surface-alt: #fafbfc;
  --border:      #e2e6ea;
  --text:        #1a1d23;
  --muted:       #6b7280;
  --pos:         #16a34a;
  --pos-light:   #dcfce7;
  --neg:         #dc2626;
  --neg-light:   #fee2e2;
  --accent:      #2563eb;
  --accent-light:#eff6ff;
  --radius:      10px;
  --shadow:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
}

[data-theme="dark"] {
  --bg:          #111318;
  --surface:     #1c1f26;
  --surface-alt: #161920;
  --border:      #2e3240;
  --text:        #e2e6ed;
  --muted:       #8b92a0;
  --pos-light:   #0a2318;
  --neg-light:   #2a0e0e;
  --accent-light:#1a2540;
  --shadow:      0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}

/* ── layout ───────────────────────────────────────────────────────────────── */
.app { min-height: 100vh; }

.sticky-top {
  position: sticky; top: 0; z-index: 100;
}
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.app-icon  { width: 28px; height: 28px; object-fit: contain; flex-shrink: 0; }
.app-title { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
.app-sub   { color: var(--muted); font-size: 13px; }

.app-main {
  max-width: 780px;
  margin: 0 auto;
  padding: 24px 16px 48px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── summary ──────────────────────────────────────────────────────────────── */
.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }

.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  box-shadow: var(--shadow);
}

.s-label  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
.s-amount { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
.pos { color: var(--pos); }
.neg { color: var(--neg); }

/* ── add form ─────────────────────────────────────────────────────────────── */
.add-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.section-title { font-size: 15px; font-weight: 600; }
.type-toggle   { display: flex; gap: 8px; }

.type-btn {
  flex: 1; padding: 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--muted);
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.type-btn:hover          { border-color: #adb5bd; color: var(--text); }
.type-btn.active-expense { background: var(--neg-light); border-color: var(--neg); color: var(--neg); }
.type-btn.active-income  { background: var(--pos-light); border-color: var(--pos); color: var(--pos); }

.form-grid {
  display: grid;
  grid-template-columns: 110px 1fr auto auto;
  gap: 8px; align-items: center;
}
.f-merchant { grid-column: 1 / -1; }
.f-desc     { grid-column: 1 / -1; }
.f-account  { grid-column: 1 / -1; }
.f-amount   { width: 110px; }

input, select {
  height: 38px; padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  font-size: 13px; outline: none;
  transition: border-color .15s; width: 100%;
}
input:focus, select:focus { border-color: var(--accent); }

.add-btn {
  height: 38px; padding: 0 18px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 6px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap; transition: opacity .15s;
}
.add-btn:hover { opacity: .88; }
.form-error { color: var(--neg); font-size: 12px; }

/* ── transaction list ─────────────────────────────────────────────────────── */
.tx-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
}

.tx-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
}
.tx-count { font-size: 12px; color: var(--muted); }

.filters {
  display: flex; flex-direction: column;
  border-bottom: 1px solid var(--border); background: var(--surface-alt);
}
.filter-row {
  display: flex; flex-wrap: nowrap; align-items: center; gap: 8px;
  padding: 10px 16px;
}
.filter-row + .filter-row { border-top: 1px solid var(--border); padding-top: 8px; padding-bottom: 10px; }
.filter-row-1 .filter-wrap,
.filter-row-2 .filter-wrap { flex: 1; min-width: 0; }
.filter-row-3 .date-filter-wrap { flex: 1; min-width: 0; }
.search-input { width: 100%; }

.filter-wrap       { position: relative; display: flex; align-items: center; min-width: 130px; }
.filter-clear      {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; border: none; background: var(--muted); color: var(--surface);
  border-radius: 50%; cursor: pointer; font-size: 11px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  opacity: .7; transition: opacity .1s;
}
.filter-clear:hover { opacity: 1; }
.filter-wrap .cat-combo input { padding-right: 26px; }
.field-clear-btn {
  flex-shrink: 0; width: 20px; height: 20px; border: none; border-radius: 50%;
  background: var(--muted); color: var(--surface); font-size: 14px; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  opacity: .6; transition: opacity .1s;
}
.field-clear-btn:hover { opacity: 1; }
.filter-reset {
  font-size: 12px; color: var(--accent); background: none; border: none;
  cursor: pointer; white-space: nowrap; padding: 0 4px; flex-shrink: 0;
}
.filter-reset:hover { text-decoration: underline; }
.date-filter-wrap { gap: 0; min-width: unset; align-items: stretch; }
.date-filter-wrap .date-filter-all,
.date-filter-wrap .date-filter-inner { width: 100%; }
.date-filter-all {
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: 6px;
  padding: 0 12px; font-size: 13px; color: var(--muted);
  background: var(--surface); cursor: pointer; white-space: nowrap; height: 32px;
}
.date-filter-all:hover { background: var(--surface-alt); color: var(--text); }
.date-filter-inner {
  display: flex; align-items: stretch;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); overflow: hidden; height: 32px;
}
.date-nav-btn {
  background: none; border: none; width: 28px;
  font-size: 15px; color: var(--muted);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .1s, color .1s;
}
.date-nav-btn:hover { background: var(--surface-alt); color: var(--text); }
.date-nav-label { font-size: 13px; font-weight: 500; min-width: 118px; flex: 1; text-align: center; padding: 0 4px; display: flex; align-items: center; justify-content: center; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
.date-mode-toggle {
  background: none; border: none; border-left: 1px solid var(--border);
  padding: 0 9px; font-size: 11px; color: var(--muted);
  cursor: pointer; flex-shrink: 0; white-space: nowrap;
}
.date-mode-toggle:hover { color: var(--accent); }
.date-filter-clear {
  background: none; border: none; border-left: 1px solid var(--border);
  padding: 0 9px; font-size: 14px; color: var(--muted);
  cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
}
.date-filter-clear:hover { color: var(--neg); }
.date-range-input {
  width: 118px; font-size: 12px; padding: 0 8px;
  border: none; background: transparent; outline: none; color: var(--text);
}
.date-range-input:first-child { border-right: 1px solid var(--border); }
.date-range-sep { font-size: 12px; color: var(--muted); flex-shrink: 0; padding: 0 6px; display: flex; align-items: center; }
.empty { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg); border-radius: 8px;
  padding: 10px 20px; font-size: 13px; font-weight: 500;
  box-shadow: 0 4px 16px rgba(0,0,0,.25); z-index: 999;
  pointer-events: none;
  animation: toast-in .2s ease;
}
@keyframes toast-in {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ── transaction row ──────────────────────────────────────────────────────── */
.tx-row {
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border); transition: background .1s;
}
.tx-row:last-child { border-bottom: none; }
.tx-row:hover { background: var(--surface-alt); }

.tx-accent { width: 3px; align-self: stretch; flex-shrink: 0; }
.tx-income    .tx-accent { background: var(--pos); }
.tx-expense   .tx-accent { background: var(--neg); }
.tx-transfer  .tx-accent { background: #cbd5e1; }
.tx-transfer  .tx-amount { color: var(--muted); }
.tx-transfer  .tx-desc   { color: var(--muted); }
.tx-fuzzy        .tx-accent { background: #d97706; }
.tx-linked-hidden .tx-accent { background: var(--border); }
.tx-linked-hidden { opacity: 0.6; }

.hidden-badge { display:inline-flex; align-items:center; gap:3px; font-size:10px; font-weight:600;
  background:var(--surface-alt); color:var(--muted); border:1px solid var(--border);
  border-radius:4px; padding:1px 6px; letter-spacing:.3px; }

.fuzzy-badge { display:inline-flex; align-items:center; gap:3px; font-size:10px; font-weight:700;
  background:#fef3c7; color:#92400e; border-radius:4px; padding:1px 6px; letter-spacing:.3px; }
[data-theme="dark"] .fuzzy-badge { background:#451a03; color:#fcd34d; }

.fuzzy-actions { display:flex; gap:6px; margin-top:6px; }
.fuzzy-link-btn { font-size:11px; padding:2px 8px; border-radius:4px; border:1px solid #d97706;
  background:transparent; color:#d97706; cursor:pointer; font-weight:600; }
.fuzzy-link-btn:hover { background:#fef3c7; }
[data-theme="dark"] .fuzzy-link-btn { border-color:#f59e0b; color:#f59e0b; }
[data-theme="dark"] .fuzzy-link-btn:hover { background:#451a03; }
.fuzzy-keep-btn { font-size:11px; padding:2px 8px; border-radius:4px; border:1px solid var(--border);
  background:transparent; color:var(--muted); cursor:pointer; }
.fuzzy-keep-btn:hover { background:var(--surface-alt); color:var(--text); }

.dup-linker-pair { display:grid; grid-template-columns:1fr 1fr; border:1px solid var(--border);
  border-radius:8px; overflow:hidden; margin-bottom:4px; }
.dup-linker-side { padding:14px 16px; cursor:pointer; transition:background .15s; }
.dup-linker-side:first-child { border-right:1px solid var(--border); }
.dup-linker-side:hover { background:var(--surface-alt); }
.dup-linker-side.selected { background:var(--accent-light); outline:2px solid var(--accent); outline-offset:-2px; }
.dup-linker-radio { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-weight:600; font-size:13px; }
.dup-linker-desc { font-size:13px; font-weight:500; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dup-linker-sub  { font-size:11px; color:var(--muted); margin-bottom:4px; }
.dup-linker-meta { font-size:12px; color:var(--muted); display:flex; gap:8px; flex-wrap:wrap; }
.dup-linker-note { font-size:12px; color:var(--muted); margin-top:10px; text-align:center; }

.tx-body { flex: 1; padding: 12px 14px; min-width: 0; }
.tx-top  { display: flex; justify-content: space-between; align-items: center; gap: 8px; }

.tx-desc-wrap { display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
.tx-desc   { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-merchant { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-amount { font-size: 14px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.tx-meta   { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
.tx-date   { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.tx-acct   { font-size: 11px; color: var(--muted); }
.tx-id     { font-size: 10px; color: #b0b8c4; font-family: monospace; flex-shrink: 0; }

.cat-pill {
  font-size: 11px; padding: 1px 8px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--bg); color: var(--muted);
  cursor: pointer; transition: border-color .1s, color .1s;
}
.cat-pill:hover { border-color: var(--accent); color: var(--accent); }

/* ── multi-select filter ──────────────────────────────────────────────────── */
.ms-filter { position: relative; width: 100%; }
.ms-filter-btn {
  width: 100%; height: 32px; padding: 0 8px 0 10px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); color: var(--text); font-size: 13px;
  cursor: pointer; text-align: left;
  display: flex; align-items: center; justify-content: space-between; gap: 4px;
}
.ms-filter-btn .ms-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.ms-filter-btn .ms-arrow { font-size: 9px; color: var(--muted); flex-shrink: 0; }
.ms-filter-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.ms-filter-btn.active .ms-arrow { color: var(--accent); }
.ms-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0;
  min-width: 100%; width: max-content; max-width: 280px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.15);
  z-index: 300; display: flex; flex-direction: column; max-height: 280px;
}
.ms-search { padding: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ms-search input { width: 100%; }
.ms-list { overflow-y: auto; flex: 1; padding: 4px 0; }
.ms-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px; cursor: pointer; font-size: 13px; user-select: none;
}
.ms-item:hover { background: var(--surface-alt); }
.ms-item.ms-select-all { font-weight: 500; border-bottom: 1px solid var(--border); margin-bottom: 2px; white-space: nowrap; }
.ms-item input[type="checkbox"] { flex-shrink: 0; cursor: pointer; width: 14px; height: 14px; margin: 0; }
.cat-select-inline { height: 24px; font-size: 11px; padding: 0 6px; border-radius: 6px; }

.cat-combo { position: relative; width: 100%; }
.cat-combo input { width: 100%; }
.cat-combo-inline input { height: 24px; font-size: 11px; padding: 0 6px; }
.cat-dropdown {
  position: absolute; top: calc(100% + 3px); left: 0; right: 0; z-index: 60;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,.12);
  max-height: 200px; overflow-y: auto;
}
.cat-dropdown.drop-up { top: auto; bottom: calc(100% + 3px); }
.cat-dropdown-item {
  display: block; width: 100%; padding: 7px 12px;
  border: none; background: none; text-align: left;
  font-size: 13px; color: var(--text); cursor: pointer;
}
.cat-dropdown-item:first-child { border-radius: 6px 6px 0 0; }
.cat-dropdown-item:last-child  { border-radius: 0 0 6px 6px; }
.cat-dropdown-item.active { background: var(--accent-light); color: var(--accent); }

.cat-field { display: flex; flex-direction: column; gap: 2px; }
.cat-field select { width: 100%; }
.cat-suggest-hint {
  font-size: 10px; color: var(--accent); text-align: center;
  letter-spacing: .2px; pointer-events: none;
}

.del-btn {
  width: 36px; height: 36px; flex-shrink: 0; margin-right: 8px;
  border: none; background: transparent; color: #cbd5e1;
  font-size: 18px; cursor: pointer; border-radius: 6px; transition: background .1s, color .1s;
}
.del-btn:hover { background: var(--neg-light); color: var(--neg); }

.del-confirm-yes, .del-confirm-no {
  height: 28px; padding: 0 10px; border-radius: 5px; cursor: pointer;
  font-size: 12px; font-weight: 500; border: none; white-space: nowrap;
  transition: background .1s;
}
.del-confirm-yes { background: var(--neg); color: #fff; margin-right: 4px; }
.del-confirm-yes:hover { background: #b91c1c; }
.del-confirm-no  { background: var(--border); color: var(--text); }
.del-confirm-no:hover  { background: var(--muted); color: #fff; }

/* ── cleared button ───────────────────────────────────────────────────────── */
.cleared-btn {
  width: 28px; height: 28px; flex-shrink: 0;
  border: none; background: transparent; cursor: pointer;
  font-size: 15px; border-radius: 6px; color: var(--border);
  transition: color .15s, background .1s;
  display: flex; align-items: center; justify-content: center;
}
.cleared-btn.is-cleared { color: var(--pos); }
.cleared-btn:hover { background: var(--bg); }

.edit-btn {
  width: 28px; height: 28px; flex-shrink: 0;
  border: none; background: transparent; cursor: pointer;
  font-size: 13px; border-radius: 6px; color: var(--muted);
  transition: background .1s, color .1s;
  display: flex; align-items: center; justify-content: center;
}
.edit-btn:hover { background: var(--accent-light); color: var(--accent); }

/* ── tags ─────────────────────────────────────────────────────────────────── */
.tag-input-wrap {
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface); padding: 3px 8px;
  display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  cursor: text; min-height: 36px;
}
.tag-input-wrap:focus-within { border-color: var(--accent); }
.tag-pill-input {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--accent-light); color: var(--accent);
  border-radius: 999px; padding: 2px 4px 2px 9px; font-size: 12px; font-weight: 500;
}
.tag-pill-input button {
  border: none; background: none; color: var(--accent); cursor: pointer;
  font-size: 13px; padding: 0; line-height: 1;
}
.tag-pill-input button:hover { color: var(--neg); }
.tag-combo-input { position: relative; flex: 1; min-width: 80px; }
.tag-combo-input input {
  border: none; background: none; padding: 2px 4px; width: 100%;
  outline: none; font-size: 13px; color: var(--text);
}
.tx-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.tx-tag  { font-size: 11px; padding: 1px 7px; border-radius: 999px;
  background: var(--accent-light); color: var(--accent); font-weight: 500; }

/* ── duplicate review ─────────────────────────────────────────────────────── */
.review-step  { display: flex; flex-direction: column; gap: 12px; }
.review-note  { font-size: 13px; color: var(--muted); }
.review-pair  { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color .15s; }
.review-pair.decided-match  { border-color: var(--pos); }
.review-pair.decided-import { border-color: var(--accent); }
.review-sides { display: grid; grid-template-columns: 1fr 1fr; }
.review-side  { padding: 12px 14px; border-right: 1px solid var(--border); }
.review-side:last-child { border-right: none; }
.review-side-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 5px; }
.review-side-desc  { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.review-side-sub   { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.review-side-meta  { font-size: 12px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
.review-side-amt   { font-weight: 600; }
.review-actions    { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-top: 1px solid var(--border); background: var(--surface-alt); justify-content: flex-end; }
.review-badge      { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; margin-right: auto; }
.review-badge.match  { background: var(--pos-light);    color: var(--pos);    }
.review-badge.import { background: var(--accent-light); color: var(--accent); }

/* ── import button (header) ───────────────────────────────────────────────── */
.header-actions { margin-left: auto; display: flex; gap: 8px; }

.import-btn, .export-btn {
  height: 34px; padding: 0 14px;
  border-radius: 6px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background .15s;
  white-space: nowrap;
}
.import-btn {
  background: var(--surface); color: var(--accent);
  border: 1px solid var(--accent);
}
.import-btn:hover { background: var(--accent-light); }
.export-btn {
  background: var(--surface); color: var(--muted);
  border: 1px solid var(--border);
}
.export-btn:hover { background: var(--bg); color: var(--text); }

.privacy-btn {
  height: 34px; padding: 0 14px;
  border-radius: 6px; font-size: 13px; font-weight: 500;
  cursor: pointer; white-space: nowrap; transition: all .15s;
  background: var(--surface); color: var(--muted);
  border: 1px solid var(--border);
}

.privacy-btn.active     { background: #1e293b; color: #fff; border-color: #1e293b; }

/* ── modal ────────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;

  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 16px;

.modal {
  background: var(--surface);
  border-radius: var(--radius);

  max-height: 90vh;

.modal-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);

  flex-shrink: 0;
}
.modal-title { font-size: 15px; font-weight: 600; }

  width: 30px; height: 30px; border: none; background: transparent;

}

.modal-body {
  padding: 20px; overflow-y: auto; flex: 1;
  display: flex; flex-direction: column; gap: 20px;
}

.modal-footer {
  padding: 14px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0;
}

  display: flex; align-items: center; gap: 10px;
  background: var(--bg); border-radius: 6px; padding: 10px 14px;
}
.file-name  { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-count { font-size: 12px; color: var(--muted); flex-shrink: 0; }

.block-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;

.mapping-grid  { display: flex; flex-direction: column; gap: 8px; }
.mapping-row   { display: grid; grid-template-columns: 160px 1fr; align-items: center; gap: 12px; }
.mapping-label { font-size: 13px; }

.radio-group { display: flex; gap: 20px; }
.radio-group label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
.check-label       { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
.muted-note        { color: var(--muted); font-size: 12px; }

/* ── preview table ────────────────────────────────────────────────────────── */
.preview-wrap { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }

.preview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.preview-table th {
  background: var(--bg); padding: 7px 10px; text-align: left;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .4px; color: var(--muted); border-bottom: 1px solid var(--border);
}
.preview-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.preview-table tr:last-child td { border-bottom: none; }

.warn { color: #f59e0b; }

/* ── result cards ─────────────────────────────────────────────────────────── */
.result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.result-card { background: var(--bg); border-radius: 8px; padding: 20px 14px; text-align: center; }
.result-num  { font-size: 32px; font-weight: 700; line-height: 1; }
.result-lbl  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 6px; }

/* ── shared buttons ───────────────────────────────────────────────────────── */
.btn-primary {
  height: 36px; padding: 0 18px;

  border: none; border-radius: 6px; font-size: 13px; font-weight: 500;

}
.btn-primary:hover    { opacity: .88; }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }

.btn-secondary {
  height: 36px; padding: 0 18px;

  border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; cursor: pointer; transition: background .1s;
}
.btn-secondary:hover { background: var(--bg); }

.btn-danger {
  height: 36px; padding: 0 18px;
  background: var(--neg); color: #fff;
  border: none; border-radius: 6px; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity .15s;
}
.btn-danger:hover { opacity: .88; }

.truncate-confirm {
  margin-top: 10px; padding: 12px 14px;
  background: var(--neg-light); border: 1px solid var(--neg);
  border-radius: 6px; font-size: 13px;
}

.link-btn {
  background: none; border: none;
  color: var(--accent); font-size: 12px;
  cursor: pointer; padding: 0; text-decoration: underline;

}

/* ── category manager ─────────────────────────────────────────────────────── */
.cat-list { display: flex; flex-direction: column; gap: 2px; }

.cat-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: 6px; gap: 8px;
}
.cat-row:hover { background: var(--bg); }

.cat-name  { font-size: 13px; flex: 1; }
.cat-badge {
  font-size: 10px; color: var(--muted); border: 1px solid var(--border);

  text-transform: uppercase; letter-spacing: .4px;
}

.cat-actions { display: flex; gap: 4px; flex-shrink: 0; }

.cat-btn {
  width: 28px; height: 28px; border: none; background: transparent;
  color: var(--muted); border-radius: 5px; cursor: pointer; font-size: 13px;

}
.cat-btn:hover     { background: var(--border); color: var(--text); }

.cat-budget-wrap   { display:flex; align-items:center; gap:3px; flex-shrink:0; }

}

.budget-indicator { font-size:11px; font-weight:600; text-align:right; white-space:nowrap; }
.budget-over      { color:var(--neg); }

.cat-add-row { display: flex; gap: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

/* ── transfer linker ──────────────────────────────────────────────────────── */
.link-source-card {

.link-candidate {

.lc-left { flex: 1; min-width: 0; }

.lc-amt  { font-size: 14px; font-weight: 600; flex-shrink: 0; }

  border: 1px solid #cbd5e1; border-radius: 999px;

  border-bottom: 2px solid var(--border);
  background: var(--surface);

}
.tab-btn {
  padding: 11px 18px;
  border: none; background: transparent;

  color: var(--accent);

/* ── dashboard ────────────────────────────────────────────────────────────── */
.dashboard { display: flex; flex-direction: column; gap: 20px; }

.range-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.range-tab {
  padding: 5px 13px;
  border: 1px solid var(--border); border-radius: 999px;

}

.range-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.dash-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;

  font-size: 12px; font-weight: 600; text-transform: uppercase;

/* account cards */
.acct-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
}
.acct-card {
  background: var(--bg);

.acct-divider { color: var(--border); }
.acct-last-date { font-size: 11px; color: var(--muted); }

.acct-reconcile-btn {
  margin-top: 6px; padding: 4px 0;
  background: none; border: none;
  color: var(--accent); font-size: 11px;
  cursor: pointer; text-align: left;
  opacity: .7; transition: opacity .15s;
}

.nav-link {
  cursor: pointer;
  transition: color .15s;
}
.nav-link:hover { color: var(--accent); text-decoration: underline; }

/* category bars */
.cat-bar-row {
  display: grid;
  grid-template-columns: 130px 1fr 80px 80px;
  align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.cat-bar-row:last-child { margin-bottom: 0; }
.cat-bar-label { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-bar-track {
  height: 8px; border-radius: 999px;

}
.cat-bar-fill { height: 100%; border-radius: 999px; transition: width .4s ease; }
.cat-bar-pct  { font-size: 11px; color: var(--muted); text-align: right; }
.cat-bar-amt  { font-size: 12px; font-weight: 500; text-align: right; }

/* monthly chart */
.monthly-chart {
  display: flex; gap: 10px;
}
.month-col {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.month-bars {
  height: 110px; width: 100%;
  display: flex; align-items: flex-end; gap: 3px;
}
.month-bar-wrap {
  flex: 1; height: 100%;
  display: flex; align-items: flex-end;
}
.month-bar {
  width: 100%; border-radius: 3px 3px 0 0;
  min-height: 2px; transition: height .35s ease;
}
.income-bar  { background: var(--pos); opacity: .8; }
.expense-bar { background: var(--neg); opacity: .8; }
.month-label { font-size: 10px; color: var(--muted); }

.chart-legend {
  display: flex; align-items: center; gap: 6px;
  margin-top: 12px; justify-content: flex-end;
}
.legend-dot   { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-label { font-size: 11px; color: var(--muted); }
.legend-gap   { width: 12px; }

/* settings modal ───────────────────────────────────────────────────────────── */
.setting-section { display: flex; flex-direction: column; gap: 10px; }

.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 0; gap: 12px;
}
.setting-label { font-size: 13px; }

.theme-toggle { display: flex; gap: 6px; }
.theme-btn {
  padding: 5px 14px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--muted);
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s;
}
.theme-btn:hover        { border-color: #adb5bd; color: var(--text); }
.theme-btn.active       { background: var(--accent); border-color: var(--accent); color: #fff; }

.setting-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* drag-and-drop category manager */
.drag-handle {
  cursor: grab; color: var(--border); font-size: 14px;
  padding: 0 4px; user-select: none; flex-shrink: 0;
  line-height: 1;
}
.drag-handle:active { cursor: grabbing; }
.dragging { opacity: .35; }

.cat-group-header {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 4px 5px; margin-top: 6px;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: var(--muted);
  border-bottom: 1px solid var(--border);
  cursor: grab;
}
.cat-group-header:first-child { margin-top: 0; }
.cat-group-label { flex: 1; cursor: text; }
.cat-group-label:hover { color: var(--text); }
.cat-group-input {
  flex: 1; height: 22px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .4px;
  padding: 0 6px; border-radius: 4px;

.cat-row-indent { padding-left: 20px; }

.drop-line {
  height: 2px; background: var(--accent);
  border-radius: 1px; margin: 0;
  pointer-events: none;
}

.cat-new-group-row { display: flex; gap: 8px; margin-bottom: 8px; }
.cat-new-group-row input { flex: 1; }

/* combobox group headers */
.cat-dropdown-header {
  padding: 6px 12px 3px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: var(--muted);
  cursor: default; pointer-events: none;
  border-top: 1px solid var(--border);
}
.cat-dropdown-header:first-child { border-top: none; }

/* ── planning ─────────────────────────────────────────────────────────────── */
.plan-month-nav { display: flex; align-items: center; gap: 10px; }
.plan-month-nav button {
  width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px;

.plan-month-label { font-size: 18px; font-weight: 700; min-width: 180px; text-align: center; letter-spacing: -.3px; }

.plan-kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; }
.plan-kpi {

.plan-kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); font-weight: 600; }
.plan-kpi-value { font-size: 22px; font-weight: 700; letter-spacing: -.5px; line-height: 1.1; }
.plan-kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

.plan-table { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); }

.plan-cols { grid-template-columns: 20px 1fr 110px 90px 120px 1fr; }
.plan-row-header {
  display: grid; gap: 12px; padding: 9px 16px;
  font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); font-weight: 600;

.plan-section { display: flex; flex-direction: column; }
.plan-section + .plan-section { border-top: 1px solid var(--border); }

.plan-section-title-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-alt); border-bottom: 1px solid var(--border);
  padding: 7px 16px; cursor: grab; user-select: none;
}
.plan-section-title-row:active { cursor: grabbing; }

.plan-row {

}
.plan-row:last-child { border-bottom: none; }
.plan-row:hover { background: var(--surface-alt); }

.plan-cat-name { font-size: 13px; font-weight: 500; }
.plan-budget-display {

  transition: border-color .15s, background .15s, color .15s;
  font-family: inherit;
}
.plan-budget-display:hover { border-color: var(--border); background: var(--surface-alt); }
.plan-budget-empty { color: var(--muted); font-weight: 400; }
.plan-budget-empty:hover { color: var(--text); }
.plan-budget-input {
  width: 100%; font-size: 13px; font-weight: 600; padding: 5px 8px; text-align: right;
  border: 1px solid var(--accent); border-radius: 6px;
  background: var(--bg); color: var(--text); outline: none;
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
  font-family: inherit;
}
.plan-budget-input::placeholder { color: var(--muted); }

.plan-spent { font-size: 13px; font-weight: 500; text-align: right; }
.plan-delta { font-size: 12px; font-weight: 600; text-align: right; }

.plan-bar-wrap { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.plan-bar-track { height: 8px; border-radius: 999px; background: var(--border); overflow: hidden; }
.plan-bar-fill  { height: 100%; border-radius: 999px; transition: width .4s ease; }
.plan-bar-pct   { font-size: 10px; color: var(--muted); text-align: right; line-height: 1; }

.plan-unbudgeted .plan-cat-name { color: var(--muted); font-style: italic; }

.plan-total-row {

/* ── responsive ───────────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .summary       { grid-template-columns: 1fr; }
  .form-grid     { grid-template-columns: 1fr 1fr; }
  .f-merchant    { grid-column: 1 / -1; }
  .f-desc        { grid-column: 1 / -1; }
  .f-account     { grid-column: 1 / -1; }

  .filter-row-2 .filter-wrap { flex: 1 1 120px; }
  .mapping-row   { grid-template-columns: 1fr; }
  .result-grid   { grid-template-columns: 1fr; }
  .cat-bar-row   { grid-template-columns: 90px 1fr 64px 64px; }

}

  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

const DEFAULT_CATEGORIES = [
  'Food & Dining','Housing','Transport','Entertainment',
  'Healthcare','Shopping','Utilities','Income','Savings','Other','Transfer','Reconciliation'
];
const TRANSFER_CAT    = 'Transfer';
const RECONCILE_CAT   = 'Reconciliation';
const PROTECTED_CATS  = new Set([TRANSFER_CAT, RECONCILE_CAT]);
// Excluded from income/expense totals and charts, but counted in per-account balances
const isExcluded = (t) => PROTECTED_CATS.has(t.category);

// ── persistence ───────────────────────────────────────────────────────────────
function useLocalStorage(key, initial) {
  const [value, setValue] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  useEffect(() => { localStorage.setItem(key, JSON.stringify(value)); }, [key, value]);
  return [value, setValue];
}

// ── formatting ────────────────────────────────────────────────────────────────
const fmt   = (n) => new Intl.NumberFormat('en-US', { style:'currency', currency:'USD' }).format(Math.abs(n));
const today = ()  => new Date().toISOString().split('T')[0];

// ── category guesser ──────────────────────────────────────────────────────────
function guessCategory(desc, transactions) {
  const norm = desc.toLowerCase().trim();
  if (norm.length < 3 || transactions.length === 0) return null;

  // Build frequency map: normalized description → { category: count }
  const freq = {};
  for (const t of transactions) {
    const key = t.description.toLowerCase().trim();
    if (!freq[key]) freq[key] = {};
    freq[key][t.category] = (freq[key][t.category] || 0) + 1;
  }

  const catScores = {};
  for (const [key, cats] of Object.entries(freq)) {
    let score = 0;
    if (key === norm) {
      score = 100;
    } else if (key.startsWith(norm) || norm.startsWith(key)) {
      score = 10 * (Math.min(key.length, norm.length) / Math.max(key.length, norm.length));
    } else {
      const normWords = norm.split(/\s+/).filter(w => w.length > 2);
      const keyWords  = key.split(/\s+/).filter(w => w.length > 2);
      if (normWords.length > 0 && keyWords.length > 0) {
        const hits = normWords.filter(w => keyWords.some(kw => kw.includes(w) || w.includes(kw)));
        if (hits.length > 0) score = hits.length / Math.max(normWords.length, keyWords.length);
      }
    }
    if (score > 0) {
      const total = Object.values(cats).reduce((a, b) => a + b, 0);
      const best  = Object.entries(cats).sort((a, b) => b[1] - a[1])[0][0];
      catScores[best] = (catScores[best] || 0) + score * total;
    }
  }

  if (Object.keys(catScores).length === 0) return null;
  return Object.entries(catScores).sort((a, b) => b[1] - a[1])[0][0];
}

// ── CSV parsing ───────────────────────────────────────────────────────────────
function parseCSVRow(line) {
  const result = [];
  let current = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (c === ',' && !inQuotes) {
      result.push(current.trim()); current = '';
    } else {
      current += c;
    }
  }
  result.push(current.trim());
  return result;
}

function parseCSV(text) {
  const clean = text.replace(/^﻿/, ''); // strip BOM
  const lines = clean.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return null;
  const headers = parseCSVRow(lines[0]);
  const rows = lines.slice(1)
    .map(line => {
      const vals = parseCSVRow(line);
      const row = {};
      headers.forEach((h, i) => { row[h] = (vals[i] ?? '').trim(); });
      return row;
    })
    .filter(row => Object.values(row).some(v => v !== ''));
  return { headers, rows };
}

function normalizeDate(str) {
  if (!str) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  const mdy = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (mdy) return `${mdy[3]}-${mdy[1].padStart(2,'0')}-${mdy[2].padStart(2,'0')}`;
  const mdy2 = str.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if (mdy2) return `${mdy2[3]}-${mdy2[1].padStart(2,'0')}-${mdy2[2].padStart(2,'0')}`;
  const d = new Date(str);
  return isNaN(d.getTime()) ? str : d.toISOString().split('T')[0];
}

function parseAmount(str) {
  if (str === null || str === undefined || str === '') return null;
  const s = String(str).trim();
  if (!s) return null;
  const neg = (s.startsWith('(') && s.endsWith(')')) || s.startsWith('-');
  const n = parseFloat(s.replace(/[($,\s)]/g, ''));
  if (isNaN(n)) return null;
  return neg ? -Math.abs(n) : n;
}

function autoDetect(headers) {
  const find = (pats) => headers.find(h => pats.some(p => p.test(h))) || '';
  const merchantCol = find([/^merchant$/i, /^payee$/i, /^vendor$/i, /merchant.?name/i, /payee.?name/i, /^store$/i, /^retailer$/i, /^business$/i, /^recipient$/i, /transaction.?name/i]);
  const descCol     = find([/^description$/i, /^name$/i, /^memo$/i, /transaction.?desc/i, /narrative/i]);
  return {
    dateCol:     find([/^date$/i, /transaction.?date/i, /posted.?date/i, /posting.?date/i, /trans.?date/i]),
    merchantCol: merchantCol || descCol,
    descCol:     merchantCol ? descCol : '',
    amountCol:   find([/^amount$/i, /transaction.?amount/i]),
    debitCol:    find([/^debit$/i, /debit.?amount/i, /withdrawal/i]),
    creditCol:   find([/^credit$/i, /credit.?amount/i, /deposit/i]),
    txNumCol:    find([/^txNum$/i, /^tx_num$/i, /^transaction.?num/i]),
  };
}

function applyMapping(row, mapping) {
  const date        = normalizeDate(row[mapping.dateCol] || '');
  const merchant    = (row[mapping.merchantCol] || '').replace(/\s+/g, ' ').trim();
  const description = (row[mapping.descCol] || '').replace(/\s+/g, ' ').trim();
  let amount = null;

  if (mapping.amountMode === 'single') {
    amount = parseAmount(row[mapping.amountCol]);
    if (amount !== null && mapping.negateAmount) amount = -amount;
  } else {
    const debit  = parseAmount(row[mapping.debitCol])  ?? 0;
    const credit = parseAmount(row[mapping.creditCol]) ?? 0;
    amount = credit - debit;
  }

  const txNum = mapping.txNumCol
    ? (parseInt(row[mapping.txNumCol], 10) || null)
    : null;
  const valid = !!date && amount !== null && !isNaN(amount) && !!merchant;
  return { date, merchant, description, amount, txNum, valid };
}

function ColSelect({ value, onChange, opts }) {

    <select value={value} onChange={e => onChange(e.target.value)}>

      <div>{children}</div>

}
