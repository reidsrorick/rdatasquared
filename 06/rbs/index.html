// ── DoneStep ──────────────────────────────────────────────────────────────────
function DoneStep({ result }) {
  const [showExact, setShowExact] = React.useState(false);
  const cards = result.replaced != null
    ? [
        { num: result.imported,  label: 'Imported',  color: result.imported > 0 ? 'var(--pos)' : 'var(--muted)' },
        { num: result.replaced,  label: 'Deleted',   color: result.replaced > 0 ? 'var(--neg)' : 'var(--muted)' },
        { num: result.errors,    label: 'Rows skipped', color: result.errors > 0 ? 'var(--neg)' : 'var(--muted)' },
      ]
    : [
        { num: result.imported,    label: 'Imported',           color: result.imported > 0 ? 'var(--pos)' : 'var(--muted)' },
        result.flagged != null
          ? { num: result.flagged,    label: 'Flagged for review',  color: result.flagged > 0 ? '#d97706' : 'var(--muted)' }
          : { num: result.duplicates, label: 'Auto-skipped (exact)', color: 'var(--muted)' },
        { num: result.errors,      label: 'Rows skipped',       color: result.errors > 0 ? 'var(--neg)' : 'var(--muted)' },
      ];
  return (
    <>
      <div className="result-grid">
        {cards.map(c => (
          <div key={c.label} className="result-card">
            <div className="result-num" style={{color: c.color}}>{c.num}</div>
            <div className="result-lbl">{c.label}</div>
          </div>
        ))}
      </div>
      {result.exactSkips?.length > 0 && (
        <div style={{marginTop:'12px'}}>
          <button onClick={() => setShowExact(s => !s)}
            style={{fontSize:'12px',color:'var(--accent)',background:'none',border:'none',cursor:'pointer',padding:0,fontWeight:600}}>
            {showExact ? '▲ Hide' : '▼ Show'} {result.exactSkips.length} auto-skipped (already in database)
          </button>
          {showExact && (
            <div style={{marginTop:'8px',maxHeight:'180px',overflowY:'auto'}}>
              {result.exactSkips.map((r, i) => (
                <p key={i} style={{fontSize:'11px',color:'var(--muted)',fontFamily:'monospace',marginBottom:'3px'}}>
                  {r.date} | {r.amount >= 0 ? '+' : ''}{r.amount} | {r.merchant || '—'} | {r.description || '—'} | {r.accountName || '—'}
                </p>
              ))}
            </div>
          )}
        </div>
      )}
      {result.skippedRows?.length > 0 && (
        <div style={{marginTop:'12px'}}>
          <p style={{fontSize:'12px',color:'var(--neg)',marginBottom:'6px',fontWeight:600}}>Rows skipped (missing date or unparseable amount):</p>
          {result.skippedRows.map((r, i) => (
            <p key={i} style={{fontSize:'11px',color:'var(--muted)',fontFamily:'monospace'}}>
              date="{r.date}" amount={r.amount} merchant="{r.merchant}" desc="{r.description}"
            </p>
          ))}
        </div>
      )}
    </>
  );
}

// ── CSVImporter ───────────────────────────────────────────────────────────────
const DEFAULT_MAPPING = {
  dateCol:'', merchantCol:'', descCol:'', amountMode:'single',
  amountCol:'', negateAmount:false, debitCol:'', creditCol:'',
  txNumCol:'', accountName:'', defaultCategory:'Other', importMode:'append'
};

function CSVImporter({ transactions, onImport, onUpdate, onReplaceAll, categories, externalFile, onExternalFileConsumed }) {
  const fileRef = useRef(null);
  const [open, setOpen]       = useState(false);
  const [step, setStep]       = useState('map');
  const [csvData, setCsvData] = useState(null);
  const [fileName, setFileName] = useState('');
  const [mapping, setMapping] = useState(DEFAULT_MAPPING);
  const [result, setResult]         = useState(null);
  const [pendingReplace, setPendingReplace] = useState(null);
  const [importSettings, setImportSettings] = useLocalStorage('budget_import_settings', {});

  const setMap = (k, v) => setMapping(m => ({ ...m, [k]: v }));

  const handleFile = async (file) => {
    if (!file) return;
    const text = await file.text();
    const parsed = parseCSV(text);
    if (!parsed) { alert('Could not parse CSV — make sure it has a header row.'); return; }
    const auto = autoDetect(parsed.headers);
    const s    = importSettings;
    // For column fields: prefer auto-detect, fall back to saved if that column still exists
    const col  = (autoVal, key) => autoVal || (s[key] && parsed.headers.includes(s[key]) ? s[key] : '');
    let amountMode;
    if (auto.amountCol)                         amountMode = 'single';
    else if (auto.debitCol || auto.creditCol)   amountMode = 'split';
    else                                         amountMode = s.amountMode || 'single';
    const name = file.name.replace(/\.csv$/i, '');
    setFileName(file.name);
    setCsvData(parsed);
    setMapping({
      ...DEFAULT_MAPPING,
      dateCol:         col(auto.dateCol,     'dateCol'),
      merchantCol:     col(auto.merchantCol, 'merchantCol'),
      descCol:         col(auto.descCol,     'descCol'),
      amountCol:       col(auto.amountCol,'amountCol'),
      debitCol:        col(auto.debitCol, 'debitCol'),
      creditCol:       col(auto.creditCol,'creditCol'),
      txNumCol:        col(auto.txNumCol, 'txNumCol'),
      amountMode,
      negateAmount:    s.negateAmount    ?? false,
      defaultCategory: s.defaultCategory || 'Other',
      importMode:      s.importMode      || 'append',
      accountName:     name,
    });
    setStep('map');
    setOpen(true);
  };

  useEffect(() => {
    if (externalFile) { handleFile(externalFile); onExternalFileConsumed?.(); }
  }, [externalFile]);

  const previewRows = useMemo(() => {
    if (!csvData) return [];
    return csvData.rows.slice(0, 5).map(row => applyMapping(row, mapping));
  }, [csvData, mapping]);

  const handleConfirmReplace = () => {
    if (!pendingReplace) return;
    const { accountName: _omit, ...settingsToSave } = mapping;
    setImportSettings(settingsToSave);
    onReplaceAll(pendingReplace.rows);
    setResult({ imported: pendingReplace.rows.length, replaced: transactions.length, errors: pendingReplace.errors });
    setPendingReplace(null);
    setStep('done');
  };

  const parseCleared = (raw) => {
    if (raw === undefined || raw === null || raw === '') return undefined;
    const v = String(raw).trim().toLowerCase();
    if (v === 'true'  || v === '1' || v === 'yes' || v === 'y') return true;
    if (v === 'false' || v === '0' || v === 'no'  || v === 'n') return false;
    return undefined;
  };

  const handleImport = () => {
    // Build a case-insensitive lookup for CSV columns
    const getCol = (row, name) => {
      const key = csvData.headers.find(h => h.toLowerCase() === name.toLowerCase());
      return key != null ? row[key] : undefined;
    };

    // Replace-all mode: parse rows then go to confirmation step
    if (mapping.importMode === 'replace') {
      let errors = 0;
      const rows = [];
      for (const row of csvData.rows) {
        const mapped = applyMapping(row, mapping);
        if (!mapped.valid) { errors++; continue; }
        const rawCleared  = getCol(row, 'cleared');
        const rawTags     = getCol(row, 'tags');
        const rawTransId  = getCol(row, 'transferId');
        rows.push({
          id:          crypto.randomUUID(),
          ...(mapped.txNum ? { txNum: mapped.txNum } : {}),
          merchant:    mapped.merchant,
          description: mapped.description,
          amount:      mapped.amount,
          date:        mapped.date,
          category:    getCol(row, 'category')    || mapping.defaultCategory,
          accountName: getCol(row, 'accountName') || mapping.accountName || '',
          cleared:     parseCleared(rawCleared),
          tags:        rawTags ? rawTags.split(';').filter(Boolean) : [],
          ...(rawTransId ? { transferId: rawTransId } : {}),
        });
      }
      setPendingReplace({ rows, errors });
      setStep('confirm-replace');
      return;
    }

    let imported = 0, skipped = 0, flagged = 0, errors = 0;
    const newTx = [];
    const skippedRows = [];
    const exactSkips = [];

    for (const row of csvData.rows) {
      const mapped = applyMapping(row, mapping);
      if (!mapped.valid) {
        errors++;
        skippedRows.push({ date: mapped.date, amount: mapped.amount, merchant: mapped.merchant, description: mapped.description });
        continue;
      }

      // Exact match: ALL fields must match — date, amount, merchant, description, accountName
      // txNum is an additional confirmation but requires date+amount to also match (prevents
      // false matches when a user copies a row and changes its content but leaves the txNum)
      const acct = (mapping.accountName || '').toLowerCase();
      const exactMatch = transactions.find(t =>
        t.date === mapped.date &&
        Math.abs(t.amount - mapped.amount) < 0.005 &&
        (t.merchant || '').toLowerCase() === (mapped.merchant || '').toLowerCase() &&
        (t.description || '').toLowerCase() === (mapped.description || '').toLowerCase() &&
        (t.accountName || '').toLowerCase() === acct
      ) || (mapped.txNum
        ? transactions.find(t =>
            t.txNum === mapped.txNum &&
            t.date === mapped.date &&
            Math.abs(t.amount - mapped.amount) < 0.005
          )
        : null);

      if (exactMatch) {
        skipped++;
        exactSkips.push({ date: mapped.date, amount: mapped.amount, merchant: mapped.merchant, description: mapped.description, accountName: mapping.accountName });
        continue;
      }

      // Fuzzy match: same amount, date within 3 days — import it but stamp fuzzyMatchId for in-list review
      const fuzzyMatch = transactions.find(t => {
        if (t.duplicateOf || t.fuzzyMatchId) return false;
        const dayDiff = Math.abs(new Date(t.date) - new Date(mapped.date)) / 86400000;
        return dayDiff <= 3 && Math.abs(t.amount - mapped.amount) < 0.005;
      });

      const rawCleared = getCol(row, 'cleared');
      const tx = {
        id: crypto.randomUUID(),
        ...(mapped.txNum ? { txNum: mapped.txNum } : {}),
        merchant:    mapped.merchant,
        description: mapped.description,
        amount:      mapped.amount,
        date:        mapped.date,
        category:    getCol(row, 'category') || mapping.defaultCategory,
        accountName: getCol(row, 'accountName') || mapping.accountName || '',
        cleared:     parseCleared(rawCleared) ?? true,
        tags:        (() => { const tg = getCol(row, 'tags'); return tg ? tg.split(';').filter(Boolean) : []; })(),
        ...(fuzzyMatch ? { fuzzyMatchId: fuzzyMatch.txNum } : {}),
      };
      newTx.push(tx);
      imported++;
      if (fuzzyMatch) flagged++;
    }

    const { accountName: _omit, ...settingsToSave } = mapping;
    setImportSettings(settingsToSave);
    if (newTx.length > 0) onImport(newTx);
    setResult({ imported, flagged, duplicates: skipped, errors, skippedRows, exactSkips });
    setStep('done');
  };

  const close = () => { setOpen(false); setStep('map'); setResult(null); };
  const canImport = mapping.dateCol && mapping.merchantCol &&
    (mapping.amountMode === 'single' ? mapping.amountCol : (mapping.debitCol || mapping.creditCol));

  return (
    <>
      <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}}
        onChange={e => { handleFile(e.target.files[0]); e.target.value = ''; }} />

      {open && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && close()}>
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">
                {step === 'done' ? 'Import Complete' : step === 'confirm-replace' ? 'Confirm Replace All' : 'Import CSV'}
              </span>
              <button className="modal-close" onClick={close}>×</button>
            </div>

            <div className="modal-body">
              {step === 'map' && csvData && (
                <MapStep
                  csvData={csvData} fileName={fileName}
                  mapping={mapping} setMap={setMap}
                  previewRows={previewRows}
                  onChangeFile={() => fileRef.current.click()}
                  categories={categories}
                />
              )}
              {step === 'confirm-replace' && pendingReplace && (
                <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
                  <div className="truncate-confirm">
                    <p>This will <strong>permanently delete all {transactions.length} existing transaction{transactions.length !== 1 ? 's' : ''}</strong> and replace them with the <strong>{pendingReplace.rows.length} rows</strong> from this CSV.</p>
                    <p style={{marginTop:'8px',color:'var(--neg)',fontWeight:600}}>This cannot be undone.</p>
                  </div>
                  {pendingReplace.errors > 0 && (
                    <p className="muted-note">{pendingReplace.errors} row{pendingReplace.errors !== 1 ? 's' : ''} could not be parsed and will be skipped.</p>
                  )}
                </div>
              )}
              {step === 'done' && result && <DoneStep result={result} />}
            </div>

            <div className="modal-footer">
              {step === 'map' && <>
                <button className="btn-secondary" onClick={close}>Cancel</button>
                <button className="btn-primary" onClick={handleImport} disabled={!canImport}>
                  Import {csvData?.rows.length} rows →
                </button>
              </>}
              {step === 'confirm-replace' && <>
                <button className="btn-secondary" onClick={close}>Cancel</button>
                <button className="btn-danger" onClick={handleConfirmReplace}>
                  Yes, Replace All Data
                </button>
              </>}
              {step === 'done' && <>
                <button className="btn-secondary"
                  onClick={() => { setStep('map'); setResult(null); fileRef.current.click(); }}>
                  Import Another
                </button>
                <button className="btn-primary" onClick={close}>Done</button>
              </>}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ── DuplicateLinker ───────────────────────────────────────────────────────────
function DuplicateLinker({ tx, transactions, onLink, onClose }) {
  const matchedTx = transactions.find(t => t.txNum === tx.fuzzyMatchId && !t.duplicateOf);
  const [masterId, setMasterId] = useState(matchedTx?.id ?? tx.id);

  if (!matchedTx) {
    return (
      <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="modal" style={{maxWidth:'400px'}}>
          <div className="modal-header">
            <span className="modal-title">Link Duplicate</span>
            <button className="modal-close" onClick={onClose}>×</button>
          </div>
          <div className="modal-body">
            <p style={{color:'var(--muted)',fontSize:'13px'}}>The matched transaction no longer exists. You can dismiss the flag instead.</p>
          </div>
          <div className="modal-footer">
            <button className="btn-secondary" onClick={onClose}>Cancel</button>
            <button className="btn-primary" onClick={() => { onLink(null, tx.id); onClose(); }}>Dismiss Flag</button>
          </div>
        </div>
      </div>
    );
  }

  const handleLink = () => {
    const secondaryId = masterId === tx.id ? matchedTx.id : tx.id;
    onLink(masterId, secondaryId);
    onClose();
  };

  const Side = ({ t, isFuzzy }) => (
    <div className={`dup-linker-side${masterId === t.id ? ' selected' : ''}`} onClick={() => setMasterId(t.id)}>
      <div className="dup-linker-radio">
        <input type="radio" readOnly checked={masterId === t.id} style={{accentColor:'var(--accent)'}} />
        Master
        {isFuzzy && <span className="fuzzy-badge">~ bank import</span>}
      </div>
      <div className="dup-linker-desc">{t.merchant || t.description || '—'}</div>
      {t.merchant && t.description && <div className="dup-linker-sub">{t.description}</div>}
      <div className="dup-linker-meta">
        <span>{t.date}</span>
        <span className={t.amount >= 0 ? 'pos' : 'neg'}>{t.amount >= 0 ? '+' : '−'}{fmt(t.amount)}</span>
        {t.accountName && <span>{t.accountName}</span>}
        {t.category && <span>{t.category}</span>}
      </div>
    </div>
  );

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:'560px'}}>
        <div className="modal-header">
          <span className="modal-title">Link Duplicate Transactions</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="dup-linker-pair">
            <Side t={matchedTx} isFuzzy={false} />
            <Side t={tx} isFuzzy={true} />
          </div>
          <p className="dup-linker-note">Select the <strong>Master</strong> to keep visible. The other will be hidden but stored for future duplicate detection.</p>
        </div>
        <div className="modal-footer">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={handleLink}>Link Pair</button>
        </div>
      </div>
    </div>
  );
}

// ── CategoryManager ───────────────────────────────────────────────────────────
function CategoryManager({ structure, budgets, onSetBudget, onAddCat, onRenameCat, onDeleteCat, onAddGroup, onRenameGroup, onDeleteGroup, onReorderStructure, onClose }) {
  const [newCat, setNewCat]         = useState('');
  const [newGroup, setNewGroup]     = useState('');
  const [showGroupInput, setShowGroupInput] = useState(false);
  const [editingCat, setEditingCat] = useState(null);   // { idx, value }
  const [editingGroup, setEditingGroup] = useState(null); // { id, value }
  const [error, setError]           = useState('');
  // Use a ref for the dragged index so handleDrop always reads the current value
  // (useState would be stale inside the drop closure)
  const dragIdxRef = useRef(null);
  const [draggingIdx, setDraggingIdx] = useState(null); // visual only
  const [dragOverIdx, setDragOverIdx] = useState(null);

  const categories = useMemo(() =>
    structure.filter(i => i.kind === 'cat').map(i => i.name),
    [structure]
  );

  const handleAddCat = () => {
    const name = newCat.trim();
    if (!name) return;
    if (categories.map(c => c.toLowerCase()).includes(name.toLowerCase()))
      return setError('Category already exists.');
    onAddCat(name);
    setNewCat(''); setError('');
  };

  const handleAddGroup = () => {
    const name = newGroup.trim();
    if (!name) return;
    onAddGroup(name);
    setNewGroup(''); setShowGroupInput(false);
  };

  const commitRenameCat = (idx) => {
    const item = structure[idx];
    const name = editingCat.value.trim();
    setEditingCat(null);
    if (!name || name === item.name) return;
    if (categories.map(c => c.toLowerCase()).includes(name.toLowerCase()))
      return setError('Category already exists.');
    onRenameCat(item.name, name); setError('');
  };

  const commitRenameGroup = (id) => {
    const name = editingGroup.value.trim();
    setEditingGroup(null);
    if (!name) return;
    onRenameGroup(id, name);
  };

  // Drag-and-drop — dragstart per item, dragover/drop on the container
  const handleDragStart = (e, idx) => {
    dragIdxRef.current = idx;
    setDraggingIdx(idx);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(idx));
  };

  const clearDrag = () => { dragIdxRef.current = null; setDraggingIdx(null); setDragOverIdx(null); };

  // Container-level: compute insert index from mouse Y using bounding rects
  const getDropIdx = (e) => {
    const rows = e.currentTarget.querySelectorAll('[data-drag-idx]');
    for (const row of rows) {
      const rect = row.getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) return parseInt(row.dataset.dragIdx);
    }
    return structure.length; // drop at end
  };

  const handleListDragOver = (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    setDragOverIdx(getDropIdx(e));
  };

  const handleListDrop = (e) => {
    e.preventDefault();
    const from = dragIdxRef.current;
    const to   = getDropIdx(e);
    if (from === null) { clearDrag(); return; }

    const src  = structure[from];
    let next   = [...structure];

    if (src.kind === 'group') {
      let end = from + 1;
      while (end < next.length && next[end].kind === 'cat') end++;
      const block = next.splice(from, end - from);
      const adj = to > from ? Math.max(0, to - block.length) : to;
      next.splice(adj, 0, ...block);
    } else {
      const [item] = next.splice(from, 1);
      const adj = to > from ? to - 1 : to;
      next.splice(Math.max(0, adj), 0, item);
    }

    onReorderStructure(next);
    clearDrag();
  };

  const handleDragEnd = clearDrag;

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:'480px'}}>
        <div className="modal-header">
          <span className="modal-title">Manage Categories</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {error && <p className="form-error">{error}</p>}

          {/* New group row */}
          {showGroupInput
            ? <div className="cat-new-group-row">
                <input autoFocus placeholder="Group name" value={newGroup}
                  onChange={e => setNewGroup(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') handleAddGroup(); if (e.key === 'Escape') { setShowGroupInput(false); setNewGroup(''); } }} />
                <button className="btn-primary" onClick={handleAddGroup} disabled={!newGroup.trim()}>Add</button>
                <button className="btn-secondary" onClick={() => { setShowGroupInput(false); setNewGroup(''); }}>Cancel</button>
              </div>
            : <button className="btn-secondary" style={{marginBottom:'8px'}}
                onClick={() => setShowGroupInput(true)}>+ New Group</button>
          }

          <div className="cat-list"
            onDragOver={handleListDragOver}
            onDrop={handleListDrop}>
            {structure.map((item, idx) => {
              const isGroup = item.kind === 'group';
              const isDragging = draggingIdx === idx;

              if (isGroup) {
                const isEditingThis = editingGroup?.id === item.id;
                return (
                  <React.Fragment key={item.id}>
                    {dragOverIdx === idx && <div className="drop-line" />}
                    <div
                      data-drag-idx={idx}
                      className={`cat-group-header${isDragging ? ' dragging' : ''}`}
                      draggable
                      onDragStart={e => handleDragStart(e, idx)}
                      onDragEnd={handleDragEnd}
                    >
                      <span className="drag-handle">⠿</span>
                      {isEditingThis
                        ? <input autoFocus className="cat-group-input" value={editingGroup.value}
                            onChange={e => setEditingGroup(g => ({ ...g, value: e.target.value }))}
                            onKeyDown={e => { if (e.key === 'Enter') commitRenameGroup(item.id); if (e.key === 'Escape') setEditingGroup(null); }}
                            onBlur={() => commitRenameGroup(item.id)} />
                        : <span className="cat-group-label"
                            onClick={() => setEditingGroup({ id: item.id, value: item.name })}>
                            {item.name}
                          </span>
                      }
                      {!isEditingThis && (
                        <button className="cat-btn cat-del" title="Delete group"
                          onClick={() => onDeleteGroup(item.id)}>×</button>
                      )}
                    </div>
                  </React.Fragment>
                );
              }

              // category item
              const isProtected = PROTECTED_CATS.has(item.name);
              const isEditingThis = editingCat?.idx === idx;
              return (
                <React.Fragment key={`cat-${item.name}-${idx}`}>
                  {dragOverIdx === idx && <div className="drop-line" />}
                  <div
                    data-drag-idx={idx}
                    className={`cat-row cat-row-indent${isDragging ? ' dragging' : ''}`}
                    draggable={!isProtected}
                    onDragStart={e => handleDragStart(e, idx)}
                    onDragEnd={handleDragEnd}
                  >
                    {!isProtected && <span className="drag-handle">⠿</span>}
                    {isEditingThis
                      ? <input autoFocus value={editingCat.value}
                          onChange={e => setEditingCat(c => ({ ...c, value: e.target.value }))}
                          onKeyDown={e => { if (e.key === 'Enter') commitRenameCat(idx); if (e.key === 'Escape') setEditingCat(null); }}
                          onBlur={() => commitRenameCat(idx)} />
                      : <span className="cat-name">
                          {item.name}
                          {isProtected && <span className="cat-badge">protected</span>}
                        </span>
                    }
                    {!isEditingThis && !isProtected && (
                      <div className="cat-budget-wrap">
                        <span className="cat-budget-symbol">$</span>
                        <input
                          type="number"
                          className="cat-budget-input"
                          placeholder="budget"
                          min="0"
                          step="1"
                          value={budgets[item.name] ?? ''}
                          onChange={e => onSetBudget(item.name, e.target.value === '' ? null : parseFloat(e.target.value))}
                        />
                      </div>
                    )}
                    {!isEditingThis && !isProtected && (
                      <div className="cat-actions">
                        <button className="cat-btn" title="Rename"
                          onClick={() => { setEditingCat({ idx, value: item.name }); setError(''); }}>✏</button>
                        <button className="cat-btn cat-del" title="Delete"
                          onClick={() => onDeleteCat(item.name)}>×</button>
                      </div>
                    )}
                  </div>
                </React.Fragment>
              );
            })}
            {/* Drop indicator at end of list */}
            {dragOverIdx === structure.length && <div className="drop-line" />}
          </div>

          <div className="cat-add-row">
            <input placeholder="New category name" value={newCat}
              onChange={e => { setNewCat(e.target.value); setError(''); }}
              onKeyDown={e => e.key === 'Enter' && handleAddCat()} />
            <button className="btn-primary" onClick={handleAddCat} disabled={!newCat.trim()}>
              Add
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Summary ───────────────────────────────────────────────────────────────────
function Summary({ transactions, privacy }) {
  const budgetTx  = transactions.filter(t => !isExcluded(t));
  const income    = budgetTx.filter(t => t.amount > 0).reduce((s, t) => s + t.amount, 0);
  const expenses  = budgetTx.filter(t => t.amount < 0).reduce((s, t) => s + t.amount, 0);
  const balance   = income + expenses;
  const mask = (val, cls, prefix = '') => privacy
    ? <span className={`s-amount ${cls}`} style={{letterSpacing:'2px'}}>••••••</span>
    : <span className={`s-amount ${cls}`}>{prefix}{fmt(val)}</span>;
  return (
    <div className="summary">
      <div className="summary-card">
        <span className="s-label">Balance</span>
        {mask(balance, balance >= 0 ? 'pos' : 'neg', balance < 0 ? '−' : '')}
      </div>
      <div className="summary-card">
        <span className="s-label">Income</span>
        {mask(income, 'pos')}
      </div>
      <div className="summary-card">
        <span className="s-label">Expenses</span>
        {mask(expenses, 'neg')}
      </div>
    </div>
  );
}

// ── CategoryCombobox ──────────────────────────────────────────────────────────
function CategoryCombobox({ value, categories, structure, onChange, autoFocus, onDone, inline }) {
  const [query, setQuery]       = useState('');
  const [open, setOpen]         = useState(false);
  const [activeIdx, setActiveIdx] = useState(0);
  const [dropUp, setDropUp]     = useState(false);
  const inputRef = useRef(null);
  const wrapRef  = useRef(null);

  const displayItems = useMemo(() => {
    if (query) {
      return categories
        .filter(c => c.toLowerCase().includes(query.toLowerCase()))
        .map(name => ({ type: 'cat', name }));
    }
    if (!structure) return categories.map(name => ({ type: 'cat', name }));
    const items = [];
    for (const item of structure) {
      if (item.kind === 'group') {
        items.push({ type: 'header', name: item.name });
      } else {
        items.push({ type: 'cat', name: item.name });
      }
    }
    return items;
  }, [query, structure, categories]);

  const firstCatIdx = useMemo(() =>
    displayItems.findIndex(i => i.type === 'cat'),
    [displayItems]
  );

  useEffect(() => {
    setActiveIdx(firstCatIdx >= 0 ? firstCatIdx : 0);
  }, [query, firstCatIdx]);

  useEffect(() => { if (autoFocus) inputRef.current?.focus(); }, []);

  const select = (cat) => {
    onChange(cat);
    setQuery('');
    setOpen(false);
    onDone?.();
  };

  const handleKeyDown = (e) => {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setActiveIdx(i => {
        let next = i + 1;
        while (next < displayItems.length && displayItems[next].type === 'header') next++;
        return next < displayItems.length ? next : i;
      });
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      setActiveIdx(i => {
        let next = i - 1;
        while (next >= 0 && displayItems[next].type === 'header') next--;
        return next >= 0 ? next : i;
      });
      return;
    }
    if ((e.key === 'Tab' || e.key === 'Enter') && open && displayItems.length > 0) {
      const item = displayItems[activeIdx];
      if (item && item.type === 'cat') { select(item.name); return; }
    }
    if (e.key === 'Escape') { setOpen(false); setQuery(''); inputRef.current?.blur(); }
  };

  return (
    <div ref={wrapRef} className={`cat-combo${inline ? ' cat-combo-inline' : ''}`}>
      <input
        ref={inputRef}
        value={open ? query : value}
        onChange={e => { setQuery(e.target.value); setOpen(true); }}
        onFocus={() => {
          setQuery(''); setOpen(true);
          const rect = wrapRef.current?.getBoundingClientRect();
          if (rect) setDropUp(window.innerHeight - rect.bottom < 220);
        }}
        onBlur={() => setTimeout(() => { setOpen(false); setQuery(''); onDone?.(); }, 150)}
        onKeyDown={handleKeyDown}
        placeholder={value}
      />
      {open && displayItems.length > 0 && (
        <div className={`cat-dropdown${dropUp ? ' drop-up' : ''}`}>
          {displayItems.map((item, i) =>
            item.type === 'header'
              ? <div key={`h-${item.name}-${i}`} className="cat-dropdown-header">{item.name}</div>
              : <button key={item.name}
                  className={`cat-dropdown-item${i === activeIdx ? ' active' : ''}`}
                  onMouseDown={e => e.preventDefault()}
                  onClick={() => select(item.name)}>
                  {item.name}
                </button>
          )}
        </div>
      )}
    </div>
  );
}

// ── AccountCombobox ───────────────────────────────────────────────────────────
function AccountCombobox({ value, accounts, onChange, placeholder = 'Account' }) {
  const [query, setQuery]   = useState('');
  const [open, setOpen]     = useState(false);
  const [activeIdx, setActiveIdx] = useState(0);
  const [dropUp, setDropUp] = useState(false);
  const inputRef = useRef(null);
  const wrapRef  = useRef(null);

  const filtered = useMemo(() => {
    const q = query.toLowerCase();
    return q ? accounts.filter(a => a.toLowerCase().includes(q)) : accounts;
  }, [query, accounts]);

  useEffect(() => { setActiveIdx(0); }, [query]);

  const select = (name) => { onChange(name); setQuery(''); setOpen(false); };

  const handleKeyDown = (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, filtered.length - 1)); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setActiveIdx(i => Math.max(i - 1, 0)); return; }
    if (e.key === 'Tab' && open && filtered.length > 0) { select(filtered[activeIdx] ?? query); return; }
    if (e.key === 'Escape') { setOpen(false); setQuery(''); inputRef.current?.blur(); }
  };

  return (
    <div ref={wrapRef} className="cat-combo">
      <input
        ref={inputRef}
        value={open ? query : value}
        onChange={e => { setQuery(e.target.value); onChange(e.target.value); setOpen(true); }}
        onFocus={() => {
          setQuery(''); setOpen(true);
          const rect = wrapRef.current?.getBoundingClientRect();
          if (rect) setDropUp(window.innerHeight - rect.bottom < 220);
        }}
        onBlur={() => setTimeout(() => { setOpen(false); setQuery(''); }, 150)}
        onKeyDown={handleKeyDown}
        placeholder={placeholder}
      />
      {open && filtered.length > 0 && (
        <div className={`cat-dropdown${dropUp ? ' drop-up' : ''}`}>
          {filtered.map((a, i) => (
            <button key={a}
              className={`cat-dropdown-item${i === activeIdx ? ' active' : ''}`}
              onMouseDown={e => e.preventDefault()}
              onClick={() => select(a)}>
              {a}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── FilterCombobox ────────────────────────────────────────────────────────────
function FilterCombobox({ value, options, onChange, allLabel = 'All' }) {
  const [query, setQuery]   = useState('');
  const [open, setOpen]     = useState(false);
  const [activeIdx, setActiveIdx] = useState(0);
  const inputRef = useRef(null);

  const allOptions = [allLabel, ...options];
  const filtered   = query
    ? allOptions.filter(o => o.toLowerCase().includes(query.toLowerCase()))
    : allOptions;

  useEffect(() => { setActiveIdx(0); }, [query]);

  const select = (val) => { onChange(val); setQuery(''); setOpen(false); };

  const handleBlur = () => setTimeout(() => {
    setOpen(false);
    setQuery('');
  }, 150);

  const handleKeyDown = (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i+1, filtered.length-1)); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setActiveIdx(i => Math.max(i-1, 0)); return; }
    if ((e.key === 'Tab' || e.key === 'Enter') && open && filtered.length > 0) {
      e.preventDefault(); select(filtered[activeIdx]); return;
    }
    if (e.key === 'Escape') { setOpen(false); setQuery(''); inputRef.current?.blur(); }
  };

  return (
    <div className="cat-combo">
      <input
        ref={inputRef}
        value={open ? query : value}
        onChange={e => { setQuery(e.target.value); setOpen(true); }}
        onFocus={() => { setQuery(''); setOpen(true); }}
        onBlur={handleBlur}
        onKeyDown={handleKeyDown}
        placeholder={allLabel}
      />
      {open && filtered.length > 0 && (
        <div className="cat-dropdown">
          {filtered.map((o, i) => (
            <button key={o}
              className={`cat-dropdown-item${i === activeIdx ? ' active' : ''}`}
              onMouseDown={e => e.preventDefault()}
              onClick={() => select(o)}>
              {o}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── MultiSelectFilter ─────────────────────────────────────────────────────────
function MultiSelectFilter({ excluded, options, onChange, allLabel }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const wrapRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) { setOpen(false); setSearch(''); }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (e.key === 'Escape') { setOpen(false); setSearch(''); } };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [open]);

  const visible = search ? options.filter(o => o.toLowerCase().includes(search.toLowerCase())) : options;
  const allChecked = excluded.size === 0;
  const numSelected = options.length - excluded.size;

  const label = allChecked
    ? allLabel
    : numSelected === 1
      ? (options.find(o => !excluded.has(o)) ?? allLabel)
      : `${numSelected} of ${options.length} selected`;

  const toggleItem = (item) => {
    const next = new Set(excluded);
    next.has(item) ? next.delete(item) : next.add(item);
    onChange(next);
  };

  const toggleAll = () => onChange(allChecked ? new Set(options) : new Set());

  return (
    <div className="ms-filter" ref={wrapRef}>
      <button className={`ms-filter-btn${!allChecked ? ' active' : ''}`} onClick={() => setOpen(o => !o)}>
        <span className="ms-label">{label}</span>
        <span className="ms-arrow">▾</span>
      </button>
      {open && (
        <div className="ms-dropdown">
          <div className="ms-search">
            <input autoFocus placeholder="Search…" value={search} onChange={e => setSearch(e.target.value)}
              onKeyDown={e => {
                if (e.key === 'Enter' && search) {
                  onChange(new Set(options.filter(o => !visible.includes(o))));
                  setSearch('');
                  setOpen(false);
                }
              }} />
          </div>
          <div className="ms-list">
            {!search && (
              <label className="ms-item ms-select-all">
                <input type="checkbox" checked={allChecked}
                  onChange={toggleAll} ref={el => el && (el.indeterminate = !allChecked && numSelected > 0)} />
                (Select All)
              </label>
            )}
            {visible.map(o => (
              <label key={o} className="ms-item">
                <input type="checkbox" checked={!excluded.has(o)} onChange={() => toggleItem(o)} />
                {o}
              </label>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── TagInput ──────────────────────────────────────────────────────────────────
function TagInput({ value = [], onChange, allTags = [] }) {
  const [input, setInput] = useState('');
  const [open, setOpen]   = useState(false);
  const [activeIdx, setActiveIdx] = useState(0);
  const [dropPos, setDropPos] = useState(null);
  const inputRef = useRef(null);
  const wrapRef  = useRef(null);

  const suggestions = allTags.filter(t =>
    !value.includes(t) && t.toLowerCase().includes(input.toLowerCase())
  );

  useEffect(() => { setActiveIdx(0); }, [input]);

  const add = (tag) => {
    const t = tag.trim().toLowerCase();
    if (t && !value.includes(t)) onChange([...value, t]);
    setInput(''); setOpen(false);
  };

  const remove = (tag) => onChange(value.filter(t => t !== tag));

  const handleKeyDown = (e) => {
    if ((e.key === 'Enter' || e.key === ',') && input.trim()) { e.preventDefault(); add(open && suggestions[activeIdx] ? suggestions[activeIdx] : input); return; }
    if (e.key === 'Tab' && open && suggestions.length > 0)    { e.preventDefault(); add(suggestions[activeIdx] ?? input); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i+1, suggestions.length-1)); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setActiveIdx(i => Math.max(i-1, 0)); return; }
    if (e.key === 'Backspace' && !input && value.length > 0)  { remove(value[value.length-1]); return; }
    if (e.key === 'Escape') { setOpen(false); setInput(''); }
  };

  return (
    <div className="tag-input-wrap" onClick={() => inputRef.current?.focus()}>
      {value.map(tag => (
        <span key={tag} className="tag-pill-input">
          {tag}
          <button type="button" onClick={e => { e.stopPropagation(); remove(tag); }}>×</button>
        </span>
      ))}
      <div ref={wrapRef} className="tag-combo-input">
        <input
          ref={inputRef}
          value={input}
          placeholder={value.length === 0 ? 'Add tags…' : ''}
          onChange={e => { setInput(e.target.value); setOpen(true); }}
          onFocus={() => {
            setOpen(true);
            const rect = wrapRef.current?.getBoundingClientRect();
            if (rect) {
              const spaceBelow = window.innerHeight - rect.bottom;
              setDropPos({ left: rect.left, width: rect.width, top: rect.bottom + 3, bottom: window.innerHeight - rect.top + 3, up: spaceBelow < 220 });
            }
          }}
          onBlur={() => setTimeout(() => { setOpen(false); setInput(''); }, 150)}
          onKeyDown={handleKeyDown}
        />
        {open && suggestions.length > 0 && dropPos && (
          <div className="cat-dropdown" style={{
            position: 'fixed',
            left: dropPos.left,
            width: dropPos.width,
            ...(dropPos.up ? { bottom: dropPos.bottom } : { top: dropPos.top }),
          }}>
            {suggestions.map((s, i) => (
              <button key={s}
                className={`cat-dropdown-item${i === activeIdx ? ' active' : ''}`}
                onMouseDown={e => e.preventDefault()}
                onClick={() => add(s)}>
                {s}
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── AddTransaction ────────────────────────────────────────────────────────────
const EMPTY = { description:'', amount:'', category:'Other', date:today(), type:'expense', accountName:'', merchant:'', tags:[] };

function AddTransaction({ onAdd, categories, structure, transactions, accounts, allTags }) {
  const [form, setForm] = useState(EMPTY);
  const [error, setError] = useState('');
  const [categoryLocked, setCategoryLocked] = useState(false);
  const [suggestedCat, setSuggestedCat] = useState(null);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  useEffect(() => {
    const text = form.merchant.trim() || form.description.trim();
    if (!text) {
      setCategoryLocked(false);
      setSuggestedCat(null);
      return;
    }
    if (categoryLocked) return;
    const guess = guessCategory(text, transactions);
    if (guess) {
      setSuggestedCat(guess);
      setForm(f => ({ ...f, category: guess }));
    } else {
      setSuggestedCat(null);
    }
  }, [form.merchant, form.description]);

  const handleCategoryChange = (v) => {
    setCategoryLocked(true);
    setSuggestedCat(null);
    set('category', v);
  };

  const submit = (e) => {
    e.preventDefault(); setError('');
    const amt = parseFloat(form.amount);
    if (!form.merchant.trim() && !form.description.trim()) return setError('Merchant or description is required.');
    if (isNaN(amt) || amt <= 0)  return setError('Enter a valid positive amount.');
    onAdd({
      id: crypto.randomUUID(),
      description: form.description.trim(),
      amount: form.type === 'expense' ? -amt : amt,
      category: form.category,
      date: form.date,
      accountName: form.accountName,
      merchant: form.merchant.trim(),
      tags: form.tags,
      cleared: false,
    });
    setForm(f => ({ ...EMPTY, type: f.type, date: f.date }));
    setCategoryLocked(false);
    setSuggestedCat(null);
  };

  return (
    <form className="add-form" onSubmit={submit}>
      <h2 className="section-title">Add Transaction</h2>
      <div className="type-toggle">
        {['expense','income'].map(t => (
          <button key={t} type="button"
            className={`type-btn ${form.type === t ? `active-${t}` : ''}`}
            onClick={() => set('type', t)}>
            {t === 'expense' ? '− Expense' : '+ Income'}
          </button>
        ))}
      </div>
      <div className="form-grid">
        <input className="f-merchant" placeholder="Merchant"
          value={form.merchant} onChange={e => set('merchant', e.target.value)} />
        <input className="f-desc" placeholder="Description (optional)"
          value={form.description} onChange={e => set('description', e.target.value)} />
        <div className="f-account" style={{display:'flex',alignItems:'center',gap:'6px'}}>
          <AccountCombobox
            value={form.accountName}
            accounts={accounts}
            onChange={v => set('accountName', v)}
          />
          {form.accountName && (
            <button type="button" className="field-clear-btn" onClick={() => set('accountName', '')} title="Clear account">×</button>
          )}
        </div>
        <input className="f-amount" type="number" placeholder="0.00" min="0" step="0.01"
          value={form.amount} onChange={e => set('amount', e.target.value)} />
        <div className="cat-field">
          <CategoryCombobox
            value={form.category}
            categories={categories}
            structure={structure}
            onChange={handleCategoryChange}
          />
          {suggestedCat && <span className="cat-suggest-hint">from history</span>}
        </div>
        <input type="date" value={form.date} onChange={e => set('date', e.target.value)} />
        <button className="add-btn" type="submit">Add</button>
      </div>
      <TagInput value={form.tags} onChange={tags => set('tags', tags)} allTags={allTags} />
      {error && <p className="form-error">{error}</p>}
    </form>
  );
}

        </form>
      </div>
    </div>
  );

// ── TransactionRow ────────────────────────────────────────────────────────────
function TransactionRow({ t, onDelete, onEdit, onRequestLink, onUnlink, onLinkDuplicate, onDismissFuzzy, categories, structure, privacy, accounts, allTags, onFilterTag }) {
  const [editingCat, setEditingCat] = useState(false);
  const [showEdit, setShowEdit]         = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const handleCatChange = (newCat) => {
    const wasTransfer = t.category === TRANSFER_CAT;
    const isTransfer  = newCat === TRANSFER_CAT;
    if (wasTransfer && !isTransfer && t.transferId) onUnlink(t.id);
    onEdit(t.id, { category: newCat });
    if (isTransfer && !wasTransfer) onRequestLink(t.id);
    setEditingCat(false);
  };

  return (
    <>
    <div className={`tx-row ${t.duplicateOf ? 'tx-linked-hidden' : t.fuzzyMatchId ? 'tx-fuzzy' : t.category === TRANSFER_CAT ? 'tx-transfer' : t.amount >= 0 ? 'tx-income' : 'tx-expense'}`}>
      <div className="tx-accent" />
      <div className="tx-body">
        <div className="tx-top">
          <div className="tx-desc-wrap">
            <span className="tx-desc">{t.merchant || t.description}</span>
            {t.merchant && t.description && <span className="tx-merchant">{t.description}</span>}
          </div>
          <span className={`tx-amount ${t.amount >= 0 ? 'pos' : 'neg'}`}
            style={privacy ? {letterSpacing:'2px'} : {}}>
            {privacy ? '••••••' : `${t.amount >= 0 ? '+' : '−'}${fmt(t.amount)}`}
          </span>
        </div>
        <div className="tx-meta">
          {t.txNum && <span className="tx-id">#{t.txNum}</span>}
          <span className="tx-date">{t.date}</span>
          {t.accountName && <span className="tx-acct">{t.accountName}</span>}
          {editingCat
            ? <CategoryCombobox
                value={t.category}
                categories={categories}
                structure={structure}
                onChange={handleCatChange}
                autoFocus
                onDone={() => setEditingCat(false)}
                inline
              />
            : <button className="cat-pill" onClick={() => setEditingCat(true)} title="Edit category">
                {t.category}
              </button>
          }
          {t.transferId && <span className="linked-badge">↔ linked</span>}
          {t.fuzzyMatchId && <span className="fuzzy-badge">~ possible duplicate</span>}
          {t.duplicateOf && <span className="hidden-badge">hidden · linked to #{t.duplicateOf}</span>}
        </div>
        {t.fuzzyMatchId && (
          <div className="fuzzy-actions">
            <button className="fuzzy-link-btn" onClick={() => onLinkDuplicate(t)}>🔗 Link to existing</button>
            <button className="fuzzy-keep-btn" onClick={() => onDismissFuzzy(t.id)}>Keep as new</button>
          </div>
        )}
        {t.tags?.length > 0 && (
          <div className="tx-tags">
            {t.tags.map(tag => (
              <span key={tag} className="tx-tag"
                style={onFilterTag ? {cursor:'pointer'} : {}}
                onClick={onFilterTag ? () => onFilterTag(tag) : undefined}
                title={onFilterTag ? `Filter by "${tag}"` : undefined}>
                {tag}
              </span>
            ))}
          </div>
        )}
      </div>
      <button className="edit-btn" onClick={() => setShowEdit(true)} title="Edit">✏</button>
      <button
        className={`cleared-btn${t.cleared ? ' is-cleared' : ''}`}
        onClick={() => onEdit(t.id, { cleared: !t.cleared })}
        title={t.cleared ? 'Cleared — click to unmark' : 'Uncleared — click to mark cleared'}
      >{t.cleared ? '●' : '○'}</button>
      {confirmDelete
        ? <>
            <button className="del-confirm-yes" onClick={() => onDelete(t.id)}>Delete</button>
            <button className="del-confirm-no"  onClick={() => setConfirmDelete(false)}>Cancel</button>
          </>
        : <button className="del-btn" onClick={() => setConfirmDelete(true)} title={t.duplicateOf ? 'Remove hidden record' : 'Delete'}>×</button>
      }
    </div>
    {showEdit && (
      <EditTransactionModal
        t={t}
        categories={categories}
        structure={structure}
        accounts={accounts || []}
        allTags={allTags || []}
        onSave={patch => onEdit(t.id, patch)}
        onClose={() => setShowEdit(false)}
      />
    )}
    </>
  );
}

// ── TransactionList ───────────────────────────────────────────────────────────
function TransactionList({ transactions, onDelete, onEdit, onRequestLink, onUnlink, onLinkDuplicate, onDismissFuzzy, categories, structure, privacy, jumpTo }) {
  const [search, setSearch]         = useState('');
  const [catExcluded, setCat]       = useState(() => new Set());
  const [typeExcluded, setType]     = useState(() => new Set());
  const [acctExcluded, setAcct]     = useState(() => new Set());
  const [tagExcluded, setTag]       = useState(() => new Set());
  const [clearedExcluded, setCleared] = useState(() => new Set());
  const [showLinked, setShowLinked] = useState(false);
  const [dateMode, setDateMode]   = useState('all'); // 'all' | 'month' | 'custom'
  const _now = new Date();
  const [navYear, setNavYear]     = useState(_now.getFullYear());
  const [navMonth, setNavMonth]   = useState(_now.getMonth());
  const [dateFrom, setDateFrom]   = useState('');
  const [dateTo, setDateTo]       = useState('');

  const prevNavMonth = () => { if (navMonth === 0) { setNavMonth(11); setNavYear(y => y - 1); } else setNavMonth(m => m - 1); };
  const nextNavMonth = () => { if (navMonth === 11) { setNavMonth(0); setNavYear(y => y + 1); } else setNavMonth(m => m + 1); };
  const navLabel = new Date(navYear, navMonth).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const activeDateFrom = dateMode === 'month'
    ? `${navYear}-${String(navMonth + 1).padStart(2, '0')}-01`
    : dateMode === 'custom' ? dateFrom : '';
  const activeDateTo = dateMode === 'month'
    ? `${navYear}-${String(navMonth + 1).padStart(2, '0')}-${String(new Date(navYear, navMonth + 1, 0).getDate()).padStart(2, '0')}`
    : dateMode === 'custom' ? dateTo : '';
  const dateActive = dateMode !== 'all';

  useEffect(() => {
    if (!jumpTo) return;
    if (jumpTo.catFilter  != null) setCat(new Set(categories.filter(c => c !== jumpTo.catFilter)));
    if (jumpTo.acctFilter != null) setAcct(new Set(accounts.filter(a => a !== jumpTo.acctFilter)));
    if (jumpTo.typeFilter != null) setType(new Set(['Income','Expense'].filter(t => t !== jumpTo.typeFilter)));
    if (jumpTo.tagFilter  != null) setTag(new Set(allTags.filter(t => t !== jumpTo.tagFilter)));
    if (jumpTo.dateMode === 'month') {
      setDateMode('month');
      setNavYear(jumpTo.navYear);
      setNavMonth(jumpTo.navMonth);
    } else if (jumpTo.dateMode === 'custom') {
      setDateMode('custom');
      setDateFrom(jumpTo.dateFrom || '');
      setDateTo(jumpTo.dateTo || '');
    } else if (jumpTo.dateMode === 'all') {
      setDateMode('all');
    }
  }, [jumpTo]);

  // Shared search predicate (used in all available-options memos)
  const passSearch = (t, q) => !q
    || t.description.toLowerCase().includes(q)
    || (t.merchant && t.merchant.toLowerCase().includes(q))
    || t.date.includes(q)
    || t.category.toLowerCase().includes(q)
    || (t.accountName && t.accountName.toLowerCase().includes(q))
    || (t.tags && t.tags.some(tag => tag.toLowerCase().includes(q)))
    || String(Math.abs(t.amount)).includes(q)
    || (t.txNum && String(t.txNum).includes(q.replace(/^#/, '')));

  const passCleared = (t, excl) => excl.size === 0 || (
    (!excl.has('Cleared')   && t.cleared) ||
    (!excl.has('Uncleared') && !t.cleared && !t.fuzzyMatchId) ||
    (!excl.has('Flagged')   && !!t.fuzzyMatchId)
  );

  // Available options for each filter = transactions passing all OTHER filters
  const accounts = useMemo(() => {
    const q = search.toLowerCase();
    return [...new Set(transactions.filter(t =>
      (showLinked || !t.duplicateOf) && passSearch(t, q) &&
      (catExcluded.size === 0     || !catExcluded.has(t.category)) &&
      (typeExcluded.size === 0    || !typeExcluded.has(t.amount > 0 ? 'Income' : 'Expense')) &&
      passCleared(t, clearedExcluded) &&
      (tagExcluded.size === 0     || (t.tags && t.tags.some(g => !tagExcluded.has(g)))) &&
      (!activeDateFrom || t.date >= activeDateFrom) && (!activeDateTo || t.date <= activeDateTo)
    ).map(t => t.accountName).filter(Boolean))].sort();
  }, [transactions, showLinked, search, catExcluded, typeExcluded, clearedExcluded, tagExcluded, activeDateFrom, activeDateTo]);

  const availableCategories = useMemo(() => {
    const q = search.toLowerCase();
    return [...new Set(transactions.filter(t =>
      (showLinked || !t.duplicateOf) && passSearch(t, q) &&
      (acctExcluded.size === 0    || !acctExcluded.has(t.accountName || '')) &&
      (typeExcluded.size === 0    || !typeExcluded.has(t.amount > 0 ? 'Income' : 'Expense')) &&
      passCleared(t, clearedExcluded) &&
      (tagExcluded.size === 0     || (t.tags && t.tags.some(g => !tagExcluded.has(g)))) &&
      (!activeDateFrom || t.date >= activeDateFrom) && (!activeDateTo || t.date <= activeDateTo)
    ).map(t => t.category).filter(Boolean))].sort();
  }, [transactions, showLinked, search, acctExcluded, typeExcluded, clearedExcluded, tagExcluded, activeDateFrom, activeDateTo]);

  const allTags = useMemo(() => {
    const q = search.toLowerCase();
    return [...new Set(transactions.filter(t =>
      (showLinked || !t.duplicateOf) && passSearch(t, q) &&
      (acctExcluded.size === 0    || !acctExcluded.has(t.accountName || '')) &&
      (catExcluded.size === 0     || !catExcluded.has(t.category)) &&
      (typeExcluded.size === 0    || !typeExcluded.has(t.amount > 0 ? 'Income' : 'Expense')) &&
      passCleared(t, clearedExcluded) &&
      (!activeDateFrom || t.date >= activeDateFrom) && (!activeDateTo || t.date <= activeDateTo)
    ).flatMap(t => t.tags || []))].sort();
  }, [transactions, showLinked, search, acctExcluded, catExcluded, typeExcluded, clearedExcluded, activeDateFrom, activeDateTo]);

  const availableTypes = useMemo(() => {
    const q = search.toLowerCase();
    const types = new Set();
    transactions.forEach(t => {
      if (!(showLinked || !t.duplicateOf)) return;
      if (!passSearch(t, q)) return;
      if (acctExcluded.size > 0    && acctExcluded.has(t.accountName || '')) return;
      if (catExcluded.size > 0     && catExcluded.has(t.category)) return;
      if (!passCleared(t, clearedExcluded)) return;
      if (tagExcluded.size > 0     && !(t.tags && t.tags.some(g => !tagExcluded.has(g)))) return;
      if (activeDateFrom && t.date < activeDateFrom) return;
      if (activeDateTo   && t.date > activeDateTo)   return;
      types.add(t.amount > 0 ? 'Income' : 'Expense');
    });
    return ['Income','Expense'].filter(t => types.has(t));
  }, [transactions, showLinked, search, acctExcluded, catExcluded, clearedExcluded, tagExcluded, activeDateFrom, activeDateTo]);

  const availableStatuses = useMemo(() => {
    const q = search.toLowerCase();
    const statuses = new Set();
    transactions.forEach(t => {
      if (!(showLinked || !t.duplicateOf)) return;
      if (!passSearch(t, q)) return;
      if (acctExcluded.size > 0 && acctExcluded.has(t.accountName || '')) return;
      if (catExcluded.size > 0  && catExcluded.has(t.category)) return;
      if (typeExcluded.size > 0 && typeExcluded.has(t.amount > 0 ? 'Income' : 'Expense')) return;
      if (tagExcluded.size > 0  && !(t.tags && t.tags.some(g => !tagExcluded.has(g)))) return;
      if (activeDateFrom && t.date < activeDateFrom) return;
      if (activeDateTo   && t.date > activeDateTo)   return;
      if (t.cleared)       statuses.add('Cleared');
      if (!t.cleared)      statuses.add('Uncleared');
      if (t.fuzzyMatchId)  statuses.add('Flagged');
    });
    return ['Cleared','Uncleared','Flagged'].filter(s => statuses.has(s));
  }, [transactions, showLinked, search, acctExcluded, catExcluded, typeExcluded, tagExcluded, activeDateFrom, activeDateTo]);

  const filtered = useMemo(() =>
    [...transactions]
      .sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id))
      .filter(t => {
        if (t.duplicateOf && !showLinked) return false;
        const q = search.toLowerCase();
        const matchSearch = !q
          || t.description.toLowerCase().includes(q)
          || (t.merchant && t.merchant.toLowerCase().includes(q))
          || t.date.includes(q)
          || t.category.toLowerCase().includes(q)
          || (t.accountName && t.accountName.toLowerCase().includes(q))
          || (t.tags && t.tags.some(tag => tag.toLowerCase().includes(q)))
          || String(Math.abs(t.amount)).includes(q)
          || (t.txNum && String(t.txNum).includes(q.replace(/^#/, '')));
        const matchCat     = catExcluded.size === 0 || !catExcluded.has(t.category);
        const matchAcct    = acctExcluded.size === 0 || !acctExcluded.has(t.accountName || '');
        const matchType    = typeExcluded.size === 0 || !typeExcluded.has(t.amount > 0 ? 'Income' : 'Expense');
        const matchCleared = clearedExcluded.size === 0 || (
          (!clearedExcluded.has('Cleared')   && t.cleared) ||
          (!clearedExcluded.has('Uncleared') && !t.cleared && !t.fuzzyMatchId) ||
          (!clearedExcluded.has('Flagged')   && !!t.fuzzyMatchId)
        );
        const matchTag     = tagExcluded.size === 0 || (t.tags && t.tags.some(tag => !tagExcluded.has(tag)));
        const matchDate = (!activeDateFrom || t.date >= activeDateFrom) && (!activeDateTo || t.date <= activeDateTo);
        return matchSearch && matchCat && matchAcct && matchType && matchCleared && matchTag && matchDate;
      }),
    [transactions, search, catExcluded, acctExcluded, typeExcluded, clearedExcluded, tagExcluded, showLinked, activeDateFrom, activeDateTo]
  );

  return (
    <div className="tx-section">
      <div className="tx-header">
        <h2 className="section-title">Transactions</h2>
        <span className="tx-count">
          {filtered.length} of {transactions.filter(t => showLinked || !t.duplicateOf).length}
          {(() => {
            const net = filtered.reduce((s, t) => s + t.amount, 0);
            return (
              <span style={{marginLeft:'10px', color: net >= 0 ? 'var(--pos)' : 'var(--neg)', fontWeight:500}}>

          <div className="filter-wrap" style={{flex:'0 0 auto'}}>
            <button
              onClick={() => setShowLinked(s => !s)}
              style={{width:'100%', fontSize:'12px', padding:'5px 10px', borderRadius:'6px', border:'1px solid var(--border)',

              onFilterTag={(tag) => setTag(new Set(allTags.filter(t => t !== tag)))} />

    </div>
  );
}

// ── Export directory handle (IndexedDB) ──────────────────────────────────────
const _exportDb = (() => {
  let db = null;
  return () => db
    ? Promise.resolve(db)
    : new Promise((res, rej) => {
        const req = indexedDB.open('budget_app_meta', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('meta');
        req.onsuccess = e => { db = e.target.result; res(db); };
        req.onerror   = e => rej(e.target.error);
      });
})();

async function getExportDirHandle() {
  try {
    const db  = await _exportDb();
    return new Promise(res => {
      const req = db.transaction('meta','readonly').objectStore('meta').get('exportDir');
      req.onsuccess = e => res(e.target.result ?? null);
      req.onerror   = () => res(null);
    });
  } catch { return null; }
}

async function setExportDirHandle(handle) {
  try {
    const db = await _exportDb();
    await new Promise((res, rej) => {
      const tx = db.transaction('meta','readwrite');
      tx.objectStore('meta').put(handle, 'exportDir');
      tx.oncomplete = res; tx.onerror = rej;
    });
  } catch {}
}

// ── CSV export ────────────────────────────────────────────────────────────────
function exportCSV(transactions) {
  const cols = ['txNum','date','merchant','description','amount','category','accountName','transferId','cleared','tags','duplicateOf','fuzzyMatchId'];
  const escape = (v) => {
    const s = String(v ?? '');
    return s.includes(',') || s.includes('"') || s.includes('\n')
      ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const rows = [...transactions]
    .sort((a, b) => b.date.localeCompare(a.date))
    .map(t => cols.map(c => c === 'tags' ? escape((t.tags || []).join(';')) : escape(t[c])).join(','));
  return [cols.join(','), ...rows].join('\n');
}

// ── TransferLinker ────────────────────────────────────────────────────────────
function TransferLinker({ sourceTx, transactions, onLink, onClose }) {
  const candidates = useMemo(() => {
    const sourceAbs  = Math.abs(sourceTx.amount);
    const sourceDate = new Date(sourceTx.date);
    return transactions
      .filter(t =>
        t.id !== sourceTx.id &&
        !t.transferId &&
        Math.abs(Math.abs(t.amount) - sourceAbs) < 0.01
      )
      .sort((a, b) =>
        Math.abs(new Date(a.date) - sourceDate) - Math.abs(new Date(b.date) - sourceDate)
      )
      .slice(0, 25);
  }, [sourceTx, transactions]);

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:'560px'}}>
        <div className="modal-header">
          <span className="modal-title">Link Transfer Counterpart</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div>
            <p className="block-title">Linking from</p>
            <div className="link-source-card">
              <div className="lc-left">
                <span className="lc-desc">{sourceTx.description}</span>
                <span className="lc-meta">{sourceTx.date}{sourceTx.accountName && ` · ${sourceTx.accountName}`}</span>
              </div>
              <span className={`lc-amt ${sourceTx.amount >= 0 ? 'pos' : 'neg'}`}>
                {sourceTx.amount >= 0 ? '+' : '−'}{fmt(sourceTx.amount)}
              </span>
            </div>
          </div>
          <div>
            <p className="block-title">Select the matching transaction</p>
            {candidates.length === 0
              ? <p className="empty" style={{padding:'20px 0'}}>
                  No transactions with a matching amount found.<br/>
                  The transfer is saved — you can link it later by re-selecting the category.
                </p>
              : <div className="link-candidates">
                  {candidates.map(t => (
                    <button key={t.id} className="link-candidate" onClick={() => onLink(sourceTx.id, t.id)}>
                      <div className="lc-left">
                        <span className="lc-desc">{t.description}</span>
                        <span className="lc-meta">{t.date}{t.accountName && ` · ${t.accountName}`}</span>
                      </div>
                      <span className={`lc-amt ${t.amount >= 0 ? 'pos' : 'neg'}`}>
                        {t.amount >= 0 ? '+' : '−'}{fmt(t.amount)}
                      </span>
                    </button>
                  ))}
                </div>
            }
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn-secondary" onClick={onClose}>Skip for now</button>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard helpers ─────────────────────────────────────────────────────────
const CAT_PALETTE = [
  '#2563eb','#16a34a','#dc2626','#d97706','#7c3aed',
  '#0891b2','#be185d','#65a30d','#ea580c','#6366f1',
];

const RANGES = [
  { key:'month',      label:'This Month'  },
  { key:'last-month', label:'Last Month'  },
  { key:'3m',         label:'3 Months'    },
  { key:'6m',         label:'6 Months'    },
  { key:'year',       label:'This Year'   },
  { key:'all',        label:'All Time'    },
];

function getDateRange(key) {
  const now = new Date();
  const y = now.getFullYear(), mo = now.getMonth();
  const iso = (d) => d.toISOString().split('T')[0];
  if (key === 'month')      return { start: `${y}-${String(mo+1).padStart(2,'0')}-01`, end: null };
  if (key === 'last-month') return { start: iso(new Date(y,mo-1,1)), end: iso(new Date(y,mo,0)) };
  if (key === '3m')         return { start: iso(new Date(y,mo-2,1)), end: null };
  if (key === '6m')         return { start: iso(new Date(y,mo-5,1)), end: null };
  if (key === 'year')       return { start: `${y}-01-01`, end: null };
  return { start: null, end: null };
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({ transactions, privacy, getBudgetsForMonth, onReconcile, onNavigate }) {
  const [range, setRange] = useState('month');

  const { start, end } = useMemo(() => getDateRange(range), [range]);

  const getMonthsInRange = () => {
    const now = new Date();
    const y = now.getFullYear(), mo = now.getMonth();
    const pad = (n) => String(n).padStart(2,'0');
    if (range === 'month') return [`${y}-${pad(mo+1)}`];
    if (range === 'last-month') {
      const d = new Date(y, mo-1, 1);
      return [`${d.getFullYear()}-${pad(d.getMonth()+1)}`];
    }
    const count = range === '3m' ? 3 : range === '6m' ? 6 : range === 'year' ? 12 : 0;
    return Array.from({length: count}, (_, i) => {
      const d = new Date(y, mo - (count-1-i), 1);
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
    });
  };

  const getPeriodBudget = (cat) => {
    const months = getMonthsInRange();
    if (!months.length) return null;
    const total = months.reduce((s, key) => s + (getBudgetsForMonth(key)[cat] || 0), 0);
    return total || null;
  };

  const rangeToDateJump = () => {
    const now = new Date();
    if (range === 'month') return { dateMode: 'month', navYear: now.getFullYear(), navMonth: now.getMonth() };
    if (range === 'last-month') {
      const d = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      return { dateMode: 'month', navYear: d.getFullYear(), navMonth: d.getMonth() };
    }
    if (range === 'all') return { dateMode: 'all' };
    return { dateMode: 'custom', dateFrom: start, dateTo: end || '' };
  };

  const filtered = useMemo(() =>
    transactions.filter(t =>
      !isExcluded(t) &&
      (!start || t.date >= start) &&
      (!end   || t.date <= end)
    ), [transactions, start, end]);

  // Account balances include ALL transaction types (transfers + reconciliations matter per-account)
  const accountSummaries = useMemo(() => {
    const map = {};
    for (const t of transactions) {
      const key = t.accountName || 'Manual';
      if (!map[key]) map[key] = { in: 0, out: 0, lastDate: '' };
      if (t.amount > 0) map[key].in  += t.amount;
      else              map[key].out += Math.abs(t.amount);
      if (t.date > map[key].lastDate) map[key].lastDate = t.date;
    }
    return Object.entries(map)
      .map(([name, d]) => ({ name, balance: d.in - d.out, in: d.in, out: d.out, lastDate: d.lastDate }))
      .sort((a,b) => b.balance - a.balance);
  }, [transactions]);

  const income   = filtered.filter(t => t.amount > 0).reduce((s,t) => s + t.amount, 0);
  const expenses = filtered.filter(t => t.amount < 0).reduce((s,t) => s + t.amount, 0);
  const net      = income + expenses;

  const catBreakdown = useMemo(() => {
    const map = {};
    for (const t of filtered.filter(t => t.amount < 0))
      map[t.category] = (map[t.category] || 0) + Math.abs(t.amount);
    return Object.entries(map).sort((a,b) => b[1] - a[1]);
  }, [filtered]);

  const totalExp = catBreakdown.reduce((s,[,v]) => s + v, 0);


  const monthlyData = useMemo(() => {
    const now = new Date();
    const months = Array.from({ length: 6 }, (_, i) => {
      const d = new Date(now.getFullYear(), now.getMonth() - (5 - i), 1);
      return {
        key:   `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
        label: d.toLocaleDateString('en-US', { month: 'short' }),
        income: 0, expenses: 0,
      };
    });
    for (const t of transactions.filter(t => !isExcluded(t))) {
      const m = months.find(m => m.key === t.date.slice(0,7));
      if (!m) continue;
      if (t.amount > 0) m.income   += t.amount;
      else              m.expenses += Math.abs(t.amount);
    }
    return months;
  }, [transactions]);

  const maxBar = Math.max(...monthlyData.flatMap(m => [m.income, m.expenses]), 1);

  const mask = (n, sign = false) => {
    if (privacy) return <span style={{letterSpacing:'2px'}}>••••••</span>;
    return <>{sign && n < 0 ? '−' : ''}{fmt(n)}</>;
  };

  return (
    <div className="dashboard">
      <div className="range-tabs">
        {RANGES.map(r => (
          <button key={r.key} className={`range-tab ${range === r.key ? 'active' : ''}`}
            onClick={() => setRange(r.key)}>{r.label}</button>
        ))}
      </div>

      {accountSummaries.length > 0 && (
        <div className="dash-card">
          <p className="dash-title">Accounts — All Time</p>
          <div className="acct-grid">
            {accountSummaries.map(a => (
              <div key={a.name} className="acct-card">
                <span className="acct-name nav-link" onClick={() => onNavigate({ acctFilter: a.name })}>{a.name}</span>
                <span className={`acct-balance ${a.balance >= 0 ? 'pos' : 'neg'}`}>
                  {privacy ? '••••••' : `${a.balance < 0 ? '−' : ''}${fmt(a.balance)}`}
                </span>
                <div className="acct-sub">
                  <span className="pos">{privacy ? '•••' : `+${fmt(a.in)}`}</span>
                  <span className="acct-divider">·</span>
                  <span className="neg">{privacy ? '•••' : `−${fmt(a.out)}`}</span>
                </div>
                {a.lastDate && (
                  <span className="acct-last-date">Last: {a.lastDate}</span>
                )}
                <button className="acct-reconcile-btn" onClick={() => onReconcile(a)}>
                  ⚖ Reconcile
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="summary">
        <div className="summary-card">
          <span className="s-label">Income</span>
          <span className="s-amount pos">{mask(income)}</span>
        </div>
        <div className="summary-card">
          <span className="s-label">Expenses</span>
          <span className="s-amount neg">{mask(expenses)}</span>
        </div>
        <div className="summary-card">
          <span className="s-label">Net</span>
          <span className={`s-amount ${net >= 0 ? 'pos' : 'neg'}`}>{mask(net, true)}</span>
        </div>
      </div>

      <div className="dash-card">
        <p className="dash-title">Spending by Category</p>
        {catBreakdown.length === 0
          ? <p className="empty" style={{padding:'16px 0'}}>No expense data for this period.</p>
          : catBreakdown.map(([cat, amt], i) => {
              const periodBudget = getPeriodBudget(cat);

              const catJump = () => onNavigate({ catFilter: cat, ...rangeToDateJump() });

              if (periodBudget) {
                const usedPct  = (amt / periodBudget) * 100;
                const barPct   = Math.min(usedPct, 100);
                const isOver   = amt > periodBudget;
                const isWarn   = !isOver && usedPct >= 80;
                const barColor = isOver ? 'var(--neg)' : isWarn ? '#d97706' : 'var(--pos)';
                const diff     = Math.abs(periodBudget - amt);
                return (
                  <div key={cat} className="cat-bar-row">
                    <span className="cat-bar-label nav-link" onClick={catJump}>{cat}</span>
                    <div className="cat-bar-track">
                      <div className="cat-bar-fill" style={{width:`${barPct}%`, background:barColor}} />
                    </div>
                    <span className="cat-bar-amt">{mask(amt)}</span>
                    <span className={`budget-indicator ${isOver ? 'budget-over' : isWarn ? 'budget-warn' : 'budget-under'}`}>
                      {privacy ? '••••' : isOver ? `Over ${fmt(diff)}` : `${fmt(diff)} left`}
                    </span>
                  </div>
                );
              }

              const pct = totalExp > 0 ? (amt / totalExp) * 100 : 0;
              return (
                <div key={cat} className="cat-bar-row">
                  <span className="cat-bar-label nav-link" onClick={catJump}>{cat}</span>
                  <div className="cat-bar-track">
                    <div className="cat-bar-fill"
                      style={{width:`${pct}%`, background: CAT_PALETTE[i % CAT_PALETTE.length]}} />
                  </div>
                  <span className="cat-bar-pct">{pct.toFixed(0)}%</span>
                  <span className="cat-bar-amt">{mask(amt)}</span>
                </div>
              );
            })
        }
      </div>

      <div className="dash-card">
        <p className="dash-title">Monthly Trend</p>
        <div className="monthly-chart">
          {monthlyData.map(m => {
            const [my, mm] = m.key.split('-').map(Number);
            const monthJump = () => onNavigate({ dateMode: 'month', navYear: my, navMonth: mm - 1 });
            return (
              <div key={m.key} className="month-col nav-link" onClick={monthJump} title={m.key}>
                <div className="month-bars">
                  <div className="month-bar-wrap">
                    <div className="month-bar income-bar"
                      style={{height:`${(m.income / maxBar) * 100}%`}} />
                  </div>
                  <div className="month-bar-wrap">
                    <div className="month-bar expense-bar"
                      style={{height:`${(m.expenses / maxBar) * 100}%`}} />
                  </div>
                </div>
                <span className="month-label">{m.label}</span>
              </div>
            );
          })}
        </div>
        <div className="chart-legend">
          <span className="legend-dot" style={{background:'var(--pos)'}} />
          <span className="legend-label">Income</span>
          <span className="legend-gap" />
          <span className="legend-dot" style={{background:'var(--neg)'}} />
          <span className="legend-label">Expenses</span>
        </div>
      </div>
    </div>
  );
}

// ── ReconcileModal ────────────────────────────────────────────────────────────
function ReconcileModal({ account, onConfirm, onClose }) {
  const [actual, setActual] = useState('');

  const parsed = actual !== '' ? parseFloat(actual) : null;
  const diff   = parsed !== null && !isNaN(parsed) ? parsed - account.balance : null;
  const balanced = diff !== null && Math.abs(diff) < 0.005;

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:'360px'}}>
        <div className="modal-header">
          <span className="modal-title">Reconcile — {account.name}</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body" style={{gap:'14px'}}>
          <div className="setting-row">
            <span className="setting-label">Calculated balance</span>
            <span className={`s-amount ${account.balance >= 0 ? 'pos' : 'neg'}`} style={{fontSize:'15px'}}>
              {account.balance < 0 ? '−' : ''}{fmt(account.balance)}
            </span>
          </div>
          <div className="setting-row">
            <span className="setting-label">Actual balance</span>
            <input type="number" placeholder="e.g. −72.00" step="0.01"
              value={actual} onChange={e => setActual(e.target.value)}
              style={{width:'140px'}} autoFocus />
          </div>
          {balanced && (
            <p style={{color:'var(--pos)', fontSize:'13px'}}>✓ Already balanced — no adjustment needed.</p>
          )}
          {diff !== null && !balanced && (
            <p className="muted-note">
              Adjustment: <strong style={{color: diff > 0 ? 'var(--pos)' : 'var(--neg)'}}>
                {diff > 0 ? '+' : '−'}{fmt(diff)}
              </strong> will be added as a Reconciliation transaction.
            </p>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary"
            disabled={diff === null || balanced}
            onClick={() => { onConfirm(account.name, diff); onClose(); }}>
            Create Adjustment
          </button>
        </div>
      </div>
    </div>
  );
}
