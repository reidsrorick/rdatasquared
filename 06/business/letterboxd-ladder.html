<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letterboxd Ladder</title>
  <style>
    :root {
      --bg: #0c0c14;
      --card-bg: #14141f;
      --card-border: #23233a;
      --card-hover: #1b1b2c;
      --text: #dcdcf0;
      --muted: #6868a0;
      --accent: #f0bf3c;
      --green: #22c55e;
      --red: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Upload ── */
    #upload-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
    .brand { font-size: 3rem; font-weight: 900; letter-spacing: -2px; line-height: 1; margin-bottom: .5rem; }
    .brand em { color: var(--accent); font-style: normal; }
    .tagline { color: var(--muted); font-size: 1rem; margin-bottom: 3rem; max-width: 420px; line-height: 1.6; }
    .drop-zone { border: 2px dashed var(--card-border); border-radius: 14px; padding: 2.5rem 3rem; cursor: pointer; transition: border-color .15s, background .15s; max-width: 400px; width: 100%; }
    .drop-zone:hover, .drop-zone.over { border-color: var(--accent); background: rgba(240,191,60,.05); }
    .dz-icon { margin: 0 auto 1rem; opacity: .4; }
    .drop-zone p { color: var(--muted); font-size: .95rem; line-height: 1.6; }
    .drop-zone strong { color: var(--accent); text-decoration: underline; cursor: pointer; }
    #file-input { display: none; }

    /* ── Game ── */
    #game-screen { display: none; max-width: 640px; margin: 0 auto; padding: 1.5rem 1.25rem 5rem; }

    .g-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: .6rem; }
    .brand-sm { font-size: 1.1rem; font-weight: 800; letter-spacing: -.5px; }
    .brand-sm em { color: var(--accent); font-style: normal; }
    .g-actions { display: flex; gap: .6rem; align-items: center; }
    .pill { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: .3rem .85rem; font-size: .82rem; color: var(--muted); }
    .pill b { color: var(--text); }
    .btn-ghost { background: transparent; border: 1px solid var(--card-border); border-radius: 8px; padding: .35rem .9rem; font-size: .82rem; color: var(--muted); cursor: pointer; transition: border-color .12s, color .12s; font-family: inherit; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Target banner ── */
    .target-bar {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 10px; padding: .65rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; font-size: .82rem; gap: 1rem;
    }
    .target-label { color: var(--muted); white-space: nowrap; }
    .target-title { font-weight: 700; flex: 1; text-align: right; }
    .target-rating { color: var(--accent); font-weight: 800; white-space: nowrap; }

    /* ── Progress bar ── */
    .prog-wrap { margin-bottom: 1.75rem; }
    .prog-labels { display: flex; justify-content: space-between; font-size: .72rem; color: var(--muted); margin-bottom: .35rem; }
    .prog-track { width: 100%; height: 4px; background: var(--card-border); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }

    /* ── Chain ── */
    #chain { display: flex; flex-direction: column; margin-bottom: 1.25rem; }

    .chain-step { display: flex; align-items: center; gap: .7rem; background: var(--card-bg); border: 2px solid var(--card-border); border-radius: 10px; padding: .65rem .85rem; transition: opacity .15s; }
    .chain-step.done { opacity: .6; }
    .chain-step.current { border-color: var(--accent); opacity: 1; }
    .chain-step.win-step { border-color: var(--green); background: rgba(34,197,94,.06); opacity: 1; }

    .step-poster { width: 30px; height: 42px; object-fit: cover; border-radius: 3px; flex-shrink: 0; background: var(--card-border); }
    .step-poster.hidden { visibility: hidden; }
    .step-poster-ph { width: 30px; height: 42px; border-radius: 3px; background: var(--card-border); flex-shrink: 0; }

    .step-body { flex: 1; min-width: 0; }
    .step-title { font-size: .88rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .step-year  { font-size: .72rem; color: var(--muted); }

    .step-rating { font-size: .9rem; font-weight: 800; color: var(--accent); flex-shrink: 0; }
    .chain-step.win-step .step-rating { color: var(--green); }

    .connector {
      display: flex; align-items: center; gap: .5rem;
      padding: .25rem 1rem; font-size: .72rem; color: var(--muted);
    }
    .connector-arrow { color: var(--card-border); font-size: .9rem; }
    .connector-type { color: var(--accent); font-weight: 600; }

    /* ── Search area ── */
    .search-area { margin-bottom: 1rem; }
    .search-label { font-size: .78rem; color: var(--muted); margin-bottom: .45rem; }
    .search-label b { color: var(--text); }

    .search-input {
      width: 100%; background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 8px; padding: .65rem 1rem; font-size: .93rem;
      color: var(--text); outline: none; transition: border-color .12s; font-family: inherit;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .search-input:disabled { opacity: .4; cursor: not-allowed; }

    .results { border: 1px solid var(--card-border); border-radius: 8px; overflow: hidden; max-height: 280px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--card-border) transparent; margin-top: .45rem; }
    .results.off { display: none; }

    .r-item { padding: .6rem 1rem; cursor: pointer; border-bottom: 1px solid var(--card-border); transition: background .1s; display: flex; justify-content: space-between; align-items: center; gap: .5rem; }
    .r-item:last-child { border-bottom: none; }
    .r-item:hover { background: var(--card-hover); }
    .r-title { font-size: .88rem; font-weight: 600; }
    .r-meta  { font-size: .75rem; color: var(--muted); }
    .r-rating { font-size: .82rem; font-weight: 700; color: var(--accent); flex-shrink: 0; }

    /* ── Feedback ── */
    .feedback { min-height: 1.2em; font-size: .84rem; margin-bottom: .75rem; }
    .feedback.err { color: var(--red); }
    .feedback.ok  { color: var(--green); }
    .feedback.info{ color: var(--muted); }

    /* ── Bottom row ── */
    .bottom-row { display: flex; gap: .65rem; align-items: center; flex-wrap: wrap; }

    .btn-hint {
      background: transparent; border: 1px solid var(--card-border); border-radius: 8px;
      padding: .45rem 1rem; font-size: .82rem; color: var(--muted); cursor: pointer;
      transition: border-color .12s, color .12s; font-family: inherit;
    }
    .btn-hint:hover { border-color: var(--muted); color: var(--text); }

    .btn-end {
      background: transparent; border: 1px solid var(--card-border); border-radius: 8px;
      padding: .45rem 1rem; font-size: .82rem; color: var(--muted); cursor: pointer;
      transition: border-color .12s, color .12s; font-family: inherit; margin-left: auto;
    }
    .btn-end:hover { border-color: var(--red); color: var(--red); }

    /* ── Win / End banner ── */
    .finish-banner {
      background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.25);
      border-radius: 12px; padding: 1.25rem 1.5rem;
      text-align: center; margin-bottom: 1.5rem; display: none;
    }
    .finish-banner.bad { background: rgba(239,68,68,.06); border-color: rgba(239,68,68,.2); }
    .finish-banner.show { display: block; }
    .finish-title { font-size: 1.2rem; font-weight: 800; margin-bottom: .3rem; }
    .finish-title.ok { color: var(--green); }
    .finish-title.bad { color: var(--red); }
    .finish-detail { font-size: .85rem; color: var(--muted); }

    .btn-new { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: .72rem 2rem; font-size: .93rem; font-weight: 700; cursor: pointer; letter-spacing: .3px; transition: background .12s, transform .1s; font-family: inherit; }
    .btn-new:hover { background: #f8d060; transform: translateY(-1px); }
  </style>
</head>
<body>

<!-- Upload -->
<div id="upload-screen">
  <h1 class="brand">Letterboxd <em>Ladder</em></h1>
  <p class="tagline">Start from a low-rated film and climb — each step must share an actor, director, or genre with the previous movie, and have a higher rating.</p>
  <div class="drop-zone" id="drop-zone">
    <svg class="dz-icon" width="44" height="44" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p>Drop your CSV here, or <strong id="browse-link">browse to upload</strong></p>
    <input type="file" id="file-input" accept=".csv">
  </div>
</div>

<!-- Game -->
<div id="game-screen">
  <div class="g-header">
    <span class="brand-sm">Letterboxd <em>Ladder</em></span>
    <div class="g-actions">
      <span class="pill">Steps <b id="steps-num">0</b></span>
      <span class="pill">Best <b id="best-num">0</b></span>
      <button class="btn-ghost" id="btn-new-game">New Game</button>
    </div>
  </div>

  <div class="target-bar">
    <span class="target-label">Target</span>
    <span class="target-title" id="target-title"></span>
    <span class="target-rating" id="target-rating"></span>
  </div>

  <div class="prog-wrap">
    <div class="prog-labels">
      <span id="prog-current">&#9733; —</span>
      <span id="prog-target">&#9733; —</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="chain"></div>

  <div class="finish-banner" id="finish-banner">
    <p class="finish-title" id="finish-title"></p>
    <p class="finish-detail" id="finish-detail"></p>
  </div>

  <div class="search-area" id="search-area">
    <p class="search-label" id="search-label"></p>
    <input class="search-input" id="search-input" type="text"
           placeholder="Search for a movie..." autocomplete="off">
    <div class="results off" id="results"></div>
  </div>

  <p class="feedback off" id="feedback"></p>

  <div class="bottom-row">
    <button class="btn-hint" id="btn-hint">How many moves?</button>
    <button class="btn-end"  id="btn-end">Give Up</button>
  </div>
</div>

<script>
  let allMovies   = [];
  let chain       = [];   // [{ movie, connection }]  connection = null for first step
  let targetMovie = null;
  let bestSteps   = 0;
  let gameOver    = false;

  const MIN_RATING  = 0;     // floor of ratings in collection
  const START_PCTILE = 0.35; // start from bottom 35%

  // ── CSV ────────────────────────────────────────────────────

  function parseCSV(src) {
    const rows = [];
    let field = '', row = [], q = false;
    for (let i = 0; i <= src.length; i++) {
      const c = src[i];
      if (i === src.length) { row.push(field); if (row.some(Boolean)) rows.push(row); break; }
      if (c === '"') {
        if (q && src[i + 1] === '"') { field += '"'; i++; } else q = !q;
      } else if (c === ',' && !q) { row.push(field); field = ''; }
      else if ((c === '\n' || c === '\r') && !q) {
        if (c === '\r' && src[i + 1] === '\n') i++;
        row.push(field); field = ''; rows.push(row); row = [];
      } else { field += c; }
    }
    return rows;
  }

  function loadCSV(src) {
    const rows = parseCSV(src);
    if (!rows.length) return [];
    const h = rows[0];
    const col = n => h.indexOf(n);
    const [ti, yi, di, ri, gi, c1, c2, c3, c4, c5, pi] =
      ['title','year','director','average_rating','genres',
       'cast_1','cast_2','cast_3','cast_4','cast_5','poster_url'].map(col);
    if (ti < 0 || ri < 0) return [];

    return rows.slice(1).flatMap(r => {
      const title  = r[ti]?.trim();
      const rating = parseFloat(r[ri]);
      if (!title || isNaN(rating)) return [];
      const genres = r[gi]?.split(',').map(s => s.trim()).filter(Boolean) || [];
      const casts  = [c1,c2,c3,c4,c5]
        .filter(i => i >= 0)
        .map(i => r[i]?.trim())
        .filter(Boolean)
        .map(s => s.replace(/\s*\([^)]*\)\s*$/, '').trim())
        .filter(Boolean);
      return [{ title, year: r[yi]?.trim()||'', director: r[di]?.trim()||'', rating, genres, casts, poster: pi>=0 ? r[pi]?.trim():'' }];
    });
  }

  // ── Connection logic ───────────────────────────────────────

  function getConnection(a, b) {
    // Director
    if (a.director && b.director && a.director === b.director)
      return { type: 'Director', value: a.director };
    // Shared actor
    const setA = new Set(a.casts);
    for (const actor of b.casts)
      if (actor && setA.has(actor)) return { type: 'Actor', value: actor };
    // Shared genre
    const setG = new Set(a.genres);
    for (const g of b.genres)
      if (g && setG.has(g)) return { type: 'Genre', value: g };
    return null;
  }

  // ── Helpers ────────────────────────────────────────────────

  function shuffle(a) {
    a = [...a];
    for (let i = a.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function currentMovie() { return chain[chain.length - 1]?.movie; }

  function validNextMovies() {
    const cur = currentMovie();
    if (!cur) return [];
    return allMovies.filter(m =>
      m.rating > cur.rating &&
      !chain.some(s => s.movie.title === m.title) &&
      getConnection(cur, m)
    );
  }

  // ── Render ─────────────────────────────────────────────────

  function renderChain() {
    const el = document.getElementById('chain');
    if (!chain.length) { el.innerHTML = ''; return; }

    let html = '';
    chain.forEach((step, i) => {
      const isCurrent = i === chain.length - 1 && !gameOver;
      const isWin     = gameOver && step.movie.title === targetMovie?.title;
      const cls = isCurrent ? 'current' : (isWin ? 'win-step' : 'done');

      if (i > 0 && step.connection) {
        html += `<div class="connector">
          <span class="connector-arrow">&#8595;</span>
          <span class="connector-type">${esc(step.connection.type)}</span>
          <span>${esc(step.connection.value)}</span>
        </div>`;
      }

      const poster = step.movie.poster
        ? `<img class="step-poster" src="${esc(step.movie.poster)}" alt="" loading="lazy" onerror="this.classList.add('hidden')">`
        : `<div class="step-poster-ph"></div>`;

      html += `<div class="chain-step ${cls}">
        ${poster}
        <div class="step-body">
          <p class="step-title">${esc(step.movie.title)}</p>
          ${step.movie.year ? `<p class="step-year">${esc(step.movie.year)}</p>` : ''}
        </div>
        <span class="step-rating">&#9733; ${step.movie.rating.toFixed(2)}</span>
      </div>`;
    });

    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
  }

  function renderProgress() {
    const cur  = currentMovie();
    const tgt  = targetMovie;
    if (!cur || !tgt) return;

    const minR = allMovies.reduce((m, v) => Math.min(m, v.rating), Infinity);
    const range = tgt.rating - minR;
    const pct   = range > 0 ? Math.min(100, ((cur.rating - minR) / range) * 100) : 100;

    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-current').textContent = `★ ${cur.rating.toFixed(2)}`;
    document.getElementById('prog-target').textContent  = `★ ${tgt.rating.toFixed(2)}`;
  }

  function updateStats() {
    document.getElementById('steps-num').textContent = Math.max(0, chain.length - 1);
    document.getElementById('best-num').textContent  = bestSteps;
  }

  function renderSearchLabel() {
    const cur = currentMovie();
    if (!cur) return;
    const label = document.getElementById('search-label');
    label.innerHTML = `Find a movie connected to <b>${esc(cur.title)}</b> with a higher rating`;
  }

  function setFeedback(msg, type) {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.className   = 'feedback ' + (type || '');
  }

  // ── Search ─────────────────────────────────────────────────

  let currentResults = [];

  function queryMovies(q) {
    const cur = currentMovie();
    if (!cur) return [];
    const lq = q.toLowerCase();
    const pool = allMovies.filter(m =>
      m.rating > cur.rating &&
      !chain.some(s => s.movie.title === m.title) &&
      m.title.toLowerCase().includes(lq)
    );
    pool.sort((a, b) => a.rating - b.rating);
    return pool.slice(0, 9);
  }

  function renderResults(movies) {
    const el = document.getElementById('results');
    currentResults = movies;
    if (!movies.length) { el.classList.add('off'); return; }
    el.classList.remove('off');
    el.innerHTML = movies.map((m, i) =>
      `<div class="r-item" data-i="${i}">
        <div>
          <div class="r-title">${esc(m.title)}</div>
          <div class="r-meta">${esc(m.year)}</div>
        </div>
        <span class="r-rating">&#9733; ${m.rating.toFixed(2)}</span>
      </div>`
    ).join('');
    el.querySelectorAll('.r-item').forEach(item => {
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        attemptAdd(currentResults[+item.dataset.i]);
      });
    });
  }

  let debounce;
  document.getElementById('search-input').addEventListener('input', e => {
    setFeedback('', '');
    clearTimeout(debounce);
    debounce = setTimeout(() => renderResults(queryMovies(e.target.value)), 80);
  });

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && currentResults.length) attemptAdd(currentResults[0]);
  });

  // ── Add to chain ───────────────────────────────────────────

  function attemptAdd(movie) {
    if (gameOver) return;
    const cur  = currentMovie();

    // Duplicate
    if (chain.some(s => s.movie.title === movie.title)) {
      setFeedback(`"${movie.title}" is already in your chain.`, 'err'); return;
    }
    // Rating
    if (movie.rating <= cur.rating) {
      setFeedback(`★${movie.rating.toFixed(2)} is not higher than ★${cur.rating.toFixed(2)}.`, 'err'); return;
    }
    // Connection
    const conn = getConnection(cur, movie);
    if (!conn) {
      setFeedback(`No connection found between "${cur.title}" and "${movie.title}".`, 'err'); return;
    }

    // Valid
    chain.push({ movie, connection: conn });
    const steps = chain.length - 1;
    if (steps > bestSteps) bestSteps = steps;

    document.getElementById('search-input').value = '';
    document.getElementById('results').classList.add('off');
    currentResults = [];
    setFeedback('', '');

    // Win?
    if (targetMovie && movie.title === targetMovie.title) {
      endGame(true);
    } else {
      renderAll();
    }
  }

  // ── End game ───────────────────────────────────────────────

  function endGame(win) {
    gameOver = true;
    const steps = chain.length - 1;
    if (steps > bestSteps) bestSteps = steps;

    const banner    = document.getElementById('finish-banner');
    const titleEl   = document.getElementById('finish-title');
    const detailEl  = document.getElementById('finish-detail');
    const searchArea = document.getElementById('search-area');
    const bottomRow = document.getElementById('bottom-row');

    if (win) {
      banner.className  = 'finish-banner show';
      titleEl.className = 'finish-title ok';
      titleEl.textContent  = `You reached the top!`;
      detailEl.textContent = `${steps} step${steps !== 1 ? 's' : ''} to ★${currentMovie().rating.toFixed(2)}`;
    } else {
      banner.className  = 'finish-banner bad show';
      titleEl.className = 'finish-title bad';
      titleEl.textContent  = `Run ended`;
      detailEl.textContent = `Climbed ${steps} step${steps !== 1 ? 's' : ''} to ★${currentMovie().rating.toFixed(2)}`;
    }

    searchArea.style.display = 'none';
    document.getElementById('feedback').className = 'feedback off';
    document.getElementById('btn-hint').style.display = 'none';
    document.getElementById('btn-end').style.display  = 'none';

    renderChain();
    renderProgress();
    updateStats();
  }

  function renderAll() {
    renderChain();
    renderProgress();
    renderSearchLabel();
    updateStats();
  }

  // ── Hint button ────────────────────────────────────────────

  document.getElementById('btn-hint').addEventListener('click', () => {
    const n = validNextMovies().length;
    if (n === 0) {
      setFeedback('No valid moves from here — try a different path or start a new game.', 'err');
    } else {
      setFeedback(`${n} movie${n !== 1 ? 's' : ''} can follow from here.`, 'info');
    }
  });

  // ── Give up ────────────────────────────────────────────────

  document.getElementById('btn-end').addEventListener('click', () => {
    if (!gameOver) endGame(false);
  });

  // ── New game ───────────────────────────────────────────────

  function startGame() {
    gameOver = false;
    chain = [];
    currentResults = [];

    document.getElementById('finish-banner').classList.remove('show');
    document.getElementById('search-area').style.display = '';
    document.getElementById('results').classList.add('off');
    document.getElementById('search-input').value = '';
    document.getElementById('btn-hint').style.display = '';
    document.getElementById('btn-end').style.display  = '';
    setFeedback('', '');

    // Target: highest-rated movie
    targetMovie = allMovies.reduce((best, m) => m.rating > best.rating ? m : best);
    document.getElementById('target-title').textContent  = targetMovie.title;
    document.getElementById('target-rating').textContent = `★ ${targetMovie.rating.toFixed(2)}`;

    // Start: random movie from bottom 35%, but make sure it has at least one valid next move
    const sorted   = [...allMovies].sort((a, b) => a.rating - b.rating);
    const cutoff   = sorted[Math.floor(sorted.length * START_PCTILE)].rating;
    const starters = shuffle(allMovies.filter(m =>
      m.rating <= cutoff && m.title !== targetMovie.title
    ));

    // Find a starter with at least one reachable movie
    let startMovie = starters[0];
    for (const candidate of starters) {
      const hasMove = allMovies.some(m =>
        m.rating > candidate.rating && getConnection(candidate, m)
      );
      if (hasMove) { startMovie = candidate; break; }
    }

    chain = [{ movie: startMovie, connection: null }];
    renderAll();
  }

  document.getElementById('btn-new-game').addEventListener('click', startGame);

  // ── File load ──────────────────────────────────────────────

  function onFile(file) {
    if (!file?.name.endsWith('.csv')) return alert('Please upload a .csv file.');
    const reader = new FileReader();
    reader.onload = e => {
      allMovies = loadCSV(e.target.result);
      if (allMovies.length < 5) return alert('Not enough movies found in CSV.');
      document.getElementById('upload-screen').style.display = 'none';
      document.getElementById('game-screen').style.display  = 'block';
      startGame();
    };
    reader.readAsText(file);
  }

  const dz = document.getElementById('drop-zone');
  const fi = document.getElementById('file-input');
  document.getElementById('browse-link').addEventListener('click', e => { e.stopPropagation(); fi.click(); });
  dz.addEventListener('click', () => fi.click());
  fi.addEventListener('change', e => e.target.files[0] && onFile(e.target.files[0]));
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', ()  => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    e.dataTransfer.files[0] && onFile(e.dataTransfer.files[0]);
  });
</script>
</body>
</html>
