<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rating Wars</title>
  <style>
    :root {
      --bg: #0c0c14;
      --card-bg: #14141f;
      --card-border: #23233a;
      --card-hover: #1b1b2c;
      --text: #dcdcf0;
      --muted: #6868a0;
      --accent: #f0bf3c;
      --green: #22c55e;
      --red: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Upload ── */
    #upload-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 2rem; text-align: center;
    }
    .brand { font-size: 3.2rem; font-weight: 900; letter-spacing: -2px; line-height: 1; margin-bottom: .5rem; }
    .brand em { color: var(--accent); font-style: normal; }
    .tagline { color: var(--muted); font-size: 1rem; margin-bottom: 3rem; max-width: 380px; line-height: 1.6; }
    .drop-zone {
      border: 2px dashed var(--card-border); border-radius: 14px;
      padding: 2.5rem 3rem; cursor: pointer;
      transition: border-color .15s, background .15s; max-width: 400px; width: 100%;
    }
    .drop-zone:hover, .drop-zone.over { border-color: var(--accent); background: rgba(240,191,60,.05); }
    .dz-icon { margin: 0 auto 1rem; opacity: .4; }
    .drop-zone p { color: var(--muted); font-size: .95rem; line-height: 1.6; }
    .drop-zone strong { color: var(--accent); text-decoration: underline; cursor: pointer; }
    #file-input { display: none; }

    /* ── Game ── */
    #game-screen { display: none; max-width: 780px; margin: 0 auto; padding: 1.5rem 1.25rem 5rem; }

    .g-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2rem; flex-wrap: wrap; gap: .75rem;
    }
    .brand-sm { font-size: 1.15rem; font-weight: 800; letter-spacing: -.5px; }
    .brand-sm em { color: var(--accent); font-style: normal; }

    .streak-pills { display: flex; gap: .6rem; }
    .pill { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: .3rem .85rem; font-size: .82rem; color: var(--muted); }
    .pill b { color: var(--text); }
    .pill.hot b { color: var(--accent); }

    /* ── Prompt ── */
    .prompt {
      text-align: center; margin-bottom: 1.75rem;
    }
    .prompt-eye { font-size: .72rem; text-transform: uppercase; letter-spacing: 2.5px; color: var(--muted); margin-bottom: .4rem; }
    .prompt-text { font-size: 1.3rem; font-weight: 700; }

    /* ── Battle ── */
    .battle {
      display: grid;
      grid-template-columns: 1fr 52px 1fr;
      gap: 1rem;
      align-items: stretch;
    }

    @media (max-width: 500px) {
      .battle { grid-template-columns: 1fr 36px 1fr; gap: .6rem; }
      .prompt-text { font-size: 1.1rem; }
    }

    .vs-col {
      display: flex; align-items: center; justify-content: center;
    }

    .vs-badge {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--card-bg); border: 1px solid var(--card-border);
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 900; color: var(--muted); letter-spacing: .5px;
    }

    /* ── Cards ── */
    .battle-card {
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .12s, transform .1s, background .12s, opacity .2s;
      display: flex; flex-direction: column;
    }

    .battle-card:hover:not(.locked) {
      border-color: var(--accent);
      transform: translateY(-3px);
      background: var(--card-hover);
    }

    .battle-card.locked { cursor: default; }

    .battle-card.winner {
      border-color: var(--accent);
      background: rgba(240,191,60,.06);
    }

    .battle-card.loser {
      opacity: .45;
      border-color: var(--card-border);
    }

    .battle-card.wrong-pick {
      border-color: var(--red);
      background: rgba(239,68,68,.06);
      opacity: 1;
    }

    .card-poster-wrap {
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--card-border);
      flex-shrink: 0;
    }

    .card-poster {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: opacity .2s;
    }

    .card-poster.hidden { visibility: hidden; }

    .card-poster-ph {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #0c0c14 100%);
      display: flex; align-items: center; justify-content: center;
    }

    .card-info {
      padding: .85rem .9rem .9rem;
      display: flex; flex-direction: column; gap: .25rem; flex: 1;
    }

    .card-title {
      font-size: .88rem; font-weight: 700;
      line-height: 1.3;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    .card-year { font-size: .75rem; color: var(--muted); }

    .card-rating {
      display: none;
      margin-top: auto;
      padding-top: .5rem;
      font-size: 1.15rem;
      font-weight: 800;
    }

    .card-rating.show { display: block; }

    .winner .card-rating { color: var(--accent); }
    .loser  .card-rating { color: var(--muted); font-size: .95rem; }
    .wrong-pick .card-rating { color: var(--red); }

    /* ── Result area ── */
    .result-area {
      margin-top: 1.75rem; text-align: center;
      display: none; flex-direction: column; align-items: center; gap: 1rem;
    }
    .result-area.show { display: flex; }

    .result-msg { font-size: 1.1rem; font-weight: 700; }
    .result-msg.ok  { color: var(--green); }
    .result-msg.bad { color: var(--red); }
    .result-msg.tie { color: var(--accent); }

    .streak-break { font-size: .85rem; color: var(--muted); }

    .btn {
      background: var(--accent); color: #000; border: none; border-radius: 8px;
      padding: .72rem 2rem; font-size: .93rem; font-weight: 700; cursor: pointer;
      letter-spacing: .3px; transition: background .12s, transform .1s; font-family: inherit;
    }
    .btn:hover { background: #f8d060; transform: translateY(-1px); }
  </style>
</head>
<body>

<!-- Upload -->
<div id="upload-screen">
  <h1 class="brand">Rating <em>Wars</em></h1>
  <p class="tagline">Two movies. One question: which has the higher Letterboxd rating? Build your streak.</p>
  <div class="drop-zone" id="drop-zone">
    <svg class="dz-icon" width="44" height="44" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p>Drop your CSV here, or <strong id="browse-link">browse to upload</strong></p>
    <input type="file" id="file-input" accept=".csv">
  </div>
</div>

<!-- Game -->
<div id="game-screen">
  <div class="g-header">
    <span class="brand-sm">Rating <em>Wars</em></span>
    <div class="streak-pills">
      <span class="pill hot">Streak <b id="streak-num">0</b></span>
      <span class="pill">Best <b id="best-num">0</b></span>
    </div>
  </div>

  <div class="prompt">
    <p class="prompt-eye">Click to answer</p>
    <p class="prompt-text">Which has the higher Letterboxd rating?</p>
  </div>

  <div class="battle" id="battle">
    <!-- Cards injected by JS -->
  </div>

  <div class="result-area" id="result-area">
    <p class="result-msg" id="result-msg"></p>
    <p class="streak-break" id="streak-break"></p>
    <button class="btn" id="btn-next">Next Match</button>
  </div>
</div>

<script>
  let allMovies = [];
  let streak    = 0;
  let best      = 0;
  let pair      = null;
  let answered  = false;

  // ── CSV ────────────────────────────────────────────────────

  function parseCSV(src) {
    const rows = [];
    let field = '', row = [], q = false;
    for (let i = 0; i <= src.length; i++) {
      const c = src[i];
      if (i === src.length) { row.push(field); if (row.some(Boolean)) rows.push(row); break; }
      if (c === '"') {
        if (q && src[i + 1] === '"') { field += '"'; i++; } else q = !q;
      } else if (c === ',' && !q) { row.push(field); field = ''; }
      else if ((c === '\n' || c === '\r') && !q) {
        if (c === '\r' && src[i + 1] === '\n') i++;
        row.push(field); field = ''; rows.push(row); row = [];
      } else { field += c; }
    }
    return rows;
  }

  function loadCSV(src) {
    const rows = parseCSV(src);
    if (!rows.length) return [];
    const h = rows[0];
    const col = n => h.indexOf(n);
    const [ti, ri, yi, pi] = ['title', 'average_rating', 'year', 'poster_url'].map(col);
    if (ti < 0 || ri < 0) return [];

    return rows.slice(1).flatMap(r => {
      const title  = r[ti]?.trim();
      const rating = parseFloat(r[ri]);
      if (!title || isNaN(rating)) return [];
      return [{ title, rating, year: r[yi]?.trim() || '', poster: pi >= 0 ? r[pi]?.trim() : '' }];
    });
  }

  // ── Pair selection ─────────────────────────────────────────

  function shuffle(a) {
    a = [...a];
    for (let i = a.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function pickPair() {
    const pool = shuffle(allMovies);
    // Prefer a close matchup (0.05–1.2 rating diff) to avoid obvious blowouts
    for (let i = 0; i < pool.length - 1; i++) {
      for (let j = i + 1; j < Math.min(i + 15, pool.length); j++) {
        const diff = Math.abs(pool[i].rating - pool[j].rating);
        if (diff >= 0.05 && diff <= 1.2) return shuffle([pool[i], pool[j]]);
      }
    }
    return [pool[0], pool[1]]; // fallback
  }

  // ── Render ─────────────────────────────────────────────────

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function makeCard(movie, idx) {
    const posterContent = movie.poster
      ? `<img class="card-poster" src="${esc(movie.poster)}" alt="" loading="lazy" onerror="this.classList.add('hidden')">`
      : `<div class="card-poster-ph"></div>`;

    return `<div class="battle-card" id="card-${idx}" data-idx="${idx}">
      <div class="card-poster-wrap">${posterContent}</div>
      <div class="card-info">
        <p class="card-title">${esc(movie.title)}</p>
        ${movie.year ? `<p class="card-year">${esc(movie.year)}</p>` : ''}
        <p class="card-rating" id="rating-${idx}">&#9733; ${movie.rating.toFixed(2)}</p>
      </div>
    </div>`;
  }

  function newRound() {
    answered = false;
    pair = pickPair();

    document.getElementById('result-area').classList.remove('show');

    document.getElementById('battle').innerHTML =
      makeCard(pair[0], 0) +
      `<div class="vs-col"><div class="vs-badge">VS</div></div>` +
      makeCard(pair[1], 1);

    document.querySelectorAll('.battle-card').forEach(card => {
      card.addEventListener('click', () => pick(+card.dataset.idx));
    });
  }

  // ── Pick ───────────────────────────────────────────────────

  function pick(chosen) {
    if (answered) return;
    answered = true;

    const [a, b]  = pair;
    const isTie   = a.rating === b.rating;
    const winnerIdx = a.rating >= b.rating ? 0 : 1;
    const correct   = isTie || chosen === winnerIdx;

    // Lock cards
    document.querySelectorAll('.battle-card').forEach(c => c.classList.add('locked'));

    // Reveal ratings
    document.getElementById('rating-0').classList.add('show');
    document.getElementById('rating-1').classList.add('show');

    // Colour cards
    if (isTie) {
      document.getElementById('card-0').classList.add('winner');
      document.getElementById('card-1').classList.add('winner');
    } else {
      document.getElementById(`card-${winnerIdx}`).classList.add('winner');
      const loserIdx = winnerIdx === 0 ? 1 : 0;
      document.getElementById(`card-${loserIdx}`).classList.add(chosen === loserIdx ? 'wrong-pick' : 'loser');
    }

    // Update streak
    const prevStreak = streak;
    if (correct) {
      streak++;
      if (streak > best) best = streak;
    } else {
      streak = 0;
    }

    document.getElementById('streak-num').textContent = streak;
    document.getElementById('best-num').textContent   = best;

    // Result message
    const msgEl   = document.getElementById('result-msg');
    const breakEl = document.getElementById('streak-break');

    if (isTie) {
      msgEl.className   = 'result-msg tie';
      msgEl.textContent = `It's a tie — both rated ${a.rating.toFixed(2)}`;
      breakEl.textContent = '';
    } else if (correct) {
      msgEl.className   = 'result-msg ok';
      msgEl.textContent = streak > 1 ? `Correct! Streak: ${streak}` : 'Correct!';
      breakEl.textContent = '';
    } else {
      msgEl.className   = 'result-msg bad';
      msgEl.textContent = 'Wrong!';
      breakEl.textContent = prevStreak > 0
        ? `Streak of ${prevStreak} broken.`
        : '';
    }

    document.getElementById('result-area').classList.add('show');
  }

  document.getElementById('btn-next').addEventListener('click', newRound);

  // ── File load ──────────────────────────────────────────────

  function onFile(file) {
    if (!file?.name.endsWith('.csv')) return alert('Please upload a .csv file.');
    const reader = new FileReader();
    reader.onload = e => {
      allMovies = loadCSV(e.target.result);
      if (allMovies.length < 2) return alert('Not enough rated movies found in CSV.');
      document.getElementById('upload-screen').style.display = 'none';
      document.getElementById('game-screen').style.display  = 'block';
      newRound();
    };
    reader.readAsText(file);
  }

  const dz = document.getElementById('drop-zone');
  const fi = document.getElementById('file-input');
  document.getElementById('browse-link').addEventListener('click', e => { e.stopPropagation(); fi.click(); });
  dz.addEventListener('click', () => fi.click());
  fi.addEventListener('change', e => e.target.files[0] && onFile(e.target.files[0]));
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', ()  => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    e.dataTransfer.files[0] && onFile(e.dataTransfer.files[0]);
  });
</script>
</body>
</html>
