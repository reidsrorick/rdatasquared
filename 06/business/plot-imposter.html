<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plot Imposter</title>
  <style>
    :root {
      --bg: #0c0c14;
      --card-bg: #14141f;
      --card-border: #23233a;
      --card-hover: #1b1b2c;
      --text: #dcdcf0;
      --muted: #6868a0;
      --accent: #f0bf3c;
      --green: #22c55e;
      --red: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Upload ── */
    #upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .brand {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .brand em {
      color: var(--accent);
      font-style: normal;
    }

    .tagline {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 3rem;
      max-width: 400px;
      line-height: 1.5;
    }

    .drop-zone {
      border: 2px dashed var(--card-border);
      border-radius: 14px;
      padding: 2.5rem 3rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      max-width: 400px;
      width: 100%;
    }

    .drop-zone:hover, .drop-zone.over {
      border-color: var(--accent);
      background: rgba(240,191,60,.05);
    }

    .dz-icon {
      margin: 0 auto 1rem;
      opacity: .4;
    }

    .drop-zone p {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.6;
    }

    .drop-zone strong {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
    }

    #file-input { display: none; }

    /* ── Game ── */
    #game-screen {
      display: none;
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 4rem;
    }

    .g-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .75rem;
    }

    .brand-sm {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -.5px;
    }

    .brand-sm em {
      color: var(--accent);
      font-style: normal;
    }

    .pills { display: flex; gap: .6rem; }

    .pill {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: .3rem .85rem;
      font-size: .82rem;
      color: var(--muted);
    }

    .pill b { color: var(--text); }

    .prog-track {
      width: 100%;
      height: 3px;
      background: var(--card-border);
      border-radius: 2px;
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .4s ease;
      width: 0%;
    }

    .question-area {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .q-eye {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--muted);
      margin-bottom: .6rem;
    }

    .q-text {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .q-genre { color: var(--accent); }

    .genre-reveal {
      font-size: .82rem;
      color: var(--muted);
      letter-spacing: .3px;
    }

    .genre-reveal b {
      color: var(--accent);
      font-size: .95rem;
    }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
      .q-text { font-size: 1.2rem; }
      .brand { font-size: 2.4rem; }
    }

    .card {
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 12px;
      padding: 1.2rem;
      cursor: pointer;
      transition: border-color .12s, transform .1s, background .12s, opacity .15s;
      position: relative;
      overflow: hidden;
    }

    .card:hover:not(.locked) {
      border-color: var(--accent);
      background: var(--card-hover);
      transform: translateY(-2px);
    }

    .card.locked { cursor: default; }

    .card.state-imposter {
      border-color: var(--green);
      background: rgba(34,197,94,.06);
    }

    .card.state-bad {
      border-color: var(--red);
      background: rgba(239,68,68,.06);
    }

    .card.state-dim { opacity: .5; }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: .65rem;
      margin-bottom: .8rem;
    }

    .lbl {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: #1e1e32;
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: .8rem;
      flex-shrink: 0;
      transition: background .12s, border-color .12s, color .12s;
    }

    .card.state-imposter .lbl {
      background: var(--green);
      border-color: var(--green);
      color: #000;
    }

    .card.state-bad .lbl {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .card-meta { flex: 1; min-width: 0; }

    .card-title {
      font-size: .85rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: none;
      margin-bottom: .15rem;
    }

    .card-genres {
      font-size: .72rem;
      color: var(--muted);
      display: none;
    }

    .card.state-imposter .card-genres { color: var(--green); }

    .card.revealed .card-title,
    .card.revealed .card-genres { display: block; }

    .card-synopsis {
      font-size: .875rem;
      line-height: 1.7;
      color: #a8a8c4;
      max-height: 170px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--card-border) transparent;
    }

    .card-badge {
      position: absolute;
      top: .6rem;
      right: .6rem;
      background: var(--green);
      color: #000;
      font-size: .62rem;
      font-weight: 800;
      letter-spacing: .8px;
      text-transform: uppercase;
      padding: .18rem .4rem;
      border-radius: 4px;
      display: none;
    }

    .card.state-imposter .card-badge { display: block; }

    /* ── Result bar ── */
    .result-bar {
      margin-top: 1.5rem;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
    }

    .result-bar.show { display: flex; }

    .result-msg {
      font-size: 1rem;
      font-weight: 600;
      max-width: 600px;
    }

    .result-msg.ok  { color: var(--green); }
    .result-msg.bad { color: var(--red); }

    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: .72rem 2rem;
      font-size: .93rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .3px;
      transition: background .12s, transform .1s;
    }

    .btn:hover {
      background: #f8d060;
      transform: translateY(-1px);
    }

    /* ── End screen ── */
    #end-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .end-label {
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--muted);
      margin-bottom: .4rem;
    }

    .end-score {
      font-size: 5.5rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      margin: .2rem 0 .3rem;
    }

    .end-denom {
      font-size: 1.4rem;
      color: var(--muted);
      margin-bottom: .8rem;
    }

    .end-comment {
      font-size: .95rem;
      color: var(--muted);
      margin-bottom: 2rem;
      max-width: 320px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
<div id="loading-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:.75rem;">
  <div style="width:36px;height:36px;border:3px solid var(--card-border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;"></div>
  <p style="color:var(--muted);font-size:.9rem;">Loading collection...</p>
</div>
<div id="error-screen" style="display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem;gap:.5rem;">
  <p style="font-size:1rem;font-weight:700;color:var(--red);">Failed to load collection</p>
  <p style="color:var(--muted);font-size:.85rem;max-width:300px;line-height:1.5;">Make sure <strong style="color:var(--text)">letterboxd_scraped.csv</strong> is in the same folder.</p>
</div>

<!-- ── Game ── -->
<div id="game-screen">
  <div class="g-header">
    <span class="brand-sm">Plot <em>Imposter</em></span>
    <div class="pills">
      <span class="pill">Round <b id="rnum">1</b> / <b id="rtotal">?</b></span>
      <span class="pill">Score <b id="rscore">0</b></span>
    </div>
  </div>

  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>

  <div class="question-area">
    <p class="q-eye">Spot the imposter</p>
    <p class="q-text">Which synopsis is <strong>NOT</strong> a <span class="q-genre" id="q-genre"></span> film?</p>
  </div>

  <div class="cards" id="cards-grid"></div>

  <div class="result-bar" id="result-bar">
    <p class="genre-reveal">The shared genre was: <b id="genre-reveal"></b></p>
    <p class="result-msg" id="result-msg"></p>
    <button class="btn" id="btn-next">Next Round</button>
  </div>
</div>

<!-- ── End ── -->
<div id="end-screen">
  <p class="end-label">Final Score</p>
  <div class="end-score" id="end-num"></div>
  <p class="end-denom" id="end-denom"></p>
  <p class="end-comment" id="end-comment"></p>
  <button class="btn" onclick="restart()">Play Again</button>
</div>

<script>
  const LABELS = ['A', 'B', 'C', 'D'];
  const MAX_ROUNDS = 20;

  // Supergroups for preferring contrasting imposter picks
  const SUPERGROUPS = [
    ['Action', 'Adventure'],
    ['Science Fiction', 'Fantasy'],
    ['Drama', 'History', 'War', 'Biography'],
    ['Comedy'],
    ['Horror', 'Thriller'],
    ['Mystery', 'Crime'],
    ['Animation', 'Family'],
    ['Romance'],
    ['Music', 'Musical'],
    ['Documentary'],
  ];

  let allMovies = [], rounds = [], roundIdx = 0, score = 0;

  // ── Helpers ──────────────────────────────────────────────

  function sgOf(genre) {
    return SUPERGROUPS.findIndex(g => g.includes(genre));
  }

  function shuffle(a) {
    a = [...a];
    for (let i = a.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── CSV parser (handles quoted fields) ───────────────────

  function parseCSV(src) {
    const rows = [];
    let field = '', row = [], q = false;
    for (let i = 0; i <= src.length; i++) {
      const c = src[i];
      if (i === src.length) {
        row.push(field);
        if (row.some(Boolean)) rows.push(row);
        break;
      }
      if (c === '"') {
        if (q && src[i + 1] === '"') { field += '"'; i++; }
        else q = !q;
      } else if (c === ',' && !q) {
        row.push(field); field = '';
      } else if ((c === '\n' || c === '\r') && !q) {
        if (c === '\r' && src[i + 1] === '\n') i++;
        row.push(field); field = '';
        rows.push(row); row = [];
      } else {
        field += c;
      }
    }
    return rows;
  }

  function loadCSV(src) {
    const rows = parseCSV(src);
    if (!rows.length) return [];
    const h = rows[0];
    const col = n => h.indexOf(n);
    const [ti, si, gi, yi] = ['title', 'synopsis', 'genres', 'year'].map(col);
    if (ti < 0 || si < 0 || gi < 0) return [];

    return rows.slice(1).flatMap(r => {
      const title    = r[ti]?.trim();
      const synopsis = r[si]?.trim();
      const gStr     = r[gi]?.trim();
      if (!title || !synopsis || !gStr) return [];
      const genres = gStr.split(',').map(s => s.trim()).filter(Boolean);
      return [{ title, synopsis, genres, year: r[yi]?.trim() || '' }];
    });
  }

  // ── Round generation ─────────────────────────────────────

  function buildRounds(movies) {
    const byGenre = {};
    for (const m of movies)
      for (const g of m.genres)
        (byGenre[g] = byGenre[g] || []).push(m);

    const genres = shuffle(Object.keys(byGenre).filter(g => byGenre[g].length >= 3));
    const used   = new Set();
    const result = [];

    for (const genre of genres) {
      if (result.length >= MAX_ROUNDS) break;

      const pool = shuffle(byGenre[genre]).filter(m => !used.has(m.title));
      if (pool.length < 3) continue;
      const same3 = pool.slice(0, 3);

      // Imposter: must not contain this genre
      const notGenre = movies.filter(m =>
        !m.genres.includes(genre) && !used.has(m.title)
      );
      if (!notGenre.length) continue;

      // Prefer from the SAME supergroup (adjacent genre) for harder rounds
      const sg = sgOf(genre);
      const nearPool = sg === -1 ? [] : notGenre.filter(m =>
        m.genres.some(g => sgOf(g) === sg)
      );
      const imposter = shuffle(nearPool.length ? nearPool : notGenre)[0];

      const options = shuffle([
        ...same3.map(m => ({ ...m, isImposter: false })),
        { ...imposter, isImposter: true },
      ]);

      result.push({ genre, options });
      same3.forEach(m => used.add(m.title));
      used.add(imposter.title);
    }
    return result;
  }

  // ── Screen management ─────────────────────────────────────

  function screen(id) {
    document.getElementById('game-screen').style.display = id === 'game' ? 'block' : 'none';
    document.getElementById('end-screen').style.display  = id === 'end'  ? 'flex'  : 'none';
  }

  // ── Render round ──────────────────────────────────────────

  function renderRound() {
    const rd = rounds[roundIdx];

    document.getElementById('rnum').textContent   = roundIdx + 1;
    document.getElementById('rtotal').textContent = rounds.length;
    document.getElementById('rscore').textContent = score;
    document.getElementById('q-genre').textContent = rd.genre;
    document.getElementById('result-bar').classList.remove('show');
    document.getElementById('prog-fill').style.width =
      ((roundIdx / rounds.length) * 100) + '%';

    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';

    rd.options.forEach((opt, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-top">
          <div class="lbl">${LABELS[i]}</div>
          <div class="card-meta">
            <div class="card-title">${esc(opt.title)}${opt.year ? ' (' + esc(opt.year) + ')' : ''}</div>
            <div class="card-genres">${esc(opt.genres.join(', '))}</div>
          </div>
        </div>
        <p class="card-synopsis">${esc(opt.synopsis)}</p>
        <span class="card-badge">Imposter</span>
      `;
      card.addEventListener('click', () => pick(i));
      grid.appendChild(card);
    });
  }

  // ── Handle pick ───────────────────────────────────────────

  function pick(chosen) {
    const cards = [...document.querySelectorAll('.card')];
    if (cards[0].classList.contains('locked')) return;

    const rd  = rounds[roundIdx];
    const imp = rd.options.findIndex(o => o.isImposter);
    const ok  = chosen === imp;
    if (ok) score++;

    cards.forEach((c, i) => {
      c.classList.add('locked', 'revealed');
      if (i === imp)           c.classList.add('state-imposter');
      else if (i === chosen)   c.classList.add('state-bad');
      else                     c.classList.add('state-dim');
    });

    const msg   = document.getElementById('result-msg');
    const iOpt  = rd.options[imp];
    const label = LABELS[imp];

    document.getElementById('genre-reveal').textContent = rd.genre;

    if (ok) {
      msg.className = 'result-msg ok';
      msg.textContent =
        `Correct! Option ${label} — "${iOpt.title}" — was the imposter (${iOpt.genres.join(', ')}).`;
    } else {
      msg.className = 'result-msg bad';
      msg.textContent =
        `Wrong. The imposter was Option ${label} — "${iOpt.title}" (${iOpt.genres.join(', ')}).`;
    }

    document.getElementById('rscore').textContent = score;
    document.getElementById('btn-next').textContent =
      roundIdx + 1 >= rounds.length ? 'See Results' : 'Next Round';
    document.getElementById('result-bar').classList.add('show');
  }

  document.getElementById('btn-next').addEventListener('click', () => {
    roundIdx++;
    if (roundIdx >= rounds.length) showEnd();
    else renderRound();
  });

  // ── End screen ────────────────────────────────────────────

  function showEnd() {
    screen('end');
    document.getElementById('prog-fill').style.width = '100%';
    document.getElementById('end-num').textContent   = score;
    document.getElementById('end-denom').textContent = `out of ${rounds.length}`;

    const pct = score / rounds.length;
    document.getElementById('end-comment').textContent =
      pct === 1    ? 'Perfect score. True cinephile.' :
      pct >= 0.8   ? 'Excellent. You know your genres.' :
      pct >= 0.6   ? 'Good work — a few tripped you up.' :
      pct >= 0.4   ? 'Not bad. The genres fooled you sometimes.' :
                     'The movies had you fooled. Give it another go!';
  }

  function restart() {
    roundIdx = 0;
    score    = 0;
    rounds   = buildRounds(allMovies);
    screen('game');
    renderRound();
  }

  // ── File handling ─────────────────────────────────────────

  // ── Load data ─────────────────────────────────────────────
  fetch('./letterboxd_scraped.csv')
    .then(r => { if (!r.ok) throw new Error(); return r.text(); })
    .then(text => {
      allMovies = loadCSV(text);
      if (allMovies.length < 4) throw new Error();
      rounds   = buildRounds(allMovies);
      roundIdx = 0;
      score    = 0;
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('game-screen').style.display   = 'block';
      renderRound();
    })
    .catch(() => {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('error-screen').style.display  = 'flex';
    });
</script>
</body>
</html>
