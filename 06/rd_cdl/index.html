<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CDL 2026 Analyzer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">CDL</span>
      <div>
        <div class="title">Call of Duty League — 2026 Analyzer</div>
        <div class="subtitle" id="seasonSummary">Loading data…</div>
      </div>
    </div>
    <nav class="tabs" id="tabs">
      <a href="#/overview" data-tab="overview">Overview</a>
      <a href="#/players" data-tab="players">Players</a>
      <a href="#/teams" data-tab="teams">Teams</a>
      <a href="#/matches" data-tab="matches">Matches</a>
      <a href="#/maps" data-tab="maps">Maps</a>
      <a href="#/events" data-tab="events">Events</a>
      <a href="#/h2h" data-tab="h2h">Head-to-Head</a>
      <a href="#/history" data-tab="history">History</a>
    </nav>
  </header>

  <main id="view" class="view">
    <div class="loading">Loading CDL data…</div>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <button class="modal-close" data-close aria-label="Close">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <footer class="foot">
    Data scraped from Breaking Point · This is an unofficial analysis tool.
  </footer>

  <script src="js/charts.js"></script>
  <script src="js/data.js"></script>
  <script src="js/analysis.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
