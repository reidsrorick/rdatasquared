<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FilmNerdle — Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="shared.css">
<style>
#app { display: none; flex-direction: column; min-height: 100vh; }

/* Search bar */
.search-bar {
  padding: 14px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 10px; align-items: center;
}
.search-input {
  flex: 1; padding: 8px 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-md); color: var(--text);
  font-family: var(--font); font-size: .88rem; outline: none;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); }
.result-count { font-size: .8rem; color: var(--muted); white-space: nowrap; }

/* Archive grid */
.archive-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  padding: 20px;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}

.archive-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  cursor: pointer;
  transition: border-color .15s, transform .1s;
}
.archive-card:hover { border-color: var(--accent); transform: translateY(-2px); }

.ac-date {
  font-size: .75rem; color: var(--muted); font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px;
}
.ac-scores {
  display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;
}
.ac-score-badge {
  font-size: .75rem; padding: 2px 8px;
  background: var(--surface2); border-radius: 20px; color: var(--muted);
}
.ac-score-badge.has-score { color: var(--accent); border: 1px solid var(--accent-dim); }

.ac-section { margin-bottom: 6px; }
.ac-section-label { font-size: .7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; margin-bottom: 2px; }
.ac-movies { font-size: .78rem; color: var(--text); line-height: 1.5; }
.ac-movies.collapsed { max-height: 3.2em; overflow: hidden; }
.ac-expand { font-size: .7rem; color: var(--accent); cursor: pointer; margin-top: 2px; }

/* No results */
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .big-icon { font-size: 3rem; margin-bottom: 12px; }

/* ── Replay modal ── */
#replay-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.92);
  z-index: 600;
  align-items: flex-start;
  justify-content: center;
  padding: 0;
  overflow-y: auto;
}
#replay-modal.active { display: flex; }

.replay-container {
  background: var(--bg);
  width: 100%;
  max-width: 620px;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

.replay-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.replay-title { font-size: 1rem; font-weight: 700; color: var(--accent); flex: 1; }

.replay-tabs { display: flex; border-bottom: 1px solid var(--border); }
.replay-tab {
  flex: 1; padding: 10px 8px; text-align: center;
  cursor: pointer; font-size: .86rem; font-weight: 500;
  color: var(--muted); border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.replay-tab:hover { color: var(--text); }
.replay-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.replay-body { display: flex; flex-direction: column; align-items: center; padding: 20px 14px 60px; }

.replay-mode { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 520px; gap: 10px; }
.replay-mode.active { display: flex; }
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <p>Loading archive…</p>
</div>

<div id="app">
  <header class="site-header">
    <div class="site-logo">🎬 Archive</div>
    <div class="header-actions">
      <a href="index.html" class="btn btn-sm">Today's Puzzle</a>
    </div>
  </header>

  <div class="search-bar">
    <input class="search-input" id="search-input" type="search" placeholder="Filter by movie title…">
    <span class="result-count" id="result-count"></span>
  </div>

  <div class="archive-grid" id="archive-grid"></div>
</div>

<!-- Replay modal -->
<div id="replay-modal">
  <div class="replay-container">
    <div class="replay-header">
      <div class="replay-title" id="replay-title">Replay</div>
      <button class="btn btn-sm" id="btn-close-replay">✕ Close</button>
    </div>

    <div class="replay-tabs">
      <div class="replay-tab active" data-rtab="original" onclick="switchReplayTab('original')">Original</div>
      <div class="replay-tab" data-rtab="reversal"  onclick="switchReplayTab('reversal')">Reversal</div>
      <div class="replay-tab" data-rtab="burgle"    onclick="switchReplayTab('burgle')">Burgle</div>
    </div>

    <div class="replay-body">
      <!-- Original replay -->
      <div id="rtab-original" class="replay-mode active">
        <div class="score-bar" style="max-width:100%">
          <div><div class="sb-label">Swaps left</div><div class="sb-value" id="ro-swaps">20</div></div>
          <div class="sb-right" id="ro-rows">0 / 4 rows locked</div>
        </div>
        <div id="ro-grid-container" style="width:100%"></div>
        <div class="row-theme-labels" id="ro-labels"></div>
      </div>

      <!-- Reversal replay -->
      <div id="rtab-reversal" class="replay-mode">
        <div class="score-bar" style="max-width:100%">
          <div><div class="sb-label">Swaps left</div><div class="sb-value" id="rr-swaps">20</div></div>
          <div class="sb-right" id="rr-rows">0 / 4 rows locked</div>
        </div>
        <div id="rr-grid-container" style="width:100%"></div>
        <div class="row-theme-labels" id="rr-labels"></div>
      </div>

      <!-- Burgle replay -->
      <div id="rtab-burgle" class="replay-mode">
        <div class="score-bar" style="max-width:100%">
          <div><div class="sb-label">Score</div><div class="sb-value" id="rb-score">0</div></div>
          <div class="sb-right" id="rb-prog">0 / 5 vaults</div>
        </div>
        <div class="vault-wrap" id="rb-vault-wrap" style="max-width:100%"></div>
      </div>
    </div>
  </div>
</div>

<!-- Win overlay for replay -->
<div class="overlay" id="replay-win-overlay">
  <div class="ov-card">
    <h2 id="rwo-title">🏆</h2>
    <p class="ov-sub" id="rwo-sub"></p>
    <div class="poster-grid" id="rwo-posters"></div>
    <div id="rwo-extra" style="font-size:.82rem;color:var(--muted);margin-top:4px;text-align:left"></div>
    <button class="btn btn-primary btn-full mt-16" onclick="closeOverlay('replay-win-overlay')">Close</button>
  </div>
</div>
<div class="overlay" id="replay-burgle-overlay">
  <div class="ov-card">
    <h2>🔓 Heist Complete!</h2>
    <div style="font-size:2.2rem;font-weight:700;color:var(--accent);margin:10px 0" id="rbo-final">0/35</div>
    <div class="poster-grid" id="rbo-posters"></div>
    <button class="btn btn-primary btn-full mt-16" onclick="closeOverlay('replay-burgle-overlay')">Close</button>
  </div>
</div>

<script src="shared.js"></script>
<script>
/* ══════════════════════════════════════════
   State
══════════════════════════════════════════ */
const TODAY = todayStr();
let allGames = [];
let scores = JSON.parse(localStorage.getItem('lb_scores') || '{}');
let replayGame = null;
let replayOrigCtrl = null, replayRevCtrl = null;
const RB = { vaults: [], score: 0, done: false };
let replayTab = 'original';

/* ══════════════════════════════════════════
   Boot
══════════════════════════════════════════ */
async function boot() {
  const gamesData = await loadGamesJSON();
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  allGames = gamesData.games
    .filter(g => g.status === 'approved' && g.date < TODAY)
    .sort((a, b) => b.date.localeCompare(a.date));

  renderGrid(allGames);

  document.getElementById('search-input').addEventListener('input', onSearch);
  document.getElementById('btn-close-replay').addEventListener('click', closeReplay);
}

/* ══════════════════════════════════════════
   Search
══════════════════════════════════════════ */
function onSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if (!q) { renderGrid(allGames); return; }
  const filtered = allGames.filter(g => gameMatchesQuery(g, q));
  renderGrid(filtered);
}

function gameMatchesQuery(g, q) {
  const check = str => str && str.toLowerCase().includes(q);
  if (g.modes?.original?.movies?.some(check)) return true;
  if (g.modes?.reversal?.groups?.some(gr => gr.movies.some(check))) return true;
  if (g.modes?.burgle?.movies?.some(m => check(m.title))) return true;
  return false;
}

/* ══════════════════════════════════════════
   Grid render
══════════════════════════════════════════ */
function renderGrid(games) {
  const grid = document.getElementById('archive-grid');
  grid.innerHTML = '';
  document.getElementById('result-count').textContent = `${games.length} game${games.length !== 1 ? 's' : ''}`;

  if (!games.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="big-icon">🎬</div><p>No games found.</p></div>';
    return;
  }

  games.forEach(g => {
    const card = buildArchiveCard(g);
    grid.appendChild(card);
  });
}

function buildArchiveCard(g) {
  const card = document.createElement('div');
  card.className = 'archive-card';

  const dayScores = scores[g.date] || {};

  // Date header
  const dateEl = document.createElement('div');
  dateEl.className = 'ac-date';
  dateEl.textContent = formatDate(g.date);
  card.appendChild(dateEl);

  // Score badges
  const scoreRow = document.createElement('div');
  scoreRow.className = 'ac-scores';
  const modes = [
    { key: 'original', label: 'O', suffix: '' },
    { key: 'reversal', label: 'R', suffix: '' },
    { key: 'burgle',   label: 'B', suffix: '/35' },
  ];
  modes.forEach(({ key, label, suffix }) => {
    if (!g.modes?.[key]) return;
    const badge = document.createElement('span');
    const hasScore = dayScores[key] !== undefined;
    badge.className = 'ac-score-badge' + (hasScore ? ' has-score' : '');
    badge.textContent = hasScore ? `${label}: ${dayScores[key]}${suffix}` : label;
    scoreRow.appendChild(badge);
  });
  card.appendChild(scoreRow);

  // Movie listings per mode (collapsed)
  if (g.modes?.original) {
    appendMovieSection(card, 'Original', g.modes.original.movies);
  }
  if (g.modes?.reversal) {
    appendMovieSection(card, 'Reversal', g.modes.reversal.groups.flatMap(gr => gr.movies));
  }
  if (g.modes?.burgle) {
    appendMovieSection(card, 'Burgle', g.modes.burgle.movies.map(m => m.title));
  }

  // Replay button
  const replayBtn = document.createElement('button');
  replayBtn.className = 'btn btn-sm btn-primary';
  replayBtn.style.marginTop = '10px';
  replayBtn.textContent = '▶ Replay';
  replayBtn.addEventListener('click', e => { e.stopPropagation(); openReplay(g); });
  card.appendChild(replayBtn);

  return card;
}

function appendMovieSection(card, label, movies) {
  const sec = document.createElement('div');
  sec.className = 'ac-section';
  const lbl = document.createElement('div');
  lbl.className = 'ac-section-label';
  lbl.textContent = label;
  const mv = document.createElement('div');
  mv.className = 'ac-movies collapsed';
  mv.textContent = movies.join(', ');
  const exp = document.createElement('div');
  exp.className = 'ac-expand';
  exp.textContent = 'Show more ↓';
  exp.addEventListener('click', e => {
    e.stopPropagation();
    const collapsed = mv.classList.toggle('collapsed');
    exp.textContent = collapsed ? 'Show more ↓' : 'Show less ↑';
  });
  sec.appendChild(lbl); sec.appendChild(mv); sec.appendChild(exp);
  card.appendChild(sec);
}

/* ══════════════════════════════════════════
   Replay modal
══════════════════════════════════════════ */
function openReplay(g) {
  replayGame = g;
  replayOrigCtrl = null;
  replayRevCtrl = null;
  RB.vaults = []; RB.score = 0; RB.done = false;
  replayTab = 'original';

  document.getElementById('replay-title').textContent = `Replay — ${formatDate(g.date)}`;
  document.querySelector('[data-rtab]').parentElement.querySelectorAll('.replay-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.rtab === 'original');
  });
  document.querySelectorAll('.replay-mode').forEach(m => m.classList.toggle('active', m.id === 'rtab-original'));

  document.getElementById('replay-modal').classList.add('active');
  document.body.style.overflow = 'hidden';

  initReplayOriginal();
}

function closeReplay() {
  document.getElementById('replay-modal').classList.remove('active');
  document.body.style.overflow = '';
  replayGame = null;
  replayOrigCtrl = null;
  replayRevCtrl = null;
}

function switchReplayTab(tab) {
  replayTab = tab;
  document.querySelectorAll('.replay-tab').forEach(t => t.classList.toggle('active', t.dataset.rtab === tab));
  document.querySelectorAll('.replay-mode').forEach(m => m.classList.toggle('active', m.id === `rtab-${tab}`));

  if (tab === 'original' && !replayOrigCtrl) initReplayOriginal();
  if (tab === 'reversal' && !replayRevCtrl) initReplayReversal();
  if (tab === 'burgle' && !RB.vaults.length) initReplayBurgle();
}

/* ── Replay Original ── */
function initReplayOriginal() {
  const data = replayGame?.modes?.original;
  if (!data) {
    document.getElementById('ro-grid-container').innerHTML = '<p class="text-muted" style="padding:20px">No Original puzzle for this date.</p>';
    return;
  }
  const tiles = data.tiles.map(t => ({ text: t.text, movie: t.movie, type: t.type }));

  replayOrigCtrl = createTileGrid({
    container: document.getElementById('ro-grid-container'),
    tiles,
    mode: 'original',
    swapLimit: 20,
    onComplete: (won, swapsLeft) => finishReplayOriginal(won, swapsLeft),
  });

  updateROBar();
  const obs = new MutationObserver(() => {
    updateROBar();
    renderROLabels(data.movies);
  });
  obs.observe(document.getElementById('ro-grid-container'), { childList: true, subtree: true });
}

function updateROBar() {
  if (!replayOrigCtrl) return;
  document.getElementById('ro-swaps').textContent = replayOrigCtrl.state.swaps;
  document.getElementById('ro-rows').textContent = `${replayOrigCtrl.state.locked} / 4 rows locked`;
}
function renderROLabels(movies) {
  if (!replayOrigCtrl) return;
  const c = document.getElementById('ro-labels');
  c.innerHTML = '';
  const tiles = replayOrigCtrl.state.tiles;
  for (let row = 0; row < 4; row++) {
    const slice = tiles.slice(row * 4, row * 4 + 4);
    if (slice.length && slice[0].locked) {
      const d = document.createElement('div');
      d.className = 'row-theme-label fade-in';
      d.textContent = `Row ${row + 1}: ${slice[0].movie}`;
      c.appendChild(d);
    }
  }
}
function finishReplayOriginal(won, swapsLeft) {
  document.getElementById('rwo-title').textContent = won ? '🏆 Puzzle Solved!' : '😞 Out of Swaps';
  document.getElementById('rwo-sub').textContent = won ? `Score: ${swapsLeft} swaps remaining` : 'The films were:';
  const pg = document.getElementById('rwo-posters');
  pg.innerHTML = '';
  (replayGame.modes.original.movies || []).forEach(title => pg.appendChild(posterItem({ title, year: '', poster_url: '' })));
  document.getElementById('rwo-extra').innerHTML = '';
  document.getElementById('replay-win-overlay').classList.add('active');
}

/* ── Replay Reversal ── */
function initReplayReversal() {
  const data = replayGame?.modes?.reversal;
  if (!data) {
    document.getElementById('rr-grid-container').innerHTML = '<p class="text-muted" style="padding:20px">No Reversal puzzle for this date.</p>';
    return;
  }
  const tiles = data.tiles.map(t => ({ text: t.text, clusterIdx: t.clusterIdx }));

  replayRevCtrl = createTileGrid({
    container: document.getElementById('rr-grid-container'),
    tiles,
    mode: 'reversal',
    groups: data.groups,
    swapLimit: 20,
    onComplete: (won, swapsLeft) => finishReplayReversal(won, swapsLeft),
  });

  updateRRBar();
  const obs = new MutationObserver(() => {
    updateRRBar();
    renderRRLabels(data.groups);
  });
  obs.observe(document.getElementById('rr-grid-container'), { childList: true, subtree: true });
}

function updateRRBar() {
  if (!replayRevCtrl) return;
  document.getElementById('rr-swaps').textContent = replayRevCtrl.state.swaps;
  document.getElementById('rr-rows').textContent = `${replayRevCtrl.state.locked} / 4 rows locked`;
}
function renderRRLabels(groups) {
  if (!replayRevCtrl) return;
  const c = document.getElementById('rr-labels');
  c.innerHTML = '';
  const tiles = replayRevCtrl.state.tiles;
  for (let row = 0; row < groups.length; row++) {
    const slice = tiles.slice(row * 4, row * 4 + 4);
    if (slice.length && slice[0].locked) {
      const ci = slice[0].clusterIdx;
      const d = document.createElement('div');
      d.className = 'row-theme-label fade-in';
      d.textContent = `Row ${row + 1}: ${groups[ci]?.theme || ''}`;
      c.appendChild(d);
    }
  }
}
function finishReplayReversal(won, swapsLeft) {
  const data = replayGame.modes.reversal;
  document.getElementById('rwo-title').textContent = won ? '🏆 All Themes Found!' : '😞 Out of Swaps';
  document.getElementById('rwo-sub').textContent = won ? `Score: ${swapsLeft} swaps remaining` : 'The themes were:';
  const pg = document.getElementById('rwo-posters');
  pg.innerHTML = '';
  data.groups.flatMap(g => g.movies).slice(0, 8).forEach(title => pg.appendChild(posterItem({ title, year: '', poster_url: '' })));
  document.getElementById('rwo-extra').innerHTML = data.groups.map(g => `<div style="margin:3px 0">• ${g.theme}</div>`).join('');
  document.getElementById('replay-win-overlay').classList.add('active');
}

/* ── Replay Burgle ── */
function initReplayBurgle() {
  const data = replayGame?.modes?.burgle;
  if (!data) {
    document.getElementById('rb-vault-wrap').innerHTML = '<p class="text-muted" style="padding:20px">No Burgle puzzle for this date.</p>';
    return;
  }
  RB.vaults = data.movies.map((m, i) => ({
    film: m, id: i, clues: 0, wrong: 0,
    solved: false, cracked: false, open: i === 0, points: 0, input: '',
  }));
  RB.score = 0; RB.done = false;
  renderReplayBurgle();
}

function renderReplayBurgle() {
  const wrap = document.getElementById('rb-vault-wrap');
  wrap.innerHTML = '';
  document.getElementById('rb-score').textContent = RB.score;
  const resolved = RB.vaults.filter(v => v.solved || v.cracked).length;
  document.getElementById('rb-prog').textContent = `${resolved} / 5 vaults`;

  RB.vaults.forEach((v, idx) => {
    const el = document.createElement('div');
    el.className = 'vault' + (v.solved ? ' solved' : v.cracked ? ' cracked' : '');

    const statusTxt = v.solved ? `✓ ${v.points} pts` : v.cracked ? '✗ 0 pts' : v.wrong > 0 ? `${v.wrong}/3 ❌` : '';
    const hdr = document.createElement('div');
    hdr.className = 'vault-hdr';
    hdr.onclick = () => { RB.vaults[idx].open = !RB.vaults[idx].open; renderReplayBurgle(); };
    hdr.innerHTML = `<div class="vault-num">${idx + 1}</div>
      <div class="vault-name">${(v.solved || v.cracked) ? `${v.film.title}` : '??? Unknown Film'}</div>
      <div class="vault-status">${statusTxt}</div>
      <div class="vault-chevron">${v.open ? '▲' : '▼'}</div>`;
    el.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'vault-body' + (v.open ? ' open' : '');

    const clues = v.film.clues || [];
    for (let c = 0; c < v.clues; c++) {
      const cr = document.createElement('div');
      cr.className = 'clue-row';
      cr.innerHTML = `<span class="clue-lbl">${clues[c].label}:</span><span class="clue-val">${clues[c].text}</span>`;
      body.appendChild(cr);
    }

    if (v.solved || v.cracked) {
      if (v.film.poster_url) {
        const img = document.createElement('img');
        img.src = v.film.poster_url; img.className = 'poster-reveal'; img.alt = v.film.title;
        img.style.opacity = v.cracked ? '0.45' : '1';
        img.onerror = () => img.style.display = 'none';
        body.appendChild(img);
      }
      if (v.cracked) {
        const p = document.createElement('p');
        p.style.cssText = 'color:var(--danger);font-size:.8rem;margin-top:4px';
        p.textContent = 'Vault cracked — no points.'; body.appendChild(p);
      }
    } else {
      if (v.clues < clues.length) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-sm';
        btn.textContent = v.clues === 0 ? 'Reveal First Clue' : 'Next Clue';
        btn.onclick = () => {
          v.clues++;
          renderReplayBurgle();
          setTimeout(() => { const i = document.getElementById(`rgi-${idx}`); if (i) i.focus(); }, 60);
        };
        body.appendChild(btn);
      }
      const ga = document.createElement('div'); ga.className = 'guess-area';
      const inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'guess-input'; inp.id = `rgi-${idx}`;
      inp.placeholder = 'Guess the film…'; inp.value = v.input;
      inp.addEventListener('input', e => v.input = e.target.value);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') rbSubmit(idx); });
      const gbtn = document.createElement('button');
      gbtn.className = 'btn btn-primary btn-sm'; gbtn.textContent = 'Guess';
      gbtn.onclick = () => rbSubmit(idx);
      ga.appendChild(inp); ga.appendChild(gbtn); body.appendChild(ga);

      const dots = document.createElement('div'); dots.className = 'dots';
      for (let d = 0; d < 3; d++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (d < v.wrong ? ' filled' : ''); dots.appendChild(dot);
      }
      body.appendChild(dots);
    }
    el.appendChild(body); wrap.appendChild(el);
  });
}

function rbSubmit(idx) {
  const v = RB.vaults[idx];
  if (v.solved || v.cracked) return;
  const guess = (v.input || '').trim();
  if (!guess) return;
  if (titleMatch(guess, v.film.title)) {
    const pts = Math.max(0, 7 - v.clues);
    v.solved = true; v.points = pts; v.clues = (v.film.clues || []).length;
    RB.score += pts;
    renderReplayBurgle();
    const next = RB.vaults.find((x, i) => i > idx && !x.solved && !x.cracked);
    if (next) { next.open = true; setTimeout(renderReplayBurgle, 350); }
    if (RB.vaults.every(x => x.solved || x.cracked) && !RB.done) {
      RB.done = true; setTimeout(showRBEnd, 650);
    }
  } else {
    v.wrong++; v.input = '';
    const inp = document.getElementById(`rgi-${idx}`);
    if (inp) { inp.classList.add('wrong'); inp.value = ''; setTimeout(() => inp.classList.remove('wrong'), 400); }
    if (v.wrong >= 3) {
      v.cracked = true; v.clues = (v.film.clues || []).length;
      const next = RB.vaults.find((x, i) => i > idx && !x.solved && !x.cracked);
      if (next) next.open = true;
      if (RB.vaults.every(x => x.solved || x.cracked) && !RB.done) {
        RB.done = true; setTimeout(showRBEnd, 650);
      }
    }
    renderReplayBurgle();
  }
}
function showRBEnd() {
  const total = RB.vaults.reduce((s, v) => s + (v.points || 0), 0);
  document.getElementById('rbo-final').textContent = `${total} / 35`;
  const pg = document.getElementById('rbo-posters');
  pg.innerHTML = '';
  RB.vaults.forEach(v => pg.appendChild(posterItem(v.film)));
  document.getElementById('replay-burgle-overlay').classList.add('active');
}

/* ── Helpers ── */
function formatDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
}
function closeOverlay(id) { document.getElementById(id)?.classList.remove('active'); }
document.addEventListener('click', e => {
  if (e.target.classList.contains('overlay')) closeOverlay(e.target.id);
});

boot();
</script>
