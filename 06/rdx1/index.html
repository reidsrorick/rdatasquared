  return el;
}

function buildTiersSection() {
  const section = document.createElement('section');
  section.className = 'settings-section card';
  function render() {
    section.innerHTML = `
      <h2 class="section-title">Tiers</h2>
      <p class="settings-desc">Rename tiers, change their colors, and set the default cadence for each tier.</p>
      <div class="tier-rows" id="tier-rows">
        ${settings.tiers.map((t, i) => {
          const inUse = people.filter(p => p.tier === t.id).length;
          return `
            <div class="tier-row" data-idx="${i}">
              <input type="color" class="color-swatch" value="${t.color}" data-idx="${i}">
              <input type="text" class="form-input tier-label-input" value="${esc(t.label)}" data-idx="${i}">
              <span class="tier-id-badge">${esc(t.id)}</span>
              <label class="tier-cadence-label">Default cadence
                <input type="number" class="form-input tier-cadence-input" value="${t.defaultCadence || 90}" min="1" max="3650" data-idx="${i}" style="width:72px">
                <span class="tier-cadence-unit">days</span>
              </label>
              <span class="tier-in-use">${inUse} contact${inUse !== 1 ? 's' : ''}</span>
              <button class="btn btn--ghost btn--sm tier-delete-btn" data-idx="${i}" ${inUse > 0 ? 'disabled title="In use by '+inUse+' contact(s)"' : ''}>Remove</button>
            </div>
          `;
        }).join('')}
      </div>
      <div class="tier-add-row" id="tier-add-row">
        <input type="color" class="color-swatch" id="new-tier-color" value="#6366F1">
        <input type="text" class="form-input tier-label-input" id="new-tier-label" placeholder="New tier name…">
        <label class="tier-cadence-label">Cadence
          <input type="number" class="form-input" id="new-tier-cadence" value="90" min="1" max="3650" style="width:72px">
          <span class="tier-cadence-unit">days</span>
        </label>
        <button class="btn btn--primary btn--sm" id="add-tier-btn">Add tier</button>
      </div>
    `;

    section.querySelectorAll('input[type="color"]').forEach(inp => {
      inp.addEventListener('input', e => {
        const idx = parseInt(e.target.dataset.idx);
        if (!isNaN(idx)) { settings.tiers[idx].color = e.target.value; saveSettings(); }
      });
    });
    section.querySelectorAll('.tier-label-input[data-idx]').forEach(inp => {
      inp.addEventListener('change', e => {
        const idx = parseInt(e.target.dataset.idx);
        if (!isNaN(idx) && e.target.value.trim()) { settings.tiers[idx].label = e.target.value.trim(); saveSettings(); }
      });
    });
    section.querySelectorAll('.tier-cadence-input').forEach(inp => {
      inp.addEventListener('change', e => {
        const idx = parseInt(e.target.dataset.idx);
        const val = parseInt(e.target.value);
        if (!isNaN(idx) && val > 0) { settings.tiers[idx].defaultCadence = val; saveSettings(); }
      });
    });
    section.querySelectorAll('.tier-delete-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        const idx = parseInt(e.target.dataset.idx);
        openModal(`
          <div class="modal-header"><h3>Remove tier "${esc(settings.tiers[idx].label)}"?</h3></div>
          <div class="modal-body"><p>This will remove the tier from settings. Contacts currently assigned to it will keep the raw ID in their data.</p></div>
          <div class="modal-footer">
            <button class="btn btn--ghost" data-modal-cancel>Cancel</button>
            <button class="btn btn--danger" data-modal-confirm>Remove</button>
          </div>
        `, { onConfirm: () => { settings.tiers.splice(idx, 1); saveSettings(); render(); } });
      });
    });
    section.querySelector('#add-tier-btn').addEventListener('click', () => {
      const label = section.querySelector('#new-tier-label').value.trim();
      const color = section.querySelector('#new-tier-color').value;
      if (!label) { section.querySelector('#new-tier-label').focus(); return; }
      const id = label.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
      if (!id || settings.tiers.some(t => t.id === id)) {
        showToast('Tier ID already exists or invalid name'); return;
      }
      const newCadence = parseInt(section.querySelector('#new-tier-cadence').value) || 90;
      settings.tiers.push({ id, label, color, defaultCadence: newCadence });
      saveSettings();
      render();
    });
  }
  render();
  return section;
}

function buildCadenceSection() {
  const section = document.createElement('section');
  section.className = 'settings-section card';
  function render() {
    section.innerHTML = `
      <h2 class="section-title">Cadence presets</h2>
      <p class="settings-desc">Quick-pick values shown on cadence inputs. Click × to remove, or add a new value.</p>
      <div class="preset-chips">
        ${settings.cadencePresets.map((n, i) => `
          <span class="preset-chip">
            ${n}d
            <button class="preset-chip-del" data-idx="${i}" aria-label="Remove ${n}">×</button>
          </span>
        `).join('')}
      </div>
      <div class="preset-add-row">
        <input type="number" id="new-preset-val" class="form-input preset-add-input" placeholder="e.g. 45" min="1" max="3650">
        <button class="btn btn--primary btn--sm" id="add-preset-btn">Add</button>
      </div>
    `;
    section.querySelectorAll('.preset-chip-del').forEach(btn => {
      btn.addEventListener('click', e => {
        settings.cadencePresets.splice(parseInt(e.target.dataset.idx), 1);
        saveSettings(); render();
      });
    });
    section.querySelector('#add-preset-btn').addEventListener('click', () => {
      const val = parseInt(section.querySelector('#new-preset-val').value);
      if (!val || val < 1) return;
      if (!settings.cadencePresets.includes(val)) {
        settings.cadencePresets.push(val);
        settings.cadencePresets.sort((a, b) => a - b);
        saveSettings();
      }
      render();
    });
    section.querySelector('#new-preset-val').addEventListener('keydown', e => {
      if (e.key === 'Enter') section.querySelector('#add-preset-btn').click();
    });
  }
  render();
  return section;
}

function buildTagsSection(people, onPeopleUpdate) {
  const section = document.createElement('section');
  section.className = 'settings-section card';
  function getTagCounts() {
    const counts = {};
    people.forEach(p => parseTags(p.tags).forEach(t => { counts[t] = (counts[t]||0)+1; }));
    return Object.entries(counts).sort((a,b) => b[1]-a[1] || a[0].localeCompare(b[0]));
  }
  function renameTag(oldTag, newTag) {
    if (!newTag || newTag === oldTag) return;
    const updated = people.map(p => {
      const tags = parseTags(p.tags);
      const idx = tags.indexOf(oldTag);
      if (idx === -1) return p;
      tags[idx] = newTag;
      const deduped = [...new Set(tags)];
      return { ...p, tags: deduped.join('|') };
    });
    onPeopleUpdate(updated);
    render();
  }
  function deleteTag(tag) {
    const updated = people.map(p => {
      const tags = parseTags(p.tags).filter(t => t !== tag);
      return { ...p, tags: tags.join('|') };
    });
    onPeopleUpdate(updated);
    render();
  }
  function render() {
    const counts = getTagCounts();
    section.innerHTML = `
      <h2 class="section-title">Tags <span class="section-count">${counts.length}</span></h2>
      <p class="settings-desc">Rename a tag to merge it with another. Changes apply to all contacts.</p>
      ${counts.length ? `
        <div class="tag-mgmt-list">
          ${counts.map(([tag, count]) => `
            <div class="tag-mgmt-row" data-tag="${esc(tag)}">
              <span class="tag-mgmt-name">${esc(tag)}</span>
              <span class="tag-mgmt-count">${count} contact${count!==1?'s':''}</span>
              <button class="btn btn--ghost btn--sm tag-rename-btn" data-tag="${esc(tag)}">Rename</button>
              <button class="btn btn--ghost btn--sm tag-delete-btn" data-tag="${esc(tag)}">Delete</button>
            </div>
          `).join('')}
        </div>
      ` : `<div class="empty-state empty-state--sm"><p>No tags yet.</p></div>`}
    `;
    section.querySelectorAll('.tag-rename-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        const tag = e.target.dataset.tag;
        const row = section.querySelector(`.tag-mgmt-row[data-tag="${CSS.escape(tag)}"]`);
        row.innerHTML = `
          <input type="text" class="form-input tag-rename-input" value="${esc(tag)}" style="flex:1">
          <button class="btn btn--primary btn--sm" id="tag-rename-save">Save</button>
          <button class="btn btn--ghost btn--sm" id="tag-rename-cancel">Cancel</button>
        `;
        const input = row.querySelector('.tag-rename-input');
        input.focus(); input.select();
        row.querySelector('#tag-rename-save').addEventListener('click', () => renameTag(tag, input.value.trim()));
        row.querySelector('#tag-rename-cancel').addEventListener('click', render);
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') renameTag(tag, input.value.trim());
          if (e.key === 'Escape') render();
        });
      });
    });
    section.querySelectorAll('.tag-delete-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        const tag = e.target.dataset.tag;
        openModal(`
          <div class="modal-header"><h3>Delete tag "${esc(tag)}"?</h3></div>
          <div class="modal-body"><p>This removes the tag from all contacts. The contacts themselves are not deleted.</p></div>
          <div class="modal-footer">
            <button class="btn btn--ghost" data-modal-cancel>Cancel</button>
            <button class="btn btn--danger" data-modal-confirm>Delete tag</button>
          </div>
        `, { onConfirm: () => deleteTag(tag) });
      });
    });
  }
  render();
  return section;
}

// ── App / router ──────────────────────────────────────────────────────────────
let people = [];
let currentView = 'dashboard', currentPersonId = null;
let pendingPeopleFilter = null; // { search?, tag? } — consumed once by renderPeople
const mainEl = document.getElementById('main');

function navigate(view, id = null) {
  currentView = view; currentPersonId = id;
  location.hash = id ? `${view}/${id}` : view;
  renderView(); updateNav();
}

function readHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  const [view, id] = hash.split('/');
  if (['dashboard','upcoming','calendar','people','map','settings'].includes(view)) {
    currentView = view;
  } else if (view === 'person' && id) {
    currentView = 'person'; currentPersonId = id;
  }
}

function updateNav() {
  document.querySelectorAll('.nav-tab').forEach(t => {
    const active = (currentView==='dashboard'&&t.dataset.view==='dashboard')
      || (currentView==='upcoming'&&t.dataset.view==='upcoming')
      || ((currentView==='people'||currentView==='person')&&t.dataset.view==='people')
      || (currentView==='calendar'&&t.dataset.view==='calendar')
      || (currentView==='map'&&t.dataset.view==='map');
    t.classList.toggle('nav-tab--active', active);
    t.setAttribute('aria-current', active ? 'page' : '');
  });
  const gearBtn = document.getElementById('settings-btn');
  if (gearBtn) gearBtn.classList.toggle('topbar-gear--active', currentView === 'settings');
}

function renderView() {
  mainEl.classList.add('view-exit');
  setTimeout(() => {
    mainEl.innerHTML = '';
    mainEl.classList.remove('view-exit');
    mainEl.classList.add('view-enter');
    let el;
    if (currentView === 'dashboard') el = renderDashboard(people, updatePerson, navigate);
    else if (currentView === 'upcoming') el = renderUpcoming(people, updatePerson, navigate);
    else if (currentView === 'calendar') el = renderCalendar(people, navigate);
    else if (currentView === 'map') el = renderMap(people, navigate);
    else if (currentView === 'people') el = renderPeople(people, navigate);
    else if (currentView === 'person') {
      const p = people.find(x => x.id === currentPersonId);
      if (!p) { navigate('people'); return; }
      el = renderPersonDetail(p, updatePerson, deletePerson, () => navigate('people'));
    }
    else if (currentView === 'settings') {
      el = renderSettings(people, (updatedPeople) => {
        people = updatedPeople;
        scheduleSave(people);
      });
    }
    if (el) mainEl.appendChild(el);
    requestAnimationFrame(() => mainEl.classList.remove('view-enter'));
  }, 150);
}

function updatePerson(updated) {
  const idx = people.findIndex(p => p.id === updated.id);
  if (idx === -1) people.push(updated); else people[idx] = updated;
  scheduleSave(people);
}
function deletePerson(id) {
  people = people.filter(p => p.id !== id);
  scheduleSave(people); navigate('people');
}

document.querySelectorAll('.nav-tab').forEach(tab =>
  tab.addEventListener('click', () => navigate(tab.dataset.view))
);
document.getElementById('settings-btn').addEventListener('click', () => navigate('settings'));
document.getElementById('logo-btn').addEventListener('click', e => { e.preventDefault(); navigate('dashboard'); });
window.addEventListener('popstate', () => { readHash(); renderView(); updateNav(); });
document.getElementById('add-btn').addEventListener('click', () => openAddPersonModal(p => {
  people.push(p); scheduleSave(people); navigate('person', p.id);
}));
document.addEventListener('keydown', e => {
  if (e.key === 'n' && !e.ctrlKey && !e.metaKey && !e.altKey) {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (document.querySelector('.modal-overlay')) return;
    e.preventDefault();
    openAddPersonModal(p => { people.push(p); scheduleSave(people); navigate('person', p.id); });
  }
});

document.addEventListener('rdx1:file-disconnected', () => {
  fileHandle = null;
  updateSaveIndicator();
});

// ── Topbar file actions (always shown) ───────────────────────────────────────
function mountTopbarFileActions() {
  document.getElementById('topbar-file-actions')?.remove();
  if (!hasFSA || fileHandle) return; // only show when FSA supported but no file connected
  const bar = document.getElementById('topbar-right');
  const wrap = document.createElement('div');
  wrap.id = 'topbar-file-actions';
  const syncBtn = Object.assign(document.createElement('button'), {
    className: 'btn btn--ghost btn--sm', textContent: 'Enable autosave',
    title: 'Sync to a CSV file for automatic saving'
  });
  syncBtn.addEventListener('click', () => openFileModal());
  wrap.appendChild(syncBtn);
  bar.insertBefore(wrap, bar.firstChild);
}

function updateSaveIndicator() {
  // Refresh the topbar autosave button (appears only when no file connected)
  mountTopbarFileActions();
  const status = document.getElementById('save-status');
  if (status && !fileHandle) {
    status.textContent = 'Saved locally';
    status.classList.remove('save-status--saving');
  }
}

// ── File sync modal ───────────────────────────────────────────────────────────
function openFileModal() {
  const hasData = people.length > 0;
  const modal = openModal(`
    <div class="modal-header">
      <h3>${fileHandle ? 'File sync' : 'Sync to a CSV file'}</h3>
      <button class="modal-close" data-modal-close aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:0">Connect a CSV file for auto-save to disk. Your data is already saved in the browser — this just adds a file backup.</p>
    </div>
    <div class="modal-footer" style="flex-direction:column;align-items:stretch;gap:8px">
      <button class="btn btn--primary" id="fmodal-open">Open existing CSV</button>
      <button class="btn btn--ghost" id="fmodal-new">${hasData ? 'Save current data to new file…' : 'Create new empty file…'}</button>
      ${fileHandle ? `<button class="btn btn--danger" id="fmodal-disconnect">Disconnect file</button>` : ''}
    </div>
  `);

  document.getElementById('fmodal-open').addEventListener('click', async () => {
    const data = await pickOrCreateFile();
    if (data !== null) {
      modal.close();
      people = data;
      renderView(); updateNav(); updateSaveIndicator();
      setSaveText('File connected', false);
    }
  });
  document.getElementById('fmodal-new').addEventListener('click', async () => {
    const data = await createNewFile(people);
    if (data !== null) {
      modal.close();
      updateSaveIndicator();
      setSaveText('File connected', false);
    }
  });
  document.getElementById('fmodal-disconnect')?.addEventListener('click', async () => {
    fileHandle = null;
    await clearHandle();
    modal.close();
    updateSaveIndicator();
  });
}

// ── Reconnect banner ──────────────────────────────────────────────────────────
function showReconnectBanner(handle) {
  const banner = document.createElement('div');
  banner.id = 'reconnect-banner';
  banner.className = 'reconnect-banner';
  banner.innerHTML = `
    <span>Your CSV file needs permission to reconnect.</span>
    <button class="btn btn--primary btn--sm" id="reconnect-btn">Reconnect file</button>
    <button class="btn btn--ghost btn--sm" id="reconnect-dismiss">Dismiss</button>
  `;
  document.body.insertBefore(banner, document.getElementById('main'));

  document.getElementById('reconnect-btn').addEventListener('click', async () => {
    try {
      const perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        fileHandle = handle;
        await saveHandle(handle);
        const text = await (await handle.getFile()).text();
        people = parseCSV(text);
        renderView(); updateNav(); updateSaveIndicator();
        setSaveText('File reconnected', false);
      } else {
        await clearHandle();
      }
    } catch { await clearHandle(); }
    banner.remove();
  });

  document.getElementById('reconnect-dismiss').addEventListener('click', async () => {
    await clearHandle();
    banner.remove();
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  loadSettings();
  try {
    const { people: loaded, fileConnected, pendingHandle } = await initStorage();
    people = loaded;
    readHash();
    renderView();
    updateNav();
    mountTopbarFileActions();
    if (fileConnected) {
      setSaveText('File connected', false);
    } else if (pendingHandle) {
      showReconnectBanner(pendingHandle);
    }
  } catch(err) {
    console.error('[RDX1] boot error:', err);
    people = [];
    renderView();
    updateNav();
    mountTopbarFileActions();
  }
}

boot();
</script>
